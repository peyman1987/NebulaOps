<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img"
     aria-label="Messaging and Cache Flow">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#172033"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1">
            <stop offset="0" stop-color="#0f172a"/>
            <stop offset="1" stop-color="#111827"/>
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/>
        </filter>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2,2 L10,6 L2,10 Z" fill="#93c5fd"/>
        </marker>
        <style>
            .card{filter:url(#shadow);animation:float 5s ease-in-out infinite;}
            .line{stroke:#93c5fd;stroke-width:2.6;fill:none;marker-end:url(#arrow);stroke-dasharray:7 7;animation:dash
            1.7s linear infinite;}
            .title{fill:#f8fafc;font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;}
            .sub{fill:#9fb3c8;font-family:Inter,Segoe UI,Arial,sans-serif;}
            @keyframes dash{to{stroke-dashoffset:-28;}}
            @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
            @keyframes glow{0%,100%{opacity:.4}50%{opacity:1}}
        </style>
    </defs>
    <rect width="1200" height="680" fill="url(#bg)"/>
    <circle cx="1080" cy="70" r="95" fill="#2563eb" opacity="0.10">
        <animate attributeName="r" values="85;110;85" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="58" font-size="30" class="title">Messaging and Cache Flow</text>
    <text x="60" y="88" font-size="15" class="sub">RabbitMQ owns asynchronous delivery; Redis owns fast cache access
    </text>
    <g class="card">
        <rect x="80" y="120" width="210" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="92.0" y="132.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="185.0" y="161.0" text-anchor="middle" font-size="18" class="title">Task Service</text>
        <text x="185.0" y="188.0" text-anchor="middle" font-size="13" class="sub">Publishes events</text>
    </g>
    <g class="card">
        <rect x="400" y="120" width="230" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="412.0" y="132.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="515.0" y="161.0" text-anchor="middle" font-size="18" class="title">RabbitMQ Exchange</text>
        <text x="515.0" y="188.0" text-anchor="middle" font-size="13" class="sub">topic/direct routing</text>
    </g>
    <g class="card">
        <rect x="760" y="90" width="250" height="80" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="772.0" y="102.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="885.0" y="126.0" text-anchor="middle" font-size="18" class="title">Notification Queue</text>
        <text x="885.0" y="153.0" text-anchor="middle" font-size="13" class="sub">durable consumer queue</text>
    </g>
    <g class="card">
        <rect x="760" y="200" width="250" height="80" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="772.0" y="212.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="885.0" y="236.0" text-anchor="middle" font-size="18" class="title">Worker Queue</text>
        <text x="885.0" y="263.0" text-anchor="middle" font-size="13" class="sub">background workload</text>
    </g>
    <g class="card">
        <rect x="80" y="390" width="210" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="92.0" y="402.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="185.0" y="431.0" text-anchor="middle" font-size="18" class="title">Go Cache Service</text>
        <text x="185.0" y="458.0" text-anchor="middle" font-size="13" class="sub">cache API</text>
    </g>
    <g class="card">
        <rect x="400" y="390" width="230" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="412.0" y="402.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="515.0" y="431.0" text-anchor="middle" font-size="18" class="title">Redis</text>
        <text x="515.0" y="458.0" text-anchor="middle" font-size="13" class="sub">low-latency cache</text>
    </g>
    <g class="card">
        <rect x="760" y="390" width="250" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="772.0" y="402.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="885.0" y="431.0" text-anchor="middle" font-size="18" class="title">Consumers</text>
        <text x="885.0" y="458.0" text-anchor="middle" font-size="13" class="sub">idempotent processing</text>
    </g>
    <path class="line" d="M290,165 L400,165"/>
    <text x="345.0" y="157.0" text-anchor="middle" font-size="12" class="sub">publish</text>
    <path class="line" d="M630,165 L760,130"/>
    <text x="695.0" y="139.5" text-anchor="middle" font-size="12" class="sub">route</text>
    <path class="line" d="M630,165 L760,240"/>
    <text x="695.0" y="194.5" text-anchor="middle" font-size="12" class="sub">route</text>
    <path class="line" d="M885,170 L885,390"/>
    <text x="885.0" y="272.0" text-anchor="middle" font-size="12" class="sub">consume</text>
    <path class="line" d="M290,435 L400,435"/>
    <text x="345.0" y="427.0" text-anchor="middle" font-size="12" class="sub">read/write</text>
    <path class="line" d="M630,435 L760,435"/>
    <text x="695.0" y="427.0" text-anchor="middle" font-size="12" class="sub">cache hit/miss</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.2s" repeatCount="indefinite" path="M290,165 L400,165"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.4000000000000004s" repeatCount="indefinite" path="M630,165 L760,130"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.4000000000000004s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.6s" repeatCount="indefinite" path="M630,165 L760,240"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.8000000000000003s" repeatCount="indefinite" path="M290,435 L400,435"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.8000000000000003s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="3.0s" repeatCount="indefinite" path="M630,435 L760,435"/>
        <animate attributeName="opacity" values="0;1;0" dur="3.0s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="645" font-size="12" class="sub">NebulaOps — optimized without Kafka/Zookeeper</text>
</svg>
