<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img"
     aria-labelledby="title desc">
    <title id="title">Messaging and Cache Flows</title>
    <desc id="desc">Kafka stores durable domain events, RabbitMQ handles operational jobs, and Redis handles cache and
        rate limiting.
    </desc>
    <style>
        .bg{fill:#0b1020}.box{fill:#111a2e;stroke:#5eead4;stroke-width:2;rx:14}.k{stroke:#f472b6}.r{stroke:#fbbf24}.redis{stroke:#34d399}.txt{fill:#e5e7eb;font:600
        16px Arial}.small{fill:#cbd5e1;font:12px
        Arial}.line{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7
        5}.pulse{animation:pulse 1.8s infinite}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
        </marker>
    </defs>
    <rect class="bg" width="1180" height="560"/>
    <text x="40" y="46" class="txt" font-size="24">Messaging and Cache Responsibilities</text>
    <text class="small" x="40" y="70">Kafka = event stream; RabbitMQ = operational queues; Redis = fast cache/rate
        limit/session state.
    </text>
    <rect class="box" x="70" y="135" width="190" height="75"/>
    <text class="txt" x="113" y="166">Task Service</text>
    <text class="small" x="104" y="190">produces domain events</text>
    <rect class="box k" x="390" y="110" width="210" height="110"/>
    <text class="txt" x="455" y="145">Kafka</text>
    <text class="small" x="435" y="170">nebula.task.events</text>
    <text class="small" x="430" y="192">replayable event log</text>
    <rect class="box" x="720" y="80" width="180" height="70"/>
    <text class="txt" x="760" y="112">Analytics</text>
    <text class="small" x="754" y="134">future consumer</text>
    <rect class="box" x="720" y="175" width="180" height="70"/>
    <text class="txt" x="760" y="207">Audit</text>
    <text class="small" x="753" y="229">future consumer</text>
    <rect class="box" x="720" y="270" width="180" height="70"/>
    <text class="txt" x="745" y="302">Notification</text>
    <text class="small" x="760" y="324">current consumer</text>
    <rect class="box r" x="390" y="360" width="210" height="90"/>
    <text class="txt" x="455" y="392">RabbitMQ</text>
    <text class="small" x="432" y="416">notification.jobs</text>
    <text class="small" x="423" y="438">work queue + retry</text>
    <rect class="box" x="720" y="370" width="180" height="70"/>
    <text class="txt" x="765" y="402">Go Worker</text>
    <text class="small" x="758" y="424">consumes queue</text>
    <rect class="box redis" x="70" y="360" width="190" height="90"/>
    <text class="txt" x="135" y="392">Redis</text>
    <text class="small" x="115" y="416">cache, rate limit</text>
    <text class="small" x="112" y="438">fast runtime state</text>
    <rect class="box" x="955" y="180" width="170" height="80"/>
    <text class="txt" x="1003" y="212">MongoDB</text>
    <text class="small" x="1000" y="236">final state</text>
    <path class="line pulse" d="M260 172 H390"/>
    <path class="line k" d="M600 145 C660 145 660 115 720 115"/>
    <path class="line k" d="M600 165 C660 165 660 210 720 210"/>
    <path class="line k pulse" d="M600 190 C660 190 660 305 720 305"/>
    <path class="line" d="M900 305 C950 305 930 220 955 220"/>
    <path class="line r pulse" d="M260 190 C330 190 300 405 390 405"/>
    <path class="line r" d="M600 405 H720"/>
    <path class="line" d="M900 405 C970 405 940 240 955 240"/>
    <path class="line dash redis" d="M260 405 H390"/>
    <path class="line dash redis" d="M165 360 C165 280 165 230 260 190"/>
</svg>
