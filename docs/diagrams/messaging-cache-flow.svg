<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" role="img"
     aria-labelledby="title desc">
    <title id="title">NebulaOps v16 · Data, cache and event flow</title>
    <desc id="desc">Task API writes MongoDB, uses Redis and publishes events to RabbitMQ workers.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#020617"/>
            <stop offset=".45" stop-color="#06163a"/>
            <stop offset="1" stop-color="#18062e"/>
        </linearGradient>
        <radialGradient id="halo" cx="50%" cy="35%" r="65%">
            <stop offset="0" stop-color="#22d3ee" stop-opacity=".34"/>
            <stop offset=".55" stop-color="#7c3aed" stop-opacity=".12"/>
            <stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#e0faff"/>
            <stop offset=".25" stop-color="#22d3ee"/>
            <stop offset="1" stop-color="#2563eb"/>
        </linearGradient>
        <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#f5d0fe"/>
            <stop offset=".35" stop-color="#a855f7"/>
            <stop offset="1" stop-color="#4338ca"/>
        </linearGradient>
        <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#dcfce7"/>
            <stop offset=".35" stop-color="#22c55e"/>
            <stop offset="1" stop-color="#047857"/>
        </linearGradient>
        <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ffedd5"/>
            <stop offset=".35" stop-color="#fb923c"/>
            <stop offset="1" stop-color="#c2410c"/>
        </linearGradient>
        <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#fee2e2"/>
            <stop offset=".35" stop-color="#f43f5e"/>
            <stop offset="1" stop-color="#991b1b"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="soft">
            <feDropShadow dx="0" dy="22" stdDeviation="16" flood-color="#000" flood-opacity=".48"/>
            <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#67e8f9" flood-opacity=".25"/>
        </filter>
        <marker id="arrowC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8"
                orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="#67e8f9"/>
        </marker>
        <marker id="arrowV" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8"
                orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="#c084fc"/>
        </marker>
        <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8"
                orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="#86efac"/>
        </marker>
        <style>
            .title{font:800 38px Inter,Arial,sans-serif;fill:#f8fbff;letter-spacing:-.02em} .sub{font:500 17px
            Inter,Arial,sans-serif;fill:#bdd6f6}
            .label{font:800 20px Inter,Arial,sans-serif;fill:#f8fbff} .small{font:500 13px
            Inter,Arial,sans-serif;fill:#c7d8ef} .tiny{font:700 11px
            Inter,Arial,sans-serif;fill:#a9c3df;text-transform:uppercase;letter-spacing:.08em}
            .lane{fill:#0f172a;fill-opacity:.52;stroke:#2dd4bf;stroke-opacity:.22;stroke-width:1.4} .node{}
            .flow{fill:none;stroke:#67e8f9;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowC);filter:url(#glow)}
            .event{fill:none;stroke:#c084fc;stroke-width:4;stroke-dasharray:13
            10;stroke-linecap:round;marker-end:url(#arrowV)}
            .metric{fill:none;stroke:#86efac;stroke-width:4;stroke-dasharray:4
            9;stroke-linecap:round;marker-end:url(#arrowG)}
            .pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:center} .dash{stroke-dasharray:18
            12;animation:dash 4s linear infinite} .float{animation:float 6s ease-in-out infinite}
            @keyframes dash{to{stroke-dashoffset:-120}} @keyframes pulse{50%{opacity:.52;transform:scale(1.035)}}
            @keyframes float{50%{transform:translateY(-10px)}}
        </style>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)"/>
    <rect width="100%" height="100%" fill="url(#halo)"/>
    <g opacity=".18">
        <path d="M0 120 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 200 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 280 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 360 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 440 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 520 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 600 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 680 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 760 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 840 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 920 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M80 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M160 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M240 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M320 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M400 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M480 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M560 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M640 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M720 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M800 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M880 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M960 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1040 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1120 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1200 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1280 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1360 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1440 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1520 0 V950" stroke="#93c5fd" stroke-width="1"/>
    </g>
    <text x="70" y="72" class="title">NebulaOps v16 · Data, cache and event flow</text>
    <text x="70" y="104" class="sub">Task API writes MongoDB, uses Redis and publishes events to RabbitMQ workers.
    </text>

    <rect x="60" y="155" width="1480" height="675" rx="36" class="lane"/>
    <text x="90" y="194" class="tiny">DATA AND EVENT FLOW · REQUEST PATH, CACHE HIT, QUEUE AND WORKER</text>
    <g class="node">
        <path d="M138,272 H363 L345,290 H120 Z" fill="url(#cyan)" opacity=".22"/>
        <path d="M345,290 L363,272 V417 L345,435 Z" fill="#020617" opacity=".45" stroke="#7dd3fc" stroke-opacity=".22"/>
        <rect x="120" y="290" width="225" height="145" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="134" y="304" width="52" height="52" rx="17" fill="url(#cyan)" filter="url(#glow)"/>
        <text x="160" y="338" text-anchor="middle" font-size="24">TASK</text>
        <text x="202" y="326" class="label">Task API</text>
        <text x="144" y="364" class="small">CRUD request</text>
        <text x="144" y="386" class="small">validate JWT</text>
        <text x="144" y="408" class="small">write task</text>
    </g>
    <g class="node">
        <path d="M448,217 H683 L665,235 H430 Z" fill="url(#green)" opacity=".22"/>
        <path d="M665,235 L683,217 V362 L665,380 Z" fill="#020617" opacity=".45" stroke="#7dd3fc" stroke-opacity=".22"/>
        <rect x="430" y="235" width="235" height="145" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="444" y="249" width="52" height="52" rx="17" fill="url(#green)" filter="url(#glow)"/>
        <text x="470" y="283" text-anchor="middle" font-size="24">R</text>
        <text x="512" y="271" class="label">Redis Cache</text>
        <text x="454" y="309" class="small">read-through cache</text>
        <text x="454" y="331" class="small">fast status lookup</text>
        <text x="454" y="353" class="small">TTL refresh</text>
    </g>
    <g class="node">
        <path d="M448,482 H683 L665,500 H430 Z" fill="url(#cyan)" opacity=".22"/>
        <path d="M665,500 L683,482 V627 L665,645 Z" fill="#020617" opacity=".45" stroke="#7dd3fc" stroke-opacity=".22"/>
        <rect x="430" y="500" width="235" height="145" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="444" y="514" width="52" height="52" rx="17" fill="url(#cyan)" filter="url(#glow)"/>
        <text x="470" y="548" text-anchor="middle" font-size="24">M</text>
        <text x="512" y="536" class="label">MongoDB</text>
        <text x="454" y="574" class="small">task document</text>
        <text x="454" y="596" class="small">file metadata</text>
        <text x="454" y="618" class="small">audit records</text>
    </g>
    <g class="node">
        <path d="M763,347 H998 L980,365 H745 Z" fill="url(#orange)" opacity=".22"/>
        <path d="M980,365 L998,347 V492 L980,510 Z" fill="#020617" opacity=".45" stroke="#7dd3fc" stroke-opacity=".22"/>
        <rect x="745" y="365" width="235" height="145" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="759" y="379" width="52" height="52" rx="17" fill="url(#orange)" filter="url(#glow)"/>
        <text x="785" y="413" text-anchor="middle" font-size="24">Q</text>
        <text x="827" y="401" class="label">RabbitMQ</text>
        <text x="769" y="439" class="small">task.created</text>
        <text x="769" y="461" class="small">notification.queue</text>
        <text x="769" y="483" class="small">retry + DLQ ready</text>
    </g>
    <g class="node">
        <path d="M1083,347 H1323 L1305,365 H1065 Z" fill="url(#violet)" opacity=".22"/>
        <path d="M1305,365 L1323,347 V492 L1305,510 Z" fill="#020617" opacity=".45" stroke="#7dd3fc"
              stroke-opacity=".22"/>
        <rect x="1065" y="365" width="240" height="145" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="1079" y="379" width="52" height="52" rx="17" fill="url(#violet)" filter="url(#glow)"/>
        <text x="1105" y="413" text-anchor="middle" font-size="24">GO</text>
        <text x="1147" y="401" class="label">Go Worker</text>
        <text x="1089" y="439" class="small">consume events</text>
        <text x="1089" y="461" class="small">build notification</text>
        <text x="1089" y="483" class="small">update cache</text>
    </g>
    <g class="node">
        <path d="M1343,347 H1493 L1475,365 H1325 Z" fill="url(#green)" opacity=".22"/>
        <path d="M1475,365 L1493,347 V492 L1475,510 Z" fill="#020617" opacity=".45" stroke="#7dd3fc"
              stroke-opacity=".22"/>
        <rect x="1325" y="365" width="150" height="145" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="1339" y="379" width="52" height="52" rx="17" fill="url(#green)" filter="url(#glow)"/>
        <text x="1365" y="413" text-anchor="middle" font-size="24">U</text>
        <text x="1407" y="401" class="label">User</text>
        <text x="1349" y="439" class="small">email/UI</text>
        <text x="1349" y="461" class="small">result visible</text>
    </g>
    <path d="M345 350 C380 295 395 300 430 308" class="flow dash"/>
    <path d="M345 380 C385 465 395 535 430 565" class="flow dash"/>
    <path d="M665 575 C710 520 720 455 745 430" class="event dash"/>
    <path d="M980 435 H1065" class="event dash"/>
    <path d="M1305 435 H1325" class="flow dash"/>
    <path d="M1185 365 C1150 285 750 235 548 235" class="metric dash"/>
    <g>
        <text x="370" y="285" class="tiny">cache check</text>
        <text x="365" y="530" class="tiny">persist</text>
        <text x="685" y="505" class="tiny">publish</text>
        <text x="1000" y="410" class="tiny">consume</text>
    </g>
    <g>
        <rect x="90" y="710" width="380" height="116" rx="18" fill="#020617" fill-opacity=".62" stroke="#94a3b8"
              stroke-opacity=".28"/>
        <text x="108" y="740" class="tiny">LEGEND</text>
        <path d="M108 762 H180" class="flow"/>
        <text x="198" y="767" class="small">HTTP/API control request</text>
        <path d="M108 788 H180" class="event"/>
        <text x="198" y="793" class="small">Async event/message path</text>
        <path d="M108 814 H180" class="metric"/>
        <text x="198" y="819" class="small">Metrics/logs/telemetry</text>
    </g>

</svg>