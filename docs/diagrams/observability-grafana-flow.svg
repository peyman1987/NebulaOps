<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-label="Observability Pipeline">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#110829"/>
        </linearGradient>
        <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#11233a" stop-opacity=".92"/>
            <stop offset="1" stop-color="#1a1235" stop-opacity=".92"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/>
        </marker>
        <style><![CDATA[
        .title{font:800 34px Inter,Segoe UI,Arial;fill:#f5fbff}.sub{font:500 16px Inter,Segoe UI,Arial;fill:#a9bdd8}.label{font:800 18px Inter,Segoe UI,Arial;fill:#fff}.small{font:500 13px Inter,Segoe UI,Arial;fill:#b8c8dd}.chip{font:700 12px Inter,Segoe UI,Arial;fill:#07111f}.panel{fill:url(#card);stroke:#294b73;stroke-width:1.4;rx:24}.core{fill:#0c2037;stroke:#58e7ff;stroke-width:2.2;filter:url(#glow)}.api{stroke:#58e7ff}.event{stroke:#b476ff;stroke-dasharray:10 8}.metric{stroke:#63ffb3;stroke-dasharray:4 7}.flow{fill:none;stroke-width:3;marker-end:url(#arrow);filter:url(#glow);opacity:.95}.pulse{animation:pulse 2.8s ease-in-out infinite}.dash{animation:dash 7s linear infinite}@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}@keyframes dash{to{stroke-dashoffset:-160}}
      ]]></style>
    </defs>
    <rect width="1400" height="820" fill="url(#bg)"/>
    <path d="M60 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M140 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M220 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M300 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M380 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M460 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M540 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M620 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M700 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M780 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M860 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M940 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1020 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1100 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1180 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1260 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1340 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M40 140 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 210 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 280 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 350 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 420 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 490 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 560 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 630 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 700 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 770 H1360" stroke="#163150" stroke-opacity=".22"/>
    <text x="70" y="72" class="title">Observability Pipeline</text>
    <text x="72" y="102" class="sub">Prometheus scrapes service metrics and Grafana presents operational dashboards.
    </text>
    <g class="pulse">
        <rect x="95.0" y="204.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="129.0" cy="242" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="153.0" y="242" class="label">Services</text>
        <text x="123.0" y="274" class="small">Spring Boot Actuator</text>
        <text x="123.0" y="294" class="small">Go metrics endpoints</text>
        <text x="123.0" y="314" class="small">Health probes</text>
    </g>
    <g class="pulse">
        <rect x="410.0" y="190.0" width="300" height="140" class="core" rx="24"/>
        <circle cx="444.0" cy="242" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="468.0" y="242" class="label">Prometheus</text>
        <text x="438.0" y="274" class="small">Scrape targets</text>
        <text x="438.0" y="294" class="small">Store time series</text>
        <text x="438.0" y="314" class="small">Evaluate queries</text>
    </g>
    <g class="pulse">
        <rect x="775.0" y="204.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="809.0" cy="242" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="833.0" y="242" class="label">Grafana</text>
        <text x="803.0" y="274" class="small">Dashboards</text>
        <text x="803.0" y="294" class="small">Panels and alerts</text>
        <text x="803.0" y="314" class="small">Prometheus datasource</text>
    </g>
    <g class="pulse">
        <rect x="1055.0" y="204.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="1089.0" cy="242" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="1113.0" y="242" class="label">Operator</text>
        <text x="1083.0" y="274" class="small">Inspect health</text>
        <text x="1083.0" y="294" class="small">Review latency</text>
        <text x="1083.0" y="314" class="small">Debug failures</text>
    </g>
    <g class="pulse">
        <rect x="435.0" y="504.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="469.0" cy="542" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="493.0" y="542" class="label">Logs</text>
        <text x="463.0" y="574" class="small">Container logs</text>
        <text x="463.0" y="594" class="small">Gateway diagnostics</text>
        <text x="463.0" y="614" class="small">Auto-refresh UI</text>
    </g>
    <g class="pulse">
        <rect x="775.0" y="504.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="809.0" cy="542" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="833.0" y="542" class="label">SLO View</text>
        <text x="803.0" y="574" class="small">Availability</text>
        <text x="803.0" y="594" class="small">Error rate</text>
        <text x="803.0" y="614" class="small">Latency trend</text>
    </g>
    <path class="flow dash metric" d="M220 260 C 390.0 260, 390.0 260, 560 260"/>
    <text x="340.0" y="252.0" class="small">scrape</text>
    <path class="flow dash metric" d="M560 260 C 730.0 260, 730.0 260, 900 260"/>
    <text x="680.0" y="252.0" class="small">query</text>
    <path class="flow dash api" d="M900 260 C 1040.0 260, 1040.0 260, 1180 260"/>
    <text x="990.0" y="252.0" class="small">visualize</text>
    <path class="flow dash metric" d="M220 260 C 390.0 260, 390.0 560, 560 560"/>
    <text x="340.0" y="402.0" class="small">logs</text>
    <path class="flow dash metric" d="M560 260 C 730.0 260, 730.0 560, 900 560"/>
    <text x="680.0" y="402.0" class="small">SLO</text>
    <path class="flow dash api" d="M900 560 C 1040.0 560, 1040.0 260, 1180 260"/>
    <text x="990.0" y="402.0" class="small">review</text>
    <rect x="980" y="58" width="112" height="26" rx="13" fill="#58e7ff" opacity=".9"/>
    <text x="994" y="76" class="chip">API/request</text>
    <rect x="1110" y="58" width="112" height="26" rx="13" fill="#b476ff" opacity=".9"/>
    <text x="1124" y="76" class="chip">Async event</text>
    <rect x="1240" y="58" width="112" height="26" rx="13" fill="#63ffb3" opacity=".9"/>
    <text x="1254" y="76" class="chip">Metrics/logs</text>
</svg>