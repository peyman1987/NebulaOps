<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-label="NebulaOps v20.2 DevSecOps Module">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#06142f"/>
            <stop offset=".45" stop-color="#0b1028"/>
            <stop offset="1" stop-color="#111827"/>
        </linearGradient>
        <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0f3552" stop-opacity=".96"/>
            <stop offset="1" stop-color="#111a3d" stop-opacity=".92"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#38bdf8"/>
            <stop offset=".5" stop-color="#8b5cf6"/>
            <stop offset="1" stop-color="#22d3ee"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <style>
            .bg{fill:url(#bg)} .panel{fill:#071126;stroke:#38bdf8;stroke-opacity:.26;stroke-width:1.5}
            .node rect{fill:url(#card);stroke:#67e8f9;stroke-opacity:.42;stroke-width:1.4;filter:url(#glow)}
            .link{fill:none;stroke:url(#accent);stroke-width:4;stroke-linecap:round;stroke-dasharray:9 9;opacity:.8}
            .title{font:900 34px Inter,Arial,sans-serif;fill:#e0f2fe;letter-spacing:.02em}
            .sub{font:600 15px Inter,Arial,sans-serif;fill:#a5f3fc} .flow{font:700 14px
            Inter,Arial,sans-serif;fill:#c4b5fd}
            .h{font:900 15px Inter,Arial,sans-serif;fill:#fff} .b{font:700 12px Inter,Arial,sans-serif;fill:#bfdbfe}
            .chip{fill:#0c2440;stroke:#60a5fa;stroke-opacity:.5} .chipText{font:800 12px
            Inter,Arial,sans-serif;fill:#e0f2fe}
            .pulse{fill:#0ea5e9;fill-opacity:.14;stroke:#67e8f9;stroke-opacity:.5} .small{font:800 10px
            Inter,Arial,sans-serif;fill:#f8fafc}
            .badge{fill:#111c44;stroke:#a78bfa;stroke-width:1.2} .badgeText{font:900 12px
            Inter,Arial,sans-serif;fill:#ddd6fe;letter-spacing:.12em}
        </style>
    </defs>
    <rect class="bg" width="960" height="600" rx="34"/>
    <rect class="panel" x="22" y="22" width="916" height="556" rx="30"/>
    <rect class="badge" x="706" y="44" width="190" height="34" rx="17"/>
    <text class="badgeText" x="801" y="66" text-anchor="middle">NEBULAOPS v20.2</text>
    <text class="title" x="48" y="72">DevSecOps Module</text>
    <text class="sub" x="50" y="104">Trivy, SAST, secrets, CVE dashboard, compliance gates</text>
    <text class="flow" x="50" y="134">CI/CD → scans → risk score → policy decision</text>
    <g class="node" transform="translate(40,180)">
        <rect width="125" height="118" rx="22"/>
        <text class="h" x="62" y="34" text-anchor="middle">Dashboard</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="0">Home KPIs</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="18">feature launcher</text>
    </g>
    <path class="link" d="M165 239 C 185 239 170 239 190 239"/>
    <g class="node" transform="translate(190,180)">
        <rect width="125" height="118" rx="22"/>
        <text class="h" x="62" y="34" text-anchor="middle">Sidebar</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="0">Pages</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="18">per module</text>
    </g>
    <path class="link" d="M315 239 C 335 239 320 239 340 239"/>
    <g class="node" transform="translate(340,180)">
        <rect width="125" height="118" rx="22"/>
        <text class="h" x="62" y="34" text-anchor="middle">Gateway</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="0">REST + WS</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="18">auth/routing</text>
    </g>
    <path class="link" d="M465 239 C 485 239 470 239 490 239"/>
    <g class="node" transform="translate(490,180)">
        <rect width="125" height="118" rx="22"/>
        <text class="h" x="62" y="34" text-anchor="middle">Services</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="0">Java BE</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="18">Go workers</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="36">Python AI</text>
    </g>
    <path class="link" d="M615 239 C 635 239 620 239 640 239"/>
    <g class="node" transform="translate(640,180)">
        <rect width="125" height="118" rx="22"/>
        <text class="h" x="62" y="34" text-anchor="middle">Runtime</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="0">Docker</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="18">Kubernetes</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="36">GitOps</text>
    </g>
    <path class="link" d="M765 239 C 785 239 770 239 790 239"/>
    <g class="node" transform="translate(790,180)">
        <rect width="125" height="118" rx="22"/>
        <text class="h" x="62" y="34" text-anchor="middle">Telemetry</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="0">Prometheus</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="18">Loki</text>
        <text class="b" x="62" y="64" text-anchor="middle" dy="36">Tempo</text>
    </g>
    <rect class="chip" x="52" y="360" width="118" height="30" rx="15"/>
    <text class="chipText" x="111" y="380" dy="0" text-anchor="middle">Grafana</text>
    <rect class="chip" x="197" y="360" width="118" height="30" rx="15"/>
    <text class="chipText" x="256" y="380" dy="0" text-anchor="middle">ArgoCD</text>
    <rect class="chip" x="342" y="360" width="118" height="30" rx="15"/>
    <text class="chipText" x="401" y="380" dy="0" text-anchor="middle">Prometheus</text>
    <rect class="chip" x="487" y="360" width="118" height="30" rx="15"/>
    <text class="chipText" x="546" y="380" dy="0" text-anchor="middle">Loki</text>
    <rect class="chip" x="632" y="360" width="118" height="30" rx="15"/>
    <text class="chipText" x="691" y="380" dy="0" text-anchor="middle">Tempo</text>
    <rect class="chip" x="777" y="360" width="118" height="30" rx="15"/>
    <text class="chipText" x="836" y="380" dy="0" text-anchor="middle">Helm</text>
    <rect class="chip" x="52" y="406" width="118" height="30" rx="15"/>
    <text class="chipText" x="111" y="380" dy="46" text-anchor="middle">Terraform</text>
    <rect class="chip" x="197" y="406" width="118" height="30" rx="15"/>
    <text class="chipText" x="256" y="380" dy="46" text-anchor="middle">Trivy</text>
    <rect class="chip" x="342" y="406" width="118" height="30" rx="15"/>
    <text class="chipText" x="401" y="380" dy="46" text-anchor="middle">Docker</text>
    <rect class="chip" x="487" y="406" width="118" height="30" rx="15"/>
    <text class="chipText" x="546" y="380" dy="46" text-anchor="middle">OpenLens</text>
    <rect class="chip" x="632" y="406" width="118" height="30" rx="15"/>
    <text class="chipText" x="691" y="380" dy="46" text-anchor="middle">RabbitMQ</text>
    <rect class="chip" x="777" y="406" width="118" height="30" rx="15"/>
    <text class="chipText" x="836" y="380" dy="46" text-anchor="middle">Redis</text>
    <circle class="pulse" cx="120" cy="510" r="30"/>
    <text class="small" x="120" y="516" text-anchor="middle">Real APIs</text>
    <circle class="pulse" cx="280" cy="510" r="30"/>
    <text class="small" x="280" y="516" text-anchor="middle">Live health</text>
    <circle class="pulse" cx="440" cy="510" r="30"/>
    <text class="small" x="440" y="516" text-anchor="middle">No static placeholders</text>
    <circle class="pulse" cx="600" cy="510" r="30"/>
    <text class="small" x="600" y="516" text-anchor="middle">Page routing</text>
    <circle class="pulse" cx="760" cy="510" r="30"/>
    <text class="small" x="760" y="516" text-anchor="middle">Action controls</text>
</svg>