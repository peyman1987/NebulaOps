<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop stop-color="#020617"/>
            <stop offset=".55" stop-color="#071633"/>
            <stop offset="1" stop-color="#111827"/>
        </linearGradient>
        <linearGradient id="beam" x1="0" x2="1">
            <stop stop-color="#38bdf8"/>
            <stop offset=".5" stop-color="#326ce5"/>
            <stop offset="1" stop-color="#a78bfa"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
            <path d="M42 0H0v42" fill="none" stroke="#38bdf8" stroke-opacity=".13"/>
        </pattern>
        <style>
            .title{font:900 54px Inter,Arial;fill:#e0f2fe}.sub{font:500 22px
            Inter,Arial;fill:#93c5fd}.node{fill:#0f172a;stroke:#60a5fa;stroke-width:2;filter:url(#glow)}.node-ok{stroke:#2dd4bf}.node-warn{stroke:#fbbf24}.node-bad{stroke:#fb7185}.txt{font:800
            22px Inter,Arial;fill:white}.small{font:600 15px
            Inter,Arial;fill:#bae6fd}.beam{stroke:url(#beam);stroke-width:4;stroke-dasharray:12
            18;filter:url(#glow)}.hot{stroke:#fb7185}.bar-bg{fill:#172554}.bar{fill:url(#beam)}
            @keyframes dash{to{stroke-dashoffset:-120}}@keyframes pulse{50%{r:58;opacity:.55}}@keyframes
            float{50%{transform:translateY(-10px)}}.beam{animation:dash 2s linear infinite}.badpulse{animation:pulse 1s
            ease-in-out infinite}.float{animation:float 4s ease-in-out infinite}
        </style>
    </defs>
    <rect width="1400" height="860" fill="url(#bg)"/>
    <rect width="1400" height="860" fill="url(#grid)" opacity=".8"/>
    <text x="70" y="90" class="title">NebulaOps v19.3 · Kubernetes Visual Cluster</text>
    <text x="72" y="128" class="sub">3D topology · live pods · services · ingress · volumes · logs · terminal · metrics
        · events · YAML
    </text>
    <g opacity=".85">
        <path class="beam" d="M170 420 C260 260 360 245 470 260"/>
        <path class="beam hot" d="M530 300 C610 350 650 385 715 430"/>
        <path class="beam" d="M770 390 C880 250 955 250 1060 285"/>
        <path class="beam" d="M785 475 C900 585 1000 610 1125 635"/>
        <path class="beam" d="M1125 330 C1190 415 1195 520 1138 605"/>
    </g>
    <g class="float">
        <circle cx="170" cy="420" r="70" class="node node-ok"/>
        <text x="130" y="412" class="txt">Ingress</text>
        <text x="114" y="442" class="small">edge traffic</text>
    </g>
    <g class="float">
        <circle cx="490" cy="270" r="78" class="node node-warn"/>
        <text x="442" y="258" class="txt">Frontend</text>
        <text x="430" y="289" class="small">pods x2 · cpu 58%</text>
        <rect x="430" y="312" width="120" height="10" rx="5" class="bar-bg"/>
        <rect x="430" y="312" width="70" height="10" rx="5" class="bar"/>
    </g>
    <g class="float">
        <circle cx="735" cy="435" r="82" class="node node-bad"/>
        <circle cx="735" cy="435" r="92" fill="none" stroke="#fb7185" stroke-width="5" opacity=".35" class="badpulse"/>
        <text x="683" y="424" class="txt">Gateway</text>
        <text x="660" y="455" class="small">CrashLoop · cpu 91%</text>
        <rect x="675" y="478" width="120" height="10" rx="5" class="bar-bg"/>
        <rect x="675" y="478" width="110" height="10" rx="5" fill="#fb7185"/>
    </g>
    <g class="float">
        <circle cx="1080" cy="295" r="74" class="node node-warn"/>
        <text x="1038" y="285" class="txt">Tasks</text>
        <text x="1015" y="316" class="small">deploy · hpa watch</text>
    </g>
    <g class="float">
        <circle cx="1125" cy="635" r="74" class="node node-ok"/>
        <text x="1076" y="626" class="txt">MongoDB</text>
        <text x="1064" y="657" class="small">statefulset + pvc</text>
    </g>
    <g class="float">
        <rect x="535" y="650" width="190" height="90" rx="28" class="node node-ok"/>
        <text x="585" y="690" class="txt">RabbitMQ</text>
        <text x="575" y="720" class="small">queue mesh healthy</text>
    </g>
    <g transform="translate(70 720)">
        <rect width="390" height="80" rx="24" fill="#0f172a" stroke="#38bdf8" opacity=".9"/>
        <text x="28" y="35" class="small">WOW EFFECT</text>
        <text x="28" y="63" class="txt">Pod restart pulse + animated blast radius</text>
    </g>
</svg>