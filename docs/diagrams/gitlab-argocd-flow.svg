<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img"
     aria-labelledby="title desc">
    <title id="title">GitLab CI and Argo CD GitOps Flow</title>
    <desc id="desc">Developer pushes code to GitLab. Pipeline validates, tests, builds images, pushes to registry and
        packages Helm. Argo CD syncs the Helm chart to Kubernetes.
    </desc>
    <style>
        .bg{fill:#0b1020}.box{fill:#111a2e;stroke:#38bdf8;stroke-width:2;rx:16}.git{stroke:#f97316}.argo{stroke:#ef4444}.k8s{stroke:#818cf8}.txt{fill:#e5e7eb;font:600
        16px Arial}.small{fill:#cbd5e1;font:12px
        Arial}.line{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7
        5}.pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
        </marker>
    </defs>
    <rect class="bg" width="1180" height="520"/>
    <text x="40" y="48" class="txt" font-size="24">GitLab CI/CD + Argo CD GitOps</text>
    <text x="40" y="72" class="small">CI builds artifacts; CD reconciles cluster state from Git.</text>
    <rect class="box" x="50" y="165" width="150" height="78"/>
    <text class="txt" x="85" y="196">Developer</text>
    <text class="small" x="80" y="220">git push / MR</text>
    <rect class="box git" x="260" y="165" width="170" height="78"/>
    <text class="txt" x="308" y="196">GitLab</text>
    <text class="small" x="295" y="220">repository</text>
    <rect class="box git" x="500" y="85" width="180" height="70"/>
    <text class="txt" x="548" y="117">Validate</text>
    <text class="small" x="532" y="139">YAML + package</text>
    <rect class="box git" x="500" y="185" width="180" height="70"/>
    <text class="txt" x="568" y="217">Test</text>
    <text class="small" x="535" y="239">Go + Java + Angular</text>
    <rect class="box git" x="500" y="285" width="180" height="70"/>
    <text class="txt" x="565" y="317">Build</text>
    <text class="small" x="535" y="339">Docker images</text>
    <rect class="box git" x="500" y="385" width="180" height="70"/>
    <text class="txt" x="553" y="417">Package</text>
    <text class="small" x="536" y="439">Helm chart</text>
    <rect class="box" x="760" y="235" width="170" height="78"/>
    <text class="txt" x="792" y="266">Container</text>
    <text class="txt" x="803" y="287">Registry</text>
    <rect class="box argo" x="760" y="365" width="170" height="78"/>
    <text class="txt" x="815" y="396">Argo CD</text>
    <text class="small" x="797" y="420">GitOps controller</text>
    <rect class="box k8s" x="1000" y="300" width="150" height="86"/>
    <text class="txt" x="1030" y="332">Kubernetes</text>
    <text class="small" x="1025" y="356">Helm release</text>
    <path class="line pulse" d="M200 204 H260"/>
    <path class="line" d="M430 204 C455 204 455 120 500 120"/>
    <path class="line" d="M430 204 H500"/>
    <path class="line" d="M430 204 C455 204 455 320 500 320"/>
    <path class="line" d="M430 204 C455 204 455 420 500 420"/>
    <path class="line" d="M680 320 C710 320 720 274 760 274"/>
    <path class="line" d="M680 420 H760"/>
    <path class="line dash pulse" d="M930 404 C970 404 960 343 1000 343"/>
    <path class="line dash" d="M845 365 C845 250 430 150 430 204"/>
    <path class="line" d="M930 274 C970 274 955 330 1000 343"/>
</svg>
