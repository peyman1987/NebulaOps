<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img"
     aria-label="GitLab CI and Argo CD Flow">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#172033"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1">
            <stop offset="0" stop-color="#0f172a"/>
            <stop offset="1" stop-color="#111827"/>
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/>
        </filter>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2,2 L10,6 L2,10 Z" fill="#93c5fd"/>
        </marker>
        <style>
            .card{filter:url(#shadow);animation:float 5s ease-in-out infinite;}
            .line{stroke:#93c5fd;stroke-width:2.6;fill:none;marker-end:url(#arrow);stroke-dasharray:7 7;animation:dash
            1.7s linear infinite;}
            .title{fill:#f8fafc;font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;}
            .sub{fill:#9fb3c8;font-family:Inter,Segoe UI,Arial,sans-serif;}
            @keyframes dash{to{stroke-dashoffset:-28;}}
            @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
            @keyframes glow{0%,100%{opacity:.4}50%{opacity:1}}
        </style>
    </defs>
    <rect width="1200" height="680" fill="url(#bg)"/>
    <circle cx="1080" cy="70" r="95" fill="#2563eb" opacity="0.10">
        <animate attributeName="r" values="85;110;85" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="58" font-size="30" class="title">GitLab CI and Argo CD Flow</text>
    <text x="60" y="88" font-size="15" class="sub">Validate, build, package and reconcile Kubernetes desired state
    </text>
    <g class="card">
        <rect x="70" y="160" width="210" height="85" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="82.0" y="172.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="175.0" y="198.5" text-anchor="middle" font-size="18" class="title">Developer Commit</text>
        <text x="175.0" y="225.5" text-anchor="middle" font-size="13" class="sub">feature branch</text>
    </g>
    <g class="card">
        <rect x="360" y="160" width="230" height="85" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="372.0" y="172.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="475.0" y="198.5" text-anchor="middle" font-size="18" class="title">GitLab CI</text>
        <text x="475.0" y="225.5" text-anchor="middle" font-size="13" class="sub">validate test build</text>
    </g>
    <g class="card">
        <rect x="680" y="80" width="250" height="85" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="692.0" y="92.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="805.0" y="118.5" text-anchor="middle" font-size="18" class="title">Container Registry</text>
        <text x="805.0" y="145.5" text-anchor="middle" font-size="13" class="sub">versioned images</text>
    </g>
    <g class="card">
        <rect x="680" y="250" width="250" height="85" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="692.0" y="262.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="805.0" y="288.5" text-anchor="middle" font-size="18" class="title">Helm / GitOps Repo</text>
        <text x="805.0" y="315.5" text-anchor="middle" font-size="13" class="sub">desired state</text>
    </g>
    <g class="card">
        <rect x="990" y="250" width="180" height="85" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="1002.0" y="262.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="1080.0" y="288.5" text-anchor="middle" font-size="18" class="title">Argo CD</text>
        <text x="1080.0" y="315.5" text-anchor="middle" font-size="13" class="sub">sync controller</text>
    </g>
    <g class="card">
        <rect x="990" y="80" width="180" height="85" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="1002.0" y="92.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="1080.0" y="118.5" text-anchor="middle" font-size="18" class="title">Kubernetes</text>
        <text x="1080.0" y="145.5" text-anchor="middle" font-size="13" class="sub">running platform</text>
    </g>
    <path class="line" d="M280,202 L360,202"/>
    <text x="320.0" y="194.0" text-anchor="middle" font-size="12" class="sub">push</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.2s" repeatCount="indefinite" path="M280,202 L360,202"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M590,202 L680,122"/>
    <text x="635.0" y="154.0" text-anchor="middle" font-size="12" class="sub">image</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.4000000000000004s" repeatCount="indefinite" path="M590,202 L680,122"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.4000000000000004s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M590,202 L680,292"/>
    <text x="635.0" y="239.0" text-anchor="middle" font-size="12" class="sub">chart</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.6s" repeatCount="indefinite" path="M590,202 L680,292"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M930,292 L990,292"/>
    <text x="960.0" y="284.0" text-anchor="middle" font-size="12" class="sub">sync</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.8000000000000003s" repeatCount="indefinite" path="M930,292 L990,292"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.8000000000000003s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M1080,250 L1080,165"/>
    <text x="1080.0" y="199.5" text-anchor="middle" font-size="12" class="sub">reconcile</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="3.0s" repeatCount="indefinite" path="M1080,250 L1080,165"/>
        <animate attributeName="opacity" values="0;1;0" dur="3.0s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="645" font-size="12" class="sub">NebulaOps — optimized without Kafka/Zookeeper</text>
</svg>
