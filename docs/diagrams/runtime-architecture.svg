<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img"
     aria-labelledby="title desc">
    <title id="title">NebulaOps Runtime Architecture</title>
    <desc id="desc">Angular frontend routes through Spring Cloud Gateway to Spring Boot and Go services, backed by
        MongoDB, Kafka, Redis and RabbitMQ with Prometheus and Grafana observability.
    </desc>
    <style>
        .bg{fill:#0b1020}.box{fill:#111a2e;stroke:#5eead4;stroke-width:2;rx:14}.go{stroke:#60a5fa}.data{stroke:#fbbf24}.ops{stroke:#c084fc}.txt{fill:#e5e7eb;font:600
        16px Arial}.small{fill:#cbd5e1;font:12px
        Arial}.line{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#arrow)}.event{stroke:#f472b6;stroke-dasharray:7
        5}.cache{stroke:#34d399;stroke-dasharray:5 4}.pulse{animation:pulse 1.8s infinite}@keyframes
        pulse{0%,100%{opacity:.35}50%{opacity:1}}
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
        </marker>
    </defs>
    <rect class="bg" width="1180" height="640"/>
    <text x="40" y="44" class="txt" font-size="24">NebulaOps Runtime Architecture</text>
    <text x="40" y="68" class="small">v11: Angular + Spring Boot + Go + MongoDB + Kafka + Redis + RabbitMQ + Helm +
        GitLab + Argo CD
    </text>
    <rect class="box" x="60" y="130" width="190" height="78"/>
    <text class="txt" x="92" y="163">Angular SPA</text>
    <text class="small" x="92" y="187">CDK drag/drop UI</text>
    <rect class="box" x="330" y="130" width="210" height="78"/>
    <text class="txt" x="365" y="163">Spring Gateway</text>
    <text class="small" x="365" y="187">routing + edge API</text>
    <rect class="box" x="640" y="70" width="190" height="70"/>
    <text class="txt" x="690" y="102">Auth</text>
    <text class="small" x="678" y="124">Spring Boot</text>
    <rect class="box" x="640" y="170" width="190" height="70"/>
    <text class="txt" x="690" y="202">Task</text>
    <text class="small" x="678" y="224">Spring Boot</text>
    <rect class="box" x="640" y="270" width="190" height="70"/>
    <text class="txt" x="695" y="302">File</text>
    <text class="small" x="680" y="324">Spring Boot</text>
    <rect class="box" x="640" y="370" width="190" height="70"/>
    <text class="txt" x="660" y="402">Notification</text>
    <text class="small" x="680" y="424">Spring Boot</text>
    <rect class="box go" x="910" y="180" width="190" height="70"/>
    <text class="txt" x="955" y="212">Go Cache</text>
    <text class="small" x="948" y="234">Redis-backed API</text>
    <rect class="box go" x="910" y="370" width="190" height="70"/>
    <text class="txt" x="948" y="402">Go Worker</text>
    <text class="small" x="940" y="424">RabbitMQ consumer</text>
    <rect class="box data" x="350" y="500" width="170" height="68"/>
    <text class="txt" x="398" y="532">MongoDB</text>
    <text class="small" x="386" y="553">service databases</text>
    <rect class="box data" x="570" y="500" width="170" height="68"/>
    <text class="txt" x="625" y="532">Kafka</text>
    <text class="small" x="603" y="553">event stream</text>
    <rect class="box data" x="790" y="500" width="170" height="68"/>
    <text class="txt" x="840" y="532">Redis</text>
    <text class="small" x="821" y="553">cache + rate limit</text>
    <rect class="box data" x="990" y="500" width="150" height="68"/>
    <text class="txt" x="1027" y="532">RabbitMQ</text>
    <text class="small" x="1022" y="553">job queues</text>
    <rect class="box ops" x="60" y="300" width="190" height="70"/>
    <text class="txt" x="102" y="332">Prometheus</text>
    <text class="small" x="94" y="354">metrics scraping</text>
    <rect class="box ops" x="60" y="410" width="190" height="70"/>
    <text class="txt" x="113" y="442">Grafana</text>
    <text class="small" x="104" y="464">dashboards as code</text>
    <path class="line pulse" d="M250 169 H330"/>
    <path class="line" d="M540 169 C580 169 590 105 640 105"/>
    <path class="line" d="M540 169 H640"/>
    <path class="line" d="M540 169 C585 169 590 305 640 305"/>
    <path class="line" d="M540 169 C585 169 590 405 640 405"/>
    <path class="line event pulse" d="M830 205 C865 205 865 535 570 535"/>
    <path class="line event" d="M740 535 C810 535 860 405 910 405"/>
    <path class="line cache" d="M830 215 H910"/>
    <path class="line cache" d="M1005 250 C1005 300 875 455 875 500"/>
    <path class="line event" d="M830 405 H910"/>
    <path class="line event" d="M1065 440 V500"/>
    <path class="line" d="M735 140 C735 480 435 480 435 500"/>
    <path class="line" d="M735 240 C735 475 435 475 435 500"/>
    <path class="line" d="M735 340 C735 475 435 475 435 500"/>
    <path class="line" d="M735 440 C735 475 435 475 435 500"/>
    <path class="line" d="M640 110 C430 110 255 300 250 330"/>
    <path class="line" d="M250 335 C300 335 600 190 640 200"/>
    <path class="line" d="M250 335 C410 335 560 300 640 305"/>
    <path class="line" d="M250 370 V410"/>
</svg>
