<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img"
     aria-label="NebulaOps v18 Terraform Control Plane">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#070A16"/>
            <stop offset=".45" stop-color="#111A38"/>
            <stop offset="1" stop-color="#160B2E"/>
        </linearGradient>
        <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6EE7FF"/>
            <stop offset="1" stop-color="#7C3AED"/>
        </linearGradient>
        <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FF4FD8"/>
            <stop offset="1" stop-color="#22D3EE"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="7" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="shadow">
            <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".55"/>
        </filter>
        <style>
            .title{font:800 54px Inter,Segoe UI,sans-serif;fill:white}.sub{font:500 22px Inter,Segoe
            UI,sans-serif;fill:#AFC7FF}.txt{font:700 24px Inter,Segoe UI,sans-serif;fill:white}.small{font:500 16px
            Inter,Segoe
            UI,sans-serif;fill:#B8C5E8}.box{fill:#101A36;stroke:#57E5FF;stroke-width:2;rx:28;filter:url(#shadow)}.box2{fill:#161033;stroke:#FF5CDA;stroke-width:2;rx:28;filter:url(#shadow)}.pill{fill:#0B1024;stroke:#7DD3FC;stroke-width:1.4;rx:18}.line{stroke:url(#cyan);stroke-width:5;fill:none;filter:url(#glow);stroke-linecap:round}.dash{stroke-dasharray:14
            16;animation:flow 2.2s linear infinite}.pulse{animation:pulse 2.7s ease-in-out
            infinite}.float{animation:float 5s ease-in-out infinite}.spin{transform-origin:center;animation:spin 22s
            linear infinite}@keyframes flow{to{stroke-dashoffset:-120}}@keyframes pulse{50%{opacity:.45}}@keyframes
            float{50%{transform:translateY(-12px)}}@keyframes spin{to{transform:rotate(360deg)}}
        </style>
    </defs>
    <rect width="1600" height="980" fill="url(#bg)"/>
    <circle cx="1370" cy="140" r="210" fill="#193866" opacity=".32" filter="url(#glow)"/>
    <circle cx="230" cy="850" r="260" fill="#4C1D95" opacity=".28" filter="url(#glow)"/>
    <text x="80" y="90" class="title">NebulaOps v18</text>
    <text x="82" y="128" class="sub">Terraform Control Plane · Angular Cockpit · Kubernetes · Helm · Observability ·
        GitOps
    </text>

    <g class="spin" opacity=".32">
        <ellipse cx="800" cy="510" rx="560" ry="245" fill="none" stroke="#58E5FF" stroke-width="2"
                 stroke-dasharray="10 14"/>
        <ellipse cx="800" cy="510" rx="680" ry="315" fill="none" stroke="#FF4FD8" stroke-width="2"
                 stroke-dasharray="8 18"/>
    </g>

    <path class="line dash" d="M290 275 C445 210, 560 240, 690 320"/>
    <path class="line dash" d="M910 320 C1045 235, 1160 225, 1315 280"/>
    <path class="line dash" d="M1320 410 C1240 570, 1120 650, 965 675"/>
    <path class="line dash" d="M635 675 C500 640, 380 565, 285 430"/>
    <path class="line dash" d="M800 410 L800 620"/>

    <g transform="translate(610 320)" class="float">
        <rect class="box" width="380" height="210"/>
        <text x="54" y="64" class="txt">Angular FE Cockpit</text>
        <text x="54" y="100" class="small">Tabs: Terraform · K8s · Logs · FinOps</text>
        <rect x="54" y="128" width="92" height="34" class="pill"/>
        <text x="76" y="151" class="small">Login</text>
        <rect x="158" y="128" width="92" height="34" class="pill"/>
        <text x="179" y="151" class="small">CRUD</text>
        <rect x="262" y="128" width="70" height="34" class="pill"/>
        <text x="284" y="151" class="small">YAML</text>
    </g>

    <g transform="translate(90 240)">
        <rect class="box2" width="340" height="180"/>
        <text x="42" y="58" class="txt">Terraform</text>
        <text x="42" y="94" class="small">root /terraform</text>
        <text x="42" y="124" class="small">modules: kind, apps, security</text>
        <text x="42" y="154" class="small">plan/apply scripts</text>
    </g>

    <g transform="translate(1170 245)">
        <rect class="box" width="340" height="180"/>
        <text x="42" y="58" class="txt">Kubernetes + Helm</text>
        <text x="42" y="94" class="small">namespace, services, ingress</text>
        <text x="42" y="124" class="small">values generated by Terraform</text>
        <text x="42" y="154" class="small">local-first deployment</text>
    </g>

    <g transform="translate(1040 640)">
        <rect class="box2" width="360" height="185"/>
        <text x="42" y="58" class="txt">Observability</text>
        <text x="42" y="94" class="small">Grafana · Prometheus · logs</text>
        <text x="42" y="124" class="small">auto-refresh in FE</text>
        <text x="42" y="154" class="small">health and pipeline gates</text>
    </g>

    <g transform="translate(185 640)">
        <rect class="box" width="360" height="185"/>
        <text x="42" y="58" class="txt">GitOps + Security</text>
        <text x="42" y="94" class="small">ArgoCD notes generated</text>
        <text x="42" y="124" class="small">security baseline configmap</text>
        <text x="42" y="154" class="small">no real secrets committed</text>
    </g>

    <g class="pulse">
        <circle cx="800" cy="510" r="78" fill="url(#pink)" opacity=".84" filter="url(#glow)"/>
        <text x="748" y="501" class="txt">v18</text>
        <text x="712" y="533" class="small" fill="white">Control Plane</text>
    </g>

    <g transform="translate(80 890)">
        <rect x="0" y="0" width="1440" height="48" rx="24" fill="#081124" stroke="#2DD4BF" opacity=".84"/>
        <text x="30" y="31" class="small">Flow: terraform plan/apply → generated local manifests → Helm/Kubernetes
            deployment → FE cockpit → observability/security/finops feedback loop
        </text>
    </g>
</svg>
