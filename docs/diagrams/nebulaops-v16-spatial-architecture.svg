<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" role="img"
     aria-labelledby="title desc">
    <title id="title">NebulaOps v16 · Spatial platform architecture</title>
    <desc id="desc">Layered 3D architecture showing experience, control, runtime, data and observability planes.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#020617"/>
            <stop offset=".45" stop-color="#06163a"/>
            <stop offset="1" stop-color="#18062e"/>
        </linearGradient>
        <radialGradient id="halo" cx="50%" cy="35%" r="65%">
            <stop offset="0" stop-color="#22d3ee" stop-opacity=".34"/>
            <stop offset=".55" stop-color="#7c3aed" stop-opacity=".12"/>
            <stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#e0faff"/>
            <stop offset=".25" stop-color="#22d3ee"/>
            <stop offset="1" stop-color="#2563eb"/>
        </linearGradient>
        <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#f5d0fe"/>
            <stop offset=".35" stop-color="#a855f7"/>
            <stop offset="1" stop-color="#4338ca"/>
        </linearGradient>
        <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#dcfce7"/>
            <stop offset=".35" stop-color="#22c55e"/>
            <stop offset="1" stop-color="#047857"/>
        </linearGradient>
        <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ffedd5"/>
            <stop offset=".35" stop-color="#fb923c"/>
            <stop offset="1" stop-color="#c2410c"/>
        </linearGradient>
        <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#fee2e2"/>
            <stop offset=".35" stop-color="#f43f5e"/>
            <stop offset="1" stop-color="#991b1b"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="soft">
            <feDropShadow dx="0" dy="22" stdDeviation="16" flood-color="#000" flood-opacity=".48"/>
            <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#67e8f9" flood-opacity=".25"/>
        </filter>
        <marker id="arrowC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8"
                orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="#67e8f9"/>
        </marker>
        <marker id="arrowV" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8"
                orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="#c084fc"/>
        </marker>
        <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8"
                orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="#86efac"/>
        </marker>
        <style>
            .title{font:800 38px Inter,Arial,sans-serif;fill:#f8fbff;letter-spacing:-.02em} .sub{font:500 17px
            Inter,Arial,sans-serif;fill:#bdd6f6}
            .label{font:800 20px Inter,Arial,sans-serif;fill:#f8fbff} .small{font:500 13px
            Inter,Arial,sans-serif;fill:#c7d8ef} .tiny{font:700 11px
            Inter,Arial,sans-serif;fill:#a9c3df;text-transform:uppercase;letter-spacing:.08em}
            .lane{fill:#0f172a;fill-opacity:.52;stroke:#2dd4bf;stroke-opacity:.22;stroke-width:1.4} .node{}
            .flow{fill:none;stroke:#67e8f9;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowC);filter:url(#glow)}
            .event{fill:none;stroke:#c084fc;stroke-width:4;stroke-dasharray:13
            10;stroke-linecap:round;marker-end:url(#arrowV)}
            .metric{fill:none;stroke:#86efac;stroke-width:4;stroke-dasharray:4
            9;stroke-linecap:round;marker-end:url(#arrowG)}
            .pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:center} .dash{stroke-dasharray:18
            12;animation:dash 4s linear infinite} .float{animation:float 6s ease-in-out infinite}
            @keyframes dash{to{stroke-dashoffset:-120}} @keyframes pulse{50%{opacity:.52;transform:scale(1.035)}}
            @keyframes float{50%{transform:translateY(-10px)}}
        </style>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)"/>
    <rect width="100%" height="100%" fill="url(#halo)"/>
    <g opacity=".18">
        <path d="M0 120 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 200 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 280 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 360 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 440 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 520 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 600 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 680 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 760 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 840 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M0 920 H1600" stroke="#93c5fd" stroke-width="1"/>
        <path d="M80 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M160 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M240 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M320 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M400 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M480 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M560 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M640 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M720 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M800 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M880 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M960 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1040 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1120 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1200 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1280 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1360 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1440 0 V950" stroke="#93c5fd" stroke-width="1"/>
        <path d="M1520 0 V950" stroke="#93c5fd" stroke-width="1"/>
    </g>
    <text x="70" y="72" class="title">NebulaOps v16 · Spatial platform architecture</text>
    <text x="70" y="104" class="sub">Layered 3D architecture showing experience, control, runtime, data and
        observability planes.
    </text>

    <rect x="52" y="150" width="1496" height="660" rx="36" class="lane"/>
    <text x="82" y="188" class="tiny">END-TO-END USER REQUEST FLOW · HOW A CLICK BECOMES DATA, EVENT AND METRIC</text>
    <g class="node">
        <path d="M108,242 H338 L320,260 H90 Z" fill="url(#cyan)" opacity=".22"/>
        <path d="M320,260 L338,242 V397 L320,415 Z" fill="#020617" opacity=".45" stroke="#7dd3fc" stroke-opacity=".22"/>
        <rect x="90" y="260" width="230" height="155" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="104" y="274" width="52" height="52" rx="17" fill="url(#cyan)" filter="url(#glow)"/>
        <text x="130" y="308" text-anchor="middle" font-size="24">🖥</text>
        <text x="172" y="296" class="label">Angular FE</text>
        <text x="114" y="334" class="small">3D command center</text>
        <text x="114" y="356" class="small">Tabs: Docker/K8s/Helm</text>
        <text x="114" y="378" class="small">Local service map</text>
    </g>
    <g class="node">
        <path d="M408,212 H648 L630,230 H390 Z" fill="url(#violet)" opacity=".22"/>
        <path d="M630,230 L648,212 V387 L630,405 Z" fill="#020617" opacity=".45" stroke="#7dd3fc" stroke-opacity=".22"/>
        <rect x="390" y="230" width="240" height="175" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="404" y="244" width="52" height="52" rx="17" fill="url(#violet)" filter="url(#glow)"/>
        <text x="430" y="278" text-anchor="middle" font-size="24">⚡</text>
        <text x="472" y="266" class="label">Gateway API</text>
        <text x="414" y="304" class="small">Single UI boundary</text>
        <text x="414" y="326" class="small">/api/docker /api/k8s</text>
        <text x="414" y="348" class="small">/api/grafana /api/helm</text>
    </g>
    <g class="node">
        <path d="M733,242 H973 L955,260 H715 Z" fill="url(#cyan)" opacity=".22"/>
        <path d="M955,260 L973,242 V397 L955,415 Z" fill="#020617" opacity=".45" stroke="#7dd3fc" stroke-opacity=".22"/>
        <rect x="715" y="260" width="240" height="155" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="729" y="274" width="52" height="52" rx="17" fill="url(#cyan)" filter="url(#glow)"/>
        <text x="755" y="308" text-anchor="middle" font-size="24">☕</text>
        <text x="797" y="296" class="label">Domain Services</text>
        <text x="739" y="334" class="small">Auth · Task · File</text>
        <text x="739" y="356" class="small">Notification</text>
        <text x="739" y="378" class="small">Spring Boot APIs</text>
    </g>
    <g class="node">
        <path d="M1053,192 H1273 L1255,210 H1035 Z" fill="url(#green)" opacity=".22"/>
        <path d="M1255,210 L1273,192 V342 L1255,360 Z" fill="#020617" opacity=".45" stroke="#7dd3fc"
              stroke-opacity=".22"/>
        <rect x="1035" y="210" width="220" height="150" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="1049" y="224" width="52" height="52" rx="17" fill="url(#green)" filter="url(#glow)"/>
        <text x="1075" y="258" text-anchor="middle" font-size="24">▣</text>
        <text x="1117" y="246" class="label">Data Plane</text>
        <text x="1059" y="284" class="small">MongoDB documents</text>
        <text x="1059" y="306" class="small">Redis cache</text>
        <text x="1059" y="328" class="small">RabbitMQ queue</text>
    </g>
    <g class="node">
        <path d="M1053,452 H1273 L1255,470 H1035 Z" fill="url(#orange)" opacity=".22"/>
        <path d="M1255,470 L1273,452 V602 L1255,620 Z" fill="#020617" opacity=".45" stroke="#7dd3fc"
              stroke-opacity=".22"/>
        <rect x="1035" y="470" width="220" height="150" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="1049" y="484" width="52" height="52" rx="17" fill="url(#orange)" filter="url(#glow)"/>
        <text x="1075" y="518" text-anchor="middle" font-size="24">◎</text>
        <text x="1117" y="506" class="label">Observability</text>
        <text x="1059" y="544" class="small">Prometheus scrape</text>
        <text x="1059" y="566" class="small">Grafana dashboards</text>
        <text x="1059" y="588" class="small">Health &amp; SLO view</text>
    </g>
    <g class="node">
        <path d="M723,497 H973 L955,515 H705 Z" fill="url(#violet)" opacity=".22"/>
        <path d="M955,515 L973,497 V642 L955,660 Z" fill="#020617" opacity=".45" stroke="#7dd3fc" stroke-opacity=".22"/>
        <rect x="705" y="515" width="250" height="145" rx="22" fill="#081323" fill-opacity=".86" stroke="#7dd3fc"
              stroke-opacity=".48" stroke-width="1.5"/>
        <rect x="719" y="529" width="52" height="52" rx="17" fill="url(#violet)" filter="url(#glow)"/>
        <text x="745" y="563" text-anchor="middle" font-size="24">⎈</text>
        <text x="787" y="551" class="label">Ops Control</text>
        <text x="729" y="589" class="small">Docker Engine</text>
        <text x="729" y="611" class="small">kubectl native</text>
        <text x="729" y="633" class="small">Helm releases</text>
    </g>
    <path d="M320 338 C350 310 360 305 390 312" class="flow dash"/>
    <path d="M630 318 C665 315 680 325 715 337" class="flow dash"/>
    <path d="M955 336 C990 305 1000 290 1035 285" class="flow dash"/>
    <path d="M955 360 C1010 415 1000 470 1035 535" class="metric dash"/>
    <path d="M835 415 C810 455 805 485 810 515" class="event dash"/>
    <path d="M705 590 C570 585 520 450 390 390" class="flow dash"/>
    <circle cx="350" cy="318" r="8" fill="#67e8f9" class="pulse"/>
    <circle cx="675" cy="324" r="8" fill="#67e8f9" class="pulse"/>
    <circle cx="995" cy="306" r="8" fill="#67e8f9" class="pulse"/>
    <g>
        <text x="380" y="282" class="tiny">1. UI action</text>
        <text x="650" y="292" class="tiny">2. REST command</text>
        <text x="962" y="260" class="tiny">3. Persist/cache/publish</text>
        <text x="958" y="462" class="tiny">4. metrics</text>
        <text x="545" y="535" class="tiny">5. operator action</text>
    </g>
    <g>
        <rect x="1090" y="650" width="380" height="116" rx="18" fill="#020617" fill-opacity=".62" stroke="#94a3b8"
              stroke-opacity=".28"/>
        <text x="1108" y="680" class="tiny">LEGEND</text>
        <path d="M1108 702 H1180" class="flow"/>
        <text x="1198" y="707" class="small">HTTP/API control request</text>
        <path d="M1108 728 H1180" class="event"/>
        <text x="1198" y="733" class="small">Async event/message path</text>
        <path d="M1108 754 H1180" class="metric"/>
        <text x="1198" y="759" class="small">Metrics/logs/telemetry</text>
    </g>

</svg>