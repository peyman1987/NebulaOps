<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-label="NebulaOps v17 SaaS Flow">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#110829"/>
        </linearGradient>
        <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#11233a" stop-opacity=".92"/>
            <stop offset="1" stop-color="#1a1235" stop-opacity=".92"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/>
        </marker>
        <style><![CDATA[
        .title{font:800 34px Inter,Segoe UI,Arial;fill:#f5fbff}.sub{font:500 16px Inter,Segoe UI,Arial;fill:#a9bdd8}.label{font:800 18px Inter,Segoe UI,Arial;fill:#fff}.small{font:500 13px Inter,Segoe UI,Arial;fill:#b8c8dd}.chip{font:700 12px Inter,Segoe UI,Arial;fill:#07111f}.panel{fill:url(#card);stroke:#294b73;stroke-width:1.4;rx:24}.core{fill:#0c2037;stroke:#58e7ff;stroke-width:2.2;filter:url(#glow)}.api{stroke:#58e7ff}.event{stroke:#b476ff;stroke-dasharray:10 8}.metric{stroke:#63ffb3;stroke-dasharray:4 7}.flow{fill:none;stroke-width:3;marker-end:url(#arrow);filter:url(#glow);opacity:.95}.pulse{animation:pulse 2.8s ease-in-out infinite}.dash{animation:dash 7s linear infinite}@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}@keyframes dash{to{stroke-dashoffset:-160}}
      ]]></style>
    </defs>
    <rect width="1400" height="820" fill="url(#bg)"/>
    <path d="M60 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M140 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M220 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M300 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M380 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M460 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M540 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M620 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M700 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M780 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M860 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M940 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1020 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1100 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1180 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1260 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1340 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M40 140 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 210 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 280 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 350 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 420 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 490 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 560 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 630 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 700 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 770 H1360" stroke="#163150" stroke-opacity=".22"/>
    <text x="70" y="72" class="title">NebulaOps v17 SaaS Flow</text>
    <text x="72" y="102" class="sub">Browser, Angular, Gateway, services, data stores and observability in one local
        platform.
    </text>
    <g class="pulse">
        <rect x="35.0" y="174.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="69.0" cy="212" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="93.0" y="212" class="label">Browser</text>
        <text x="63.0" y="244" class="small">Operator session</text>
        <text x="63.0" y="264" class="small">Demo login</text>
        <text x="63.0" y="284" class="small">Task actions</text>
    </g>
    <g class="pulse">
        <rect x="305.0" y="174.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="339.0" cy="212" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="363.0" y="212" class="label">Angular UI</text>
        <text x="333.0" y="244" class="small">Operations dashboard</text>
        <text x="333.0" y="264" class="small">Docker/Kubernetes tabs</text>
        <text x="333.0" y="284" class="small">Live YAML editor</text>
    </g>
    <g class="pulse">
        <rect x="550.0" y="160.0" width="300" height="140" class="core" rx="24"/>
        <circle cx="584.0" cy="212" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="608.0" y="212" class="label">Gateway API</text>
        <text x="578.0" y="244" class="small">Spring Cloud Gateway</text>
        <text x="578.0" y="264" class="small">Routing and edge API</text>
        <text x="578.0" y="284" class="small">Runtime command bridge</text>
    </g>
    <g class="pulse">
        <rect x="855.0" y="174.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="889.0" cy="212" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="913.0" y="212" class="label">Services</text>
        <text x="883.0" y="244" class="small">Auth, Task, File</text>
        <text x="883.0" y="264" class="small">Notification</text>
        <text x="883.0" y="284" class="small">Go APIs</text>
    </g>
    <g class="pulse">
        <rect x="1005.0" y="444.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="1039.0" cy="482" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="1063.0" y="482" class="label">Data Layer</text>
        <text x="1033.0" y="514" class="small">MongoDB state</text>
        <text x="1033.0" y="534" class="small">Redis cache</text>
        <text x="1033.0" y="554" class="small">RabbitMQ events</text>
    </g>
    <g class="pulse">
        <rect x="575.0" y="514.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="609.0" cy="552" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="633.0" y="552" class="label">Observability</text>
        <text x="603.0" y="584" class="small">Prometheus scrape</text>
        <text x="603.0" y="604" class="small">Grafana dashboards</text>
        <text x="603.0" y="624" class="small">Health and logs</text>
    </g>
    <path class="flow dash api" d="M160 230 C 295.0 230, 295.0 230, 430 230"/>
    <text x="245.0" y="222.0" class="small">HTTPS</text>
    <path class="flow dash api" d="M430 230 C 565.0 230, 565.0 230, 700 230"/>
    <text x="515.0" y="222.0" class="small">REST</text>
    <path class="flow dash api" d="M700 230 C 840.0 230, 840.0 230, 980 230"/>
    <text x="790.0" y="222.0" class="small">route</text>
    <path class="flow dash event" d="M980 230 C 1055.0 230, 1055.0 500, 1130 500"/>
    <text x="1005.0" y="357.0" class="small">events/cache</text>
    <path class="flow dash metric" d="M980 230 C 840.0 230, 840.0 570, 700 570"/>
    <text x="790.0" y="392.0" class="small">metrics</text>
    <path class="flow dash metric" d="M700 230 C 700.0 230, 700.0 570, 700 570"/>
    <text x="650.0" y="392.0" class="small">health</text>
    <rect x="980" y="58" width="112" height="26" rx="13" fill="#58e7ff" opacity=".9"/>
    <text x="994" y="76" class="chip">API/request</text>
    <rect x="1110" y="58" width="112" height="26" rx="13" fill="#b476ff" opacity=".9"/>
    <text x="1124" y="76" class="chip">Async event</text>
    <rect x="1240" y="58" width="112" height="26" rx="13" fill="#63ffb3" opacity=".9"/>
    <text x="1254" y="76" class="chip">Metrics/logs</text>
</svg>