<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img"
     aria-labelledby="title desc">
    <title id="title">NebulaOps v21.2 DevSecOps Module</title>
    <desc id="desc">Animated DevSecOps architecture with radar, scans, compliance and CVE dashboard.</desc>
    <defs>
        <linearGradient id="bg" x1="0" x2="1">
            <stop stop-color="#020617"/>
            <stop offset="1" stop-color="#300a18"/>
        </linearGradient>
        <linearGradient id="hot" x1="0" x2="1">
            <stop stop-color="#ef4444"/>
            <stop offset=".55" stop-color="#f59e0b"/>
            <stop offset="1" stop-color="#22d3ee"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <style>
            .t{font-family:Segoe
            UI,Arial,sans-serif;fill:#e5f6ff}.muted{fill:#93c5fd}.card{fill:rgba(15,23,42,.78);stroke:#38bdf8;stroke-opacity:.25;rx:28}.danger{stroke:#ef4444;stroke-width:3;filter:url(#glow)}.line{stroke:url(#hot);stroke-width:4;stroke-dasharray:14
            12;animation:dash 3s linear infinite}.pulse{animation:pulse 1.5s ease-in-out
            infinite}.spin{transform-origin:700px 410px;animation:spin 8s linear infinite}@keyframes
            dash{to{stroke-dashoffset:-80}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes
            pulse{50%{opacity:.45;transform:scale(1.04)}}
        </style>
    </defs>
    <rect width="1400" height="820" fill="url(#bg)"/>
    <g opacity=".25" stroke="#38bdf8">
        <path d="M0 80h1400M0 160h1400M0 240h1400M0 320h1400M0 400h1400M0 480h1400M0 560h1400M0 640h1400M0 720h1400"/>
        <path d="M100 0v820M220 0v820M340 0v820M460 0v820M580 0v820M700 0v820M820 0v820M940 0v820M1060 0v820M1180 0v820M1300 0v820"/>
    </g>
    <text x="64" y="70" font-size="36" font-weight="900" class="t">NebulaOps v21.2 · DevSecOps Module</text>
    <text x="64" y="108" font-size="18" class="muted">SECURITY · COMPLIANCE · VULNERABILITIES · Trivy · Docker Image
        Scan · SAST · Secrets · CVE Dashboard
    </text>
    <circle cx="700" cy="410" r="210" fill="none" stroke="#ef4444" stroke-opacity=".35" stroke-width="2"/>
    <circle cx="700" cy="410" r="150" fill="none" stroke="#f59e0b" stroke-opacity=".35" stroke-width="2"/>
    <circle cx="700" cy="410" r="90" fill="none" stroke="#38bdf8" stroke-opacity=".35" stroke-width="2"/>
    <path d="M700 410 L910 410" class="line spin"/>
    <circle cx="700" cy="410" r="52" fill="#0f172a" stroke="#ef4444" stroke-width="3" filter="url(#glow)"/>
    <text x="670" y="402" font-size="28" font-weight="900" class="t">87</text>
    <text x="646" y="432" font-size="15" class="muted">RISK</text>
    <g class="pulse">
        <circle cx="562" cy="322" r="14" fill="#ef4444" filter="url(#glow)"/>
        <circle cx="846" cy="498" r="12" fill="#fb923c" filter="url(#glow)"/>
        <circle cx="930" cy="312" r="10" fill="#facc15" filter="url(#glow)"/>
    </g>
    <rect x="70" y="190" width="315" height="132" class="card danger"/>
    <text x="100" y="242" font-size="28" font-weight="900" class="t">Trivy Scans</text>
    <text x="100" y="280" font-size="18" class="muted">container image CVE + SBOM</text>
    <rect x="70" y="364" width="315" height="132" class="card"/>
    <text x="100" y="416" font-size="28" font-weight="900" class="t">SAST Simulation</text>
    <text x="100" y="454" font-size="18" class="muted">Java/Angular static analysis</text>
    <rect x="70" y="538" width="315" height="132" class="card danger"/>
    <text x="100" y="590" font-size="28" font-weight="900" class="t">Secrets Detection</text>
    <text x="100" y="628" font-size="18" class="muted">repo scan + critical alert</text>
    <rect x="1015" y="190" width="315" height="132" class="card"/>
    <text x="1045" y="242" font-size="28" font-weight="900" class="t">Compliance</text>
    <text x="1045" y="280" font-size="18" class="muted">CIS · NIST · SOC2 · ISO</text>
    <rect x="1015" y="364" width="315" height="132" class="card danger"/>
    <text x="1045" y="416" font-size="28" font-weight="900" class="t">CVE Dashboard</text>
    <text x="1045" y="454" font-size="18" class="muted">critical/high dependency risk</text>
    <rect x="1015" y="538" width="315" height="132" class="card"/>
    <text x="1045" y="590" font-size="28" font-weight="900" class="t">Threat Map</text>
    <text x="1045" y="628" font-size="18" class="muted">radar animations + blast radius</text>
    <path d="M385 256 C500 250 555 330 648 382" class="line" fill="none"/>
    <path d="M385 430 C505 430 555 410 648 410" class="line" fill="none"/>
    <path d="M385 604 C510 570 560 480 653 438" class="line" fill="none"/>
    <path d="M752 382 C850 330 915 250 1015 256" class="line" fill="none"/>
    <path d="M752 410 C860 410 920 430 1015 430" class="line" fill="none"/>
    <path d="M747 438 C850 500 910 570 1015 604" class="line" fill="none"/>
</svg>
