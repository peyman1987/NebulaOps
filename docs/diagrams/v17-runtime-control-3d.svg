<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-label="Runtime Operations Console">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#110829"/>
        </linearGradient>
        <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#11233a" stop-opacity=".92"/>
            <stop offset="1" stop-color="#1a1235" stop-opacity=".92"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/>
        </marker>
        <style><![CDATA[
        .title{font:800 34px Inter,Segoe UI,Arial;fill:#f5fbff}.sub{font:500 16px Inter,Segoe UI,Arial;fill:#a9bdd8}.label{font:800 18px Inter,Segoe UI,Arial;fill:#fff}.small{font:500 13px Inter,Segoe UI,Arial;fill:#b8c8dd}.chip{font:700 12px Inter,Segoe UI,Arial;fill:#07111f}.panel{fill:url(#card);stroke:#294b73;stroke-width:1.4;rx:24}.core{fill:#0c2037;stroke:#58e7ff;stroke-width:2.2;filter:url(#glow)}.api{stroke:#58e7ff}.event{stroke:#b476ff;stroke-dasharray:10 8}.metric{stroke:#63ffb3;stroke-dasharray:4 7}.flow{fill:none;stroke-width:3;marker-end:url(#arrow);filter:url(#glow);opacity:.95}.pulse{animation:pulse 2.8s ease-in-out infinite}.dash{animation:dash 7s linear infinite}@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}@keyframes dash{to{stroke-dashoffset:-160}}
      ]]></style>
    </defs>
    <rect width="1400" height="820" fill="url(#bg)"/>
    <path d="M60 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M140 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M220 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M300 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M380 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M460 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M540 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M620 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M700 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M780 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M860 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M940 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1020 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1100 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1180 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1260 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1340 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M40 140 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 210 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 280 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 350 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 420 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 490 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 560 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 630 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 700 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 770 H1360" stroke="#163150" stroke-opacity=".22"/>
    <text x="70" y="72" class="title">Runtime Operations Console</text>
    <text x="72" y="102" class="sub">Local workstation controls Docker, Kubernetes, Helm and Grafana through a
        professional UI.
    </text>
    <g class="pulse">
        <rect x="55.0" y="364.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="89.0" cy="402" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="113.0" y="402" class="label">Workstation</text>
        <text x="83.0" y="434" class="small">WSL/Linux host</text>
        <text x="83.0" y="454" class="small">Native Docker Engine</text>
        <text x="83.0" y="474" class="small">Local kubeconfig</text>
    </g>
    <g class="pulse">
        <rect x="325.0" y="194.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="359.0" cy="232" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="383.0" y="232" class="label">Docker Runtime</text>
        <text x="353.0" y="264" class="small">Containers/images</text>
        <text x="353.0" y="284" class="small">Stats and lifecycle</text>
        <text x="353.0" y="304" class="small">Compose services</text>
    </g>
    <g class="pulse">
        <rect x="610.0" y="180.0" width="300" height="140" class="core" rx="24"/>
        <circle cx="644.0" cy="232" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="668.0" y="232" class="label">Kubernetes</text>
        <text x="638.0" y="264" class="small">Workloads and pods</text>
        <text x="638.0" y="284" class="small">Services/namespaces</text>
        <text x="638.0" y="304" class="small">Logs and YAML</text>
    </g>
    <g class="pulse">
        <rect x="915.0" y="194.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="949.0" cy="232" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="973.0" y="232" class="label">Helm Releases</text>
        <text x="943.0" y="264" class="small">Charts and values</text>
        <text x="943.0" y="284" class="small">Release inventory</text>
        <text x="943.0" y="304" class="small">Uninstall workflow</text>
    </g>
    <g class="pulse">
        <rect x="915.0" y="514.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="949.0" cy="552" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="973.0" y="552" class="label">Grafana</text>
        <text x="943.0" y="584" class="small">Dashboards</text>
        <text x="943.0" y="604" class="small">Prometheus datasource</text>
        <text x="943.0" y="624" class="small">SLO visibility</text>
    </g>
    <g class="pulse">
        <rect x="395.0" y="514.0" width="250" height="112" class="panel" rx="24"/>
        <circle cx="429.0" cy="552" r="11" fill="#58e7ff" opacity=".9"/>
        <text x="453.0" y="552" class="label">Angular Console</text>
        <text x="423.0" y="584" class="small">Runtime actions</text>
        <text x="423.0" y="604" class="small">Auto-refresh logs</text>
        <text x="423.0" y="624" class="small">Professional UI</text>
    </g>
    <path class="flow dash api" d="M180 420 C 315.0 420, 315.0 250, 450 250"/>
    <text x="265.0" y="327.0" class="small">docker socket</text>
    <path class="flow dash api" d="M450 250 C 605.0 250, 605.0 250, 760 250"/>
    <text x="555.0" y="242.0" class="small">cluster</text>
    <path class="flow dash api" d="M760 250 C 900.0 250, 900.0 250, 1040 250"/>
    <text x="850.0" y="242.0" class="small">deploy</text>
    <path class="flow dash metric" d="M760 250 C 900.0 250, 900.0 570, 1040 570"/>
    <text x="850.0" y="402.0" class="small">metrics</text>
    <path class="flow dash api" d="M520 570 C 485.0 570, 485.0 250, 450 250"/>
    <text x="435.0" y="402.0" class="small">actions</text>
    <path class="flow dash api" d="M520 570 C 640.0 570, 640.0 250, 760 250"/>
    <text x="590.0" y="402.0" class="small">kubectl</text>
    <rect x="980" y="58" width="112" height="26" rx="13" fill="#58e7ff" opacity=".9"/>
    <text x="994" y="76" class="chip">API/request</text>
    <rect x="1110" y="58" width="112" height="26" rx="13" fill="#b476ff" opacity=".9"/>
    <text x="1124" y="76" class="chip">Async event</text>
    <rect x="1240" y="58" width="112" height="26" rx="13" fill="#63ffb3" opacity=".9"/>
    <text x="1254" y="76" class="chip">Metrics/logs</text>
</svg>