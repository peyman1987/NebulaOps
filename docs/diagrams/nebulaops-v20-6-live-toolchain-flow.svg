<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
    <defs>
        <style>.bg{fill:#020617}.title{font:700 28px
            Arial;fill:#f8fafc}.box{fill:#111827;stroke:#22d3ee;stroke-width:2;rx:16}.txt{font:600 16px
            Arial;fill:#e0f2fe}.mini{font:500 13px
            Arial;fill:#94a3b8}.line{stroke:#8b5cf6;stroke-width:3;marker-end:url(#arrow)}
        </style>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6"/>
        </marker>
    </defs>
    <rect class="bg" width="1200" height="680"/>
    <text x="40" y="55" class="title">NebulaOps v21.2 — Live Toolchain Flow</text>
    <rect class="box" x="70" y="130" width="210" height="90"/>
    <text x="110" y="172" class="txt">Frontend UI</text>
    <text x="95" y="198" class="mini">OpenLens/Docker views</text>
    <rect class="box" x="370" y="130" width="210" height="90"/>
    <text x="420" y="172" class="txt">Gateway</text>
    <text x="395" y="198" class="mini">routes + aggregates</text>
    <rect class="box" x="670" y="130" width="210" height="90"/>
    <text x="710" y="172" class="txt">Backend Service</text>
    <text x="696" y="198" class="mini">domain logic only</text>
    <rect class="box" x="970" y="130" width="180" height="90"/>
    <text x="1010" y="172" class="txt">Adapter</text>
    <text x="994" y="198" class="mini">API/CLI/socket</text>
    <line class="line" x1="280" y1="175" x2="370" y2="175"/>
    <line class="line" x1="580" y1="175" x2="670" y2="175"/>
    <line class="line" x1="880" y1="175" x2="970" y2="175"/>
    <rect class="box" x="120" y="330" width="180" height="80"/>
    <text x="154" y="370" class="txt">Docker API</text>
    <text x="142" y="394" class="mini">/var/run/docker.sock</text>
    <rect class="box" x="370" y="330" width="180" height="80"/>
    <text x="410" y="370" class="txt">K8s API</text>
    <text x="397" y="394" class="mini">kubeconfig</text>
    <rect class="box" x="620" y="330" width="180" height="80"/>
    <text x="648" y="370" class="txt">Observability</text>
    <text x="642" y="394" class="mini">Prom/Loki/Tempo</text>
    <rect class="box" x="870" y="330" width="180" height="80"/>
    <text x="910" y="370" class="txt">CLI Tools</text>
    <text x="895" y="394" class="mini">terraform/helm/trivy</text>
    <text x="80" y="545" class="txt">Failure mode</text>
    <text x="80" y="575" class="mini">If API/socket/CLI is unavailable, backend returns real error metadata. No static
        fallback.
    </text>
</svg>