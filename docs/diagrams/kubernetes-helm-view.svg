<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img"
     aria-label="Kubernetes and Helm View">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#172033"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1">
            <stop offset="0" stop-color="#0f172a"/>
            <stop offset="1" stop-color="#111827"/>
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/>
        </filter>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2,2 L10,6 L2,10 Z" fill="#93c5fd"/>
        </marker>
        <style>
            .card{filter:url(#shadow);animation:float 5s ease-in-out infinite;}
            .line{stroke:#93c5fd;stroke-width:2.6;fill:none;marker-end:url(#arrow);stroke-dasharray:7 7;animation:dash
            1.7s linear infinite;}
            .title{fill:#f8fafc;font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;}
            .sub{fill:#9fb3c8;font-family:Inter,Segoe UI,Arial,sans-serif;}
            @keyframes dash{to{stroke-dashoffset:-28;}}
            @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
            @keyframes glow{0%,100%{opacity:.4}50%{opacity:1}}
        </style>
    </defs>
    <rect width="1200" height="680" fill="url(#bg)"/>
    <circle cx="1080" cy="70" r="95" fill="#2563eb" opacity="0.10">
        <animate attributeName="r" values="85;110;85" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="58" font-size="30" class="title">Kubernetes and Helm View</text>
    <text x="60" y="88" font-size="15" class="sub">Helm packages workloads; platform dependencies can be internal or
        managed
    </text>
    <g class="card">
        <rect x="70" y="120" width="220" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="82.0" y="132.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="180.0" y="161.0" text-anchor="middle" font-size="18" class="title">Helm Chart</text>
        <text x="180.0" y="188.0" text-anchor="middle" font-size="13" class="sub">templates + values</text>
    </g>
    <g class="card">
        <rect x="400" y="110" width="300" height="110" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="412.0" y="122.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="550.0" y="161.0" text-anchor="middle" font-size="18" class="title">Kubernetes Namespace</text>
        <text x="550.0" y="188.0" text-anchor="middle" font-size="13" class="sub">nebulaops</text>
    </g>
    <g class="card">
        <rect x="780" y="90" width="300" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="792.0" y="102.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="930.0" y="131.0" text-anchor="middle" font-size="18" class="title">App Deployments</text>
        <text x="930.0" y="158.0" text-anchor="middle" font-size="13" class="sub">gateway + services + frontend</text>
    </g>
    <g class="card">
        <rect x="780" y="220" width="300" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="792.0" y="232.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="930.0" y="261.0" text-anchor="middle" font-size="18" class="title">Platform Services</text>
        <text x="930.0" y="288.0" text-anchor="middle" font-size="13" class="sub">MongoDB Redis RabbitMQ</text>
    </g>
    <g class="card">
        <rect x="400" y="330" width="300" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="412.0" y="342.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="550.0" y="371.0" text-anchor="middle" font-size="18" class="title">Config &amp; Secrets</text>
        <text x="550.0" y="398.0" text-anchor="middle" font-size="13" class="sub">env values</text>
    </g>
    <g class="card">
        <rect x="70" y="330" width="220" height="90" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="82.0" y="342.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="180.0" y="371.0" text-anchor="middle" font-size="18" class="title">Ingress / Service</text>
        <text x="180.0" y="398.0" text-anchor="middle" font-size="13" class="sub">external access</text>
    </g>
    <path class="line" d="M290,165 L400,165"/>
    <text x="345.0" y="157.0" text-anchor="middle" font-size="12" class="sub">render</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.2s" repeatCount="indefinite" path="M290,165 L400,165"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M700,160 L780,135"/>
    <text x="740.0" y="139.5" text-anchor="middle" font-size="12" class="sub">deploy</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.4000000000000004s" repeatCount="indefinite" path="M700,160 L780,135"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.4000000000000004s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M700,160 L780,265"/>
    <text x="740.0" y="204.5" text-anchor="middle" font-size="12" class="sub">connect</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.6s" repeatCount="indefinite" path="M700,160 L780,265"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M400,375 L290,375"/>
    <text x="345.0" y="367.0" text-anchor="middle" font-size="12" class="sub">expose</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.8000000000000003s" repeatCount="indefinite" path="M400,375 L290,375"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.8000000000000003s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M550,330 L550,220"/>
    <text x="550.0" y="267.0" text-anchor="middle" font-size="12" class="sub">configure</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="3.0s" repeatCount="indefinite" path="M550,330 L550,220"/>
        <animate attributeName="opacity" values="0;1;0" dur="3.0s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="645" font-size="12" class="sub">NebulaOps — optimized without Kafka/Zookeeper</text>
</svg>
