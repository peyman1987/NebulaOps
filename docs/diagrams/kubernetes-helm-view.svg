<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-label="Kubernetes and Helm View">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#110829"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/></marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#b476ff"/></marker>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#63ffb3"/></marker>
    <style><![CDATA[
.title{font:800 34px Inter,Segoe UI,Arial;fill:#f6fbff}.sub{font:500 16px Inter,Segoe UI,Arial;fill:#a9bdd8}.label{font:800 18px Inter,Segoe UI,Arial;fill:#ffffff}.small{font:500 13px Inter,Segoe UI,Arial;fill:#c5d3e8}.chip{font:700 12px Inter,Segoe UI,Arial;fill:#07111f}.panel{fill:#10243a;stroke:#345b87;stroke-width:1.4}.core{fill:#09233b;stroke:#58e7ff;stroke-width:2.2}.soft{fill:#151b35;stroke:#8065ff;stroke-width:1.4}.data{fill:#102d29;stroke:#63ffb3;stroke-width:1.4}.warn{fill:#332315;stroke:#ffba66;stroke-width:1.4}.flow{fill:none;stroke:#58e7ff;stroke-width:3;marker-end:url(#arrow)}.dash{fill:none;stroke:#b476ff;stroke-width:3;stroke-dasharray:10 8;marker-end:url(#arrow2)}.metric{fill:none;stroke:#63ffb3;stroke-width:3;stroke-dasharray:4 7;marker-end:url(#arrow3)}.pulse{animation:pulse 2.8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
]]></style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="64" y="76" class="title">Kubernetes and Helm View</text>
  <text x="64" y="106" class="sub">Deployment assets mirror the local reverse-proxy topology for cluster-oriented execution.</text>

<rect x="74" y="134" width="60" height="28" rx="14" fill="#58e7ff"/><text x="88" y="153" class="chip">Helm</text>
<rect x="160" y="134" width="108" height="28" rx="14" fill="#58e7ff"/><text x="174" y="153" class="chip">Kubernetes</text>
<rect x="286" y="134" width="156" height="28" rx="14" fill="#58e7ff"/><text x="300" y="153" class="chip">same route model</text>
<path d="M330 255 C 375 255, 375 255, 420 255" class="flow"/>
<path d="M680 255 C 720 255, 720 255, 760 255" class="flow"/>
<path d="M1020 255 C 1055 255, 1055 255, 1090 255" class="flow"/>
<path d="M1110 340 C 830 340, 830 470, 550 470" class="dash"/>
<path d="M1110 340 C 1000 340, 1000 470, 890 470" class="metric"/>
<rect x="70" y="180" width="260" height="150" rx="20" class="warn"/>
<text x="94" y="218" class="label">Helm chart</text>
<text x="94" y="246" class="small">Chart.yaml</text>
<text x="94" y="270" class="small">values.yaml</text>
<text x="94" y="294" class="small">templates/**</text>
<rect x="420" y="170" width="260" height="170" rx="20" class="soft"/>
<text x="444" y="208" class="label">Kubernetes namespace</text>
<text x="444" y="236" class="small">Deployments</text>
<text x="444" y="260" class="small">Services</text>
<text x="444" y="284" class="small">ConfigMaps / Secrets</text>
<rect x="760" y="170" width="260" height="170" rx="20" class="core"/>
<text x="784" y="208" class="label">Ingress / route</text>
<text x="784" y="236" class="small">Public shell route</text>
<text x="784" y="260" class="small">/api gateway route</text>
<text x="784" y="284" class="small">/keycloak and tools</text>
<rect x="1090" y="170" width="240" height="170" rx="20" class="panel"/>
<text x="1114" y="208" class="label">Workloads</text>
<text x="1114" y="236" class="small">Frontend</text>
<text x="1114" y="260" class="small">Gateway</text>
<text x="1114" y="284" class="small">Backend services</text>
<rect x="420" y="470" width="260" height="150" rx="20" class="data"/>
<text x="444" y="508" class="label">Stateful services</text>
<text x="444" y="536" class="small">MongoDB</text>
<text x="444" y="560" class="small">RabbitMQ</text>
<text x="444" y="584" class="small">Redis</text>
<rect x="760" y="470" width="260" height="150" rx="20" class="data"/>
<text x="784" y="508" class="label">Observability</text>
<text x="784" y="536" class="small">Prometheus</text>
<text x="784" y="560" class="small">Grafana</text>
<text x="784" y="584" class="small">Loki / Tempo</text>
</svg>