<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="600" viewBox="0 0 1180 600" role="img"
     aria-labelledby="title desc">
    <title id="title">Kubernetes and Helm Deployment View</title>
    <desc id="desc">Helm chart deploys NebulaOps workloads to a Kubernetes namespace, including frontend, gateway,
        services, data infrastructure and observability.
    </desc>
    <style>
        .bg{fill:#0b1020}.ns{fill:#0f172a;stroke:#818cf8;stroke-width:2;rx:18}.box{fill:#111a2e;stroke:#5eead4;stroke-width:2;rx:12}.data{stroke:#fbbf24}.obs{stroke:#c084fc}.txt{fill:#e5e7eb;font:600
        16px Arial}.small{fill:#cbd5e1;font:12px
        Arial}.line{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <defs>
