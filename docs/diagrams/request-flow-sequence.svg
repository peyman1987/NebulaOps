<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-label="Request Flow Sequence">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#110829"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/></marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#b476ff"/></marker>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#63ffb3"/></marker>
    <style><![CDATA[
.title{font:800 34px Inter,Segoe UI,Arial;fill:#f6fbff}.sub{font:500 16px Inter,Segoe UI,Arial;fill:#a9bdd8}.label{font:800 18px Inter,Segoe UI,Arial;fill:#ffffff}.small{font:500 13px Inter,Segoe UI,Arial;fill:#c5d3e8}.chip{font:700 12px Inter,Segoe UI,Arial;fill:#07111f}.panel{fill:#10243a;stroke:#345b87;stroke-width:1.4}.core{fill:#09233b;stroke:#58e7ff;stroke-width:2.2}.soft{fill:#151b35;stroke:#8065ff;stroke-width:1.4}.data{fill:#102d29;stroke:#63ffb3;stroke-width:1.4}.warn{fill:#332315;stroke:#ffba66;stroke-width:1.4}.flow{fill:none;stroke:#58e7ff;stroke-width:3;marker-end:url(#arrow)}.dash{fill:none;stroke:#b476ff;stroke-width:3;stroke-dasharray:10 8;marker-end:url(#arrow2)}.metric{fill:none;stroke:#63ffb3;stroke-width:3;stroke-dasharray:4 7;marker-end:url(#arrow3)}.pulse{animation:pulse 2.8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
]]></style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="64" y="76" class="title">Request Flow Sequence</text>
  <text x="64" y="106" class="sub">Browser requests stay same-origin and are routed by frontend Nginx to static assets or gateway APIs.</text>

<rect x="64" y="124" width="172" height="28" rx="14" fill="#58e7ff"/><text x="78" y="143" class="chip">/remotes/** static</text>
<rect x="220" y="124" width="148" height="28" rx="14" fill="#58e7ff"/><text x="234" y="143" class="chip">/api/** gateway</text>
<path d="M310 245 C 345 245, 345 245, 380 245" class="flow"/>
<path d="M660 245 C 700 245, 700 245, 740 245" class="flow"/>
<path d="M1000 245 C 1040 245, 1040 245, 1080 245" class="flow"/>
<path d="M520 330 C 520 330, 520 470, 520 470" class="dash"/>
<path d="M870 330 C 870 330, 870 470, 870 470" class="metric"/>
<rect x="60" y="170" width="250" height="150" rx="20" class="core"/>
<text x="84" y="208" class="label">Browser</text>
<text x="84" y="236" class="small">Open shell</text>
<text x="84" y="260" class="small">Click MFE / API action</text>
<text x="84" y="284" class="small">Bearer token attached</text>
<rect x="380" y="160" width="280" height="170" rx="20" class="panel"/>
<text x="404" y="198" class="label">Frontend Nginx</text>
<text x="404" y="226" class="small">Serve shell assets</text>
<text x="404" y="250" class="small">Serve /remotes/**</text>
<text x="404" y="274" class="small">Proxy /api/**</text>
<rect x="740" y="160" width="260" height="170" rx="20" class="soft"/>
<text x="764" y="198" class="label">Gateway</text>
<text x="764" y="226" class="small">Validate route</text>
<text x="764" y="250" class="small">Forward to service</text>
<text x="764" y="274" class="small">Return response</text>
<rect x="1080" y="160" width="260" height="170" rx="20" class="soft"/>
<text x="1104" y="198" class="label">Service</text>
<text x="1104" y="226" class="small">Task / Docker / K8s</text>
<text x="1104" y="250" class="small">Release / Policy</text>
<text x="1104" y="274" class="small">Notification / AI Ops</text>
<rect x="380" y="470" width="280" height="150" rx="20" class="warn"/>
<text x="404" y="508" class="label">Keycloak</text>
<text x="404" y="536" class="small">Login redirect</text>
<text x="404" y="560" class="small">Token issuance</text>
<text x="404" y="584" class="small">Logout callback</text>
<rect x="740" y="470" width="260" height="150" rx="20" class="data"/>
<text x="764" y="508" class="label">Data plane</text>
<text x="764" y="536" class="small">MongoDB</text>
<text x="764" y="560" class="small">RabbitMQ</text>
<text x="764" y="584" class="small">Redis</text>
</svg>