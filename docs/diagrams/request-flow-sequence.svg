<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img"
     aria-label="Request Flow Sequence">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#172033"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1">
            <stop offset="0" stop-color="#0f172a"/>
            <stop offset="1" stop-color="#111827"/>
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/>
        </filter>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2,2 L10,6 L2,10 Z" fill="#93c5fd"/>
        </marker>
        <style>
            .card{filter:url(#shadow);animation:float 5s ease-in-out infinite;}
            .line{stroke:#93c5fd;stroke-width:2.6;fill:none;marker-end:url(#arrow);stroke-dasharray:7 7;animation:dash
            1.7s linear infinite;}
            .title{fill:#f8fafc;font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;}
            .sub{fill:#9fb3c8;font-family:Inter,Segoe UI,Arial,sans-serif;}
            @keyframes dash{to{stroke-dashoffset:-28;}}
            @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
            @keyframes glow{0%,100%{opacity:.4}50%{opacity:1}}
        </style>
    </defs>
    <rect width="1200" height="680" fill="url(#bg)"/>
    <circle cx="1080" cy="70" r="95" fill="#2563eb" opacity="0.10">
        <animate attributeName="r" values="85;110;85" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="58" font-size="30" class="title">Request Flow Sequence</text>
    <text x="60" y="88" font-size="15" class="sub">Task creation lifecycle with persistence, event publication and
        notification
    </text>
    <text x="100" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#e5eefb">User</text>
    <line x1="100" y1="140" x2="100" y2="610" stroke="#334155" stroke-width="2" stroke-dasharray="7 7"/>
    <text x="270" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#e5eefb">Angular</text>
    <line x1="270" y1="140" x2="270" y2="610" stroke="#334155" stroke-width="2" stroke-dasharray="7 7"/>
    <text x="440" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#e5eefb">Gateway</text>
    <line x1="440" y1="140" x2="440" y2="610" stroke="#334155" stroke-width="2" stroke-dasharray="7 7"/>
    <text x="610" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#e5eefb">Task Service</text>
    <line x1="610" y1="140" x2="610" y2="610" stroke="#334155" stroke-width="2" stroke-dasharray="7 7"/>
    <text x="780" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#e5eefb">MongoDB</text>
    <line x1="780" y1="140" x2="780" y2="610" stroke="#334155" stroke-width="2" stroke-dasharray="7 7"/>
    <text x="950" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#e5eefb">RabbitMQ</text>
    <line x1="950" y1="140" x2="950" y2="610" stroke="#334155" stroke-width="2" stroke-dasharray="7 7"/>
    <path class="line" d="M100,180 L270,180"/>
    <text x="185.0" y="172.0" text-anchor="middle" font-size="12" class="sub">click/create</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.2s" repeatCount="indefinite" path="M100,180 L270,180"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M270,240 L440,240"/>
    <text x="355.0" y="232.0" text-anchor="middle" font-size="12" class="sub">POST /api/tasks</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.4000000000000004s" repeatCount="indefinite" path="M270,240 L440,240"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.4000000000000004s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M440,300 L610,300"/>
    <text x="525.0" y="292.0" text-anchor="middle" font-size="12" class="sub">route request</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.6s" repeatCount="indefinite" path="M440,300 L610,300"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M610,360 L780,360"/>
    <text x="695.0" y="352.0" text-anchor="middle" font-size="12" class="sub">save document</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="2.8000000000000003s" repeatCount="indefinite" path="M610,360 L780,360"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.8000000000000003s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M610,430 L950,430"/>
    <text x="780.0" y="422.0" text-anchor="middle" font-size="12" class="sub">publish event</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="3.0s" repeatCount="indefinite" path="M610,430 L950,430"/>
        <animate attributeName="opacity" values="0;1;0" dur="3.0s" repeatCount="indefinite"/>
    </circle>
    <path class="line" d="M950,500 L610,500"/>
    <text x="780.0" y="492.0" text-anchor="middle" font-size="12" class="sub">ack async</text>
    <circle r="5" fill="#fbbf24" opacity="0.9">
        <animateMotion dur="3.2s" repeatCount="indefinite" path="M950,500 L610,500"/>
        <animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="645" font-size="12" class="sub">NebulaOps — optimized without Kafka/Zookeeper</text>
</svg>
