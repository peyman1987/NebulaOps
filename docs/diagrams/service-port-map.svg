<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-label="Service Route and Port Map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#110829"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/></marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#b476ff"/></marker>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#63ffb3"/></marker>
    <style><![CDATA[
.title{font:800 34px Inter,Segoe UI,Arial;fill:#f6fbff}.sub{font:500 16px Inter,Segoe UI,Arial;fill:#a9bdd8}.label{font:800 18px Inter,Segoe UI,Arial;fill:#ffffff}.small{font:500 13px Inter,Segoe UI,Arial;fill:#c5d3e8}.chip{font:700 12px Inter,Segoe UI,Arial;fill:#07111f}.panel{fill:#10243a;stroke:#345b87;stroke-width:1.4}.core{fill:#09233b;stroke:#58e7ff;stroke-width:2.2}.soft{fill:#151b35;stroke:#8065ff;stroke-width:1.4}.data{fill:#102d29;stroke:#63ffb3;stroke-width:1.4}.warn{fill:#332315;stroke:#ffba66;stroke-width:1.4}.flow{fill:none;stroke:#58e7ff;stroke-width:3;marker-end:url(#arrow)}.dash{fill:none;stroke:#b476ff;stroke-width:3;stroke-dasharray:10 8;marker-end:url(#arrow2)}.metric{fill:none;stroke:#63ffb3;stroke-width:3;stroke-dasharray:4 7;marker-end:url(#arrow3)}.pulse{animation:pulse 2.8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
]]></style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="64" y="76" class="title">Service Route and Port Map</text>
  <text x="64" y="106" class="sub">The browser uses nebulaops.localhost; backend and tool ports remain available for diagnostics only.</text>

<rect x="64" y="124" width="108" height="28" rx="14" fill="#58e7ff"/><text x="78" y="143" class="chip">public: 80</text>
<rect x="168" y="124" width="156" height="28" rx="14" fill="#58e7ff"/><text x="182" y="143" class="chip">diagnostics only</text>
<path d="M360 245 C 395 245, 395 245, 430 245" class="flow"/>
<path d="M700 245 C 735 245, 735 245, 770 245" class="dash"/>
<path d="M700 245 C 890 245, 890 245, 1080 245" class="dash"/>
<path d="M565 330 C 565 330, 565 470, 565 470" class="flow"/>
<path d="M900 330 C 900 330, 900 470, 900 470" class="metric"/>
<rect x="60" y="160" width="300" height="170" rx="20" class="core"/>
<text x="84" y="198" class="label">Browser supported route</text>
<text x="84" y="226" class="small">http://nebulaops.localhost</text>
<text x="84" y="250" class="small">/remotes/**</text>
<text x="84" y="274" class="small">/api/**</text>
<rect x="430" y="160" width="270" height="170" rx="20" class="panel"/>
<text x="454" y="198" class="label">Frontend container</text>
<text x="454" y="226" class="small">Public host port 80</text>
<text x="454" y="250" class="small">Nginx static assets</text>
<text x="454" y="274" class="small">Reverse proxy</text>
<rect x="770" y="160" width="260" height="170" rx="20" class="soft"/>
<text x="794" y="198" class="label">Gateway/API diagnostics</text>
<text x="794" y="226" class="small">gateway :8080</text>
<text x="794" y="250" class="small">services :8081-8101</text>
<text x="794" y="274" class="small">AI engine :8095</text>
<rect x="1080" y="160" width="260" height="170" rx="20" class="soft"/>
<text x="1104" y="198" class="label">Tool diagnostics</text>
<text x="1104" y="226" class="small">RabbitMQ :15672</text>
<text x="1104" y="250" class="small">Mongo Express :8088</text>
<text x="1104" y="274" class="small">Redis UI :8089</text>
<rect x="430" y="470" width="270" height="150" rx="20" class="panel"/>
<text x="454" y="508" class="label">Internal MFE bundles</text>
<text x="454" y="536" class="small">Loaded from frontend image</text>
<text x="454" y="560" class="small">No browser MFE ports</text>
<text x="454" y="584" class="small">Standalone via /remotes/&lt;mfe&gt;/</text>
<rect x="770" y="470" width="260" height="150" rx="20" class="data"/>
<text x="794" y="508" class="label">Observability</text>
<text x="794" y="536" class="small">Grafana /grafana</text>
<text x="794" y="560" class="small">Prometheus /prometheus</text>
<text x="794" y="584" class="small">Loki/Tempo internal</text>
</svg>