<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img"
     aria-label="Local Service Port Map">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#172033"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1">
            <stop offset="0" stop-color="#0f172a"/>
            <stop offset="1" stop-color="#111827"/>
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/>
        </filter>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2,2 L10,6 L2,10 Z" fill="#93c5fd"/>
        </marker>
        <style>
            .card{filter:url(#shadow);animation:float 5s ease-in-out infinite;}
            .line{stroke:#93c5fd;stroke-width:2.6;fill:none;marker-end:url(#arrow);stroke-dasharray:7 7;animation:dash
            1.7s linear infinite;}
            .title{fill:#f8fafc;font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;}
            .sub{fill:#9fb3c8;font-family:Inter,Segoe UI,Arial,sans-serif;}
            @keyframes dash{to{stroke-dashoffset:-28;}}
            @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
            @keyframes glow{0%,100%{opacity:.4}50%{opacity:1}}
        </style>
    </defs>
    <rect width="1200" height="680" fill="url(#bg)"/>
    <circle cx="1080" cy="70" r="95" fill="#2563eb" opacity="0.10">
        <animate attributeName="r" values="85;110;85" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="58" font-size="30" class="title">Local Service Port Map</text>
    <text x="60" y="88" font-size="15" class="sub">Docker Compose ports and operational endpoints</text>
    <g class="card">
        <rect x="70" y="120" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="82.0" y="132.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="210.0" y="151.0" text-anchor="middle" font-size="18" class="title">Frontend</text>
        <text x="210.0" y="178.0" text-anchor="middle" font-size="13" class="sub">4200 — Angular UI</text>
    </g>
    <g class="card">
        <rect x="420" y="120" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="432.0" y="132.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="560.0" y="151.0" text-anchor="middle" font-size="18" class="title">Gateway</text>
        <text x="560.0" y="178.0" text-anchor="middle" font-size="13" class="sub">8080 — Public API</text>
    </g>
    <g class="card">
        <rect x="770" y="120" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="782.0" y="132.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="910.0" y="151.0" text-anchor="middle" font-size="18" class="title">Auth</text>
        <text x="910.0" y="178.0" text-anchor="middle" font-size="13" class="sub">8081 — Identity API</text>
    </g>
    <g class="card">
        <rect x="70" y="225" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="82.0" y="237.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="210.0" y="256.0" text-anchor="middle" font-size="18" class="title">Task</text>
        <text x="210.0" y="283.0" text-anchor="middle" font-size="13" class="sub">8082 — Task API</text>
    </g>
    <g class="card">
        <rect x="420" y="225" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="432.0" y="237.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="560.0" y="256.0" text-anchor="middle" font-size="18" class="title">Notification</text>
        <text x="560.0" y="283.0" text-anchor="middle" font-size="13" class="sub">8083 — Async API</text>
    </g>
    <g class="card">
        <rect x="770" y="225" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="782.0" y="237.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="910.0" y="256.0" text-anchor="middle" font-size="18" class="title">File</text>
        <text x="910.0" y="283.0" text-anchor="middle" font-size="13" class="sub">8084 — File API</text>
    </g>
    <g class="card">
        <rect x="70" y="330" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="82.0" y="342.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="210.0" y="361.0" text-anchor="middle" font-size="18" class="title">Go Cache</text>
        <text x="210.0" y="388.0" text-anchor="middle" font-size="13" class="sub">8091 — Cache API</text>
    </g>
    <g class="card">
        <rect x="420" y="330" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="432.0" y="342.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="560.0" y="361.0" text-anchor="middle" font-size="18" class="title">RabbitMQ UI</text>
        <text x="560.0" y="388.0" text-anchor="middle" font-size="13" class="sub">15672 — Broker UI</text>
    </g>
    <g class="card">
        <rect x="770" y="330" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="782.0" y="342.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="910.0" y="361.0" text-anchor="middle" font-size="18" class="title">RabbitMQ AMQP</text>
        <text x="910.0" y="388.0" text-anchor="middle" font-size="13" class="sub">5672 — Broker</text>
    </g>
    <g class="card">
        <rect x="70" y="435" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="82.0" y="447.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="210.0" y="466.0" text-anchor="middle" font-size="18" class="title">MongoDB</text>
        <text x="210.0" y="493.0" text-anchor="middle" font-size="13" class="sub">27017 — Database</text>
    </g>
    <g class="card">
        <rect x="420" y="435" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="432.0" y="447.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="560.0" y="466.0" text-anchor="middle" font-size="18" class="title">Redis</text>
        <text x="560.0" y="493.0" text-anchor="middle" font-size="13" class="sub">6379 — Cache</text>
    </g>
    <g class="card">
        <rect x="770" y="435" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="782.0" y="447.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="910.0" y="466.0" text-anchor="middle" font-size="18" class="title">Prometheus</text>
        <text x="910.0" y="493.0" text-anchor="middle" font-size="13" class="sub">9090 — Metrics</text>
    </g>
    <g class="card">
        <rect x="70" y="540" width="280" height="70" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
        <rect x="82.0" y="552.0" width="12" height="12" rx="6" fill="#22c55e">
            <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="210.0" y="571.0" text-anchor="middle" font-size="18" class="title">Grafana</text>
        <text x="210.0" y="598.0" text-anchor="middle" font-size="13" class="sub">3000 — Dashboards</text>
    </g>
    <text x="60" y="645" font-size="12" class="sub">NebulaOps — optimized without Kafka/Zookeeper</text>
</svg>
