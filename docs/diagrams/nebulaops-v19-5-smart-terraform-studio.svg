<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
    <defs>
        <linearGradient id="g" x1="0" x2="1">
            <stop stop-color="#22d3ee"/>
            <stop offset="1" stop-color="#a78bfa"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <rect width="1200" height="520" rx="34" fill="#050816"/>
    <text x="60" y="84" fill="#e2e8f0" font-family="Inter,Arial" font-size="38" font-weight="700">NebulaOps v20.1 ·
        Smart Terraform Studio
    </text>
    <path d="M120 280 C300 110 440 430 620 250 S900 120 1060 285" stroke="url(#g)" stroke-width="8" fill="none"
          filter="url(#glow)" stroke-dasharray="18 18">
        <animate attributeName="stroke-dashoffset" from="0" to="-180" dur="5s" repeatCount="indefinite"/>
    </path>
    <circle cx="160" cy="260" r="48" fill="#0f172a" stroke="#38bdf8" stroke-width="3" filter="url(#glow)"/>
    <text x="160" y="266" fill="#e2e8f0" font-family="Inter,Arial" text-anchor="middle" font-size="18">Node 1</text>
    <circle cx="340" cy="330" r="48" fill="#0f172a" stroke="#38bdf8" stroke-width="3" filter="url(#glow)"/>
    <text x="340" y="336" fill="#e2e8f0" font-family="Inter,Arial" text-anchor="middle" font-size="18">Node 2</text>
    <circle cx="520" cy="260" r="48" fill="#0f172a" stroke="#38bdf8" stroke-width="3" filter="url(#glow)"/>
    <text x="520" y="266" fill="#e2e8f0" font-family="Inter,Arial" text-anchor="middle" font-size="18">Node 3</text>
    <circle cx="700" cy="330" r="48" fill="#0f172a" stroke="#38bdf8" stroke-width="3" filter="url(#glow)"/>
    <text x="700" y="336" fill="#e2e8f0" font-family="Inter,Arial" text-anchor="middle" font-size="18">Node 4</text>
    <circle cx="880" cy="260" r="48" fill="#0f172a" stroke="#38bdf8" stroke-width="3" filter="url(#glow)"/>
    <text x="880" y="266" fill="#e2e8f0" font-family="Inter,Arial" text-anchor="middle" font-size="18">Node 5</text>
    <circle cx="1060" cy="330" r="48" fill="#0f172a" stroke="#38bdf8" stroke-width="3" filter="url(#glow)"/>
    <text x="1060" y="336" fill="#e2e8f0" font-family="Inter,Arial" text-anchor="middle" font-size="18">Node 6</text>
</svg>