<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
    <defs>
        <linearGradient id="bg" x1="0" x2="1">
            <stop stop-color="#020617"/>
            <stop offset="1" stop-color="#172554"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <rect width="1400" height="760" fill="url(#bg)"/>
    <circle cx="210" cy="175" r="170" fill="#0ea5e9" opacity=".12"/>
    <circle cx="1130" cy="185" r="210" fill="#f97316" opacity=".10"/>
    <text x="64" y="82" fill="#e0f2fe" font-family="Inter,Arial" font-size="44" font-weight="900">NebulaOps v21.1 ·
        INFRA Console Hub
    </text>
    <text x="64" y="124" fill="#7dd3fc" font-family="Inter,Arial" font-size="19">One tab to open Grafana, Redis,
        MongoDB, RabbitMQ, Prometheus and internal platform features
    </text>
    <g font-family="Inter,Arial" filter="url(#glow)">
        <rect x="70" y="180" width="285" height="130" rx="28" fill="#111827" stroke="#fb923c"/>
        <text x="105" y="235" fill="#fff" font-size="28" font-weight="800">Grafana</text>
        <text x="105" y="275" fill="#fed7aa" font-size="16">localhost:3000</text>
        <rect x="395" y="180" width="285" height="130" rx="28" fill="#111827" stroke="#ef4444"/>
        <text x="430" y="235" fill="#fff" font-size="28" font-weight="800">Redis Commander</text>
        <text x="430" y="275" fill="#fecaca" font-size="16">localhost:8089</text>
        <rect x="720" y="180" width="285" height="130" rx="28" fill="#111827" stroke="#22c55e"/>
        <text x="755" y="235" fill="#fff" font-size="28" font-weight="800">Mongo Express</text>
        <text x="755" y="275" fill="#bbf7d0" font-size="16">localhost:8088</text>
        <rect x="1045" y="180" width="285" height="130" rx="28" fill="#111827" stroke="#a78bfa"/>
        <text x="1080" y="235" fill="#fff" font-size="28" font-weight="800">RabbitMQ</text>
        <text x="1080" y="275" fill="#ddd6fe" font-size="16">localhost:15672</text>
        <rect x="230" y="355" width="285" height="130" rx="28" fill="#111827" stroke="#facc15"/>
        <text x="265" y="410" fill="#fff" font-size="28" font-weight="800">Prometheus</text>
        <text x="265" y="450" fill="#fef3c7" font-size="16">localhost:9090</text>
        <rect x="560" y="355" width="285" height="130" rx="28" fill="#111827" stroke="#38bdf8"/>
        <text x="595" y="410" fill="#fff" font-size="28" font-weight="800">Gateway API</text>
        <text x="595" y="450" fill="#bae6fd" font-size="16">localhost:8080</text>
        <rect x="890" y="355" width="285" height="130" rx="28" fill="#111827" stroke="#67e8f9"/>
        <text x="925" y="410" fill="#fff" font-size="28" font-weight="800">Pipeline Engine</text>
        <text x="925" y="450" fill="#cffafe" font-size="16">localhost:8087</text>
    </g>
    <g font-family="Inter,Arial" opacity=".95">
        <rect x="150" y="565" width="1100" height="92" rx="30" fill="#020617" stroke="#334155"/>
        <text x="190" y="620" fill="#e0f2fe" font-size="24" font-weight="900">Internal shortcuts:</text>
        <text x="440" y="620" fill="#bae6fd" font-size="21">Kubernetes · CI/CD Designer · DevSecOps · Observability · AI
            OPS · FinOps · Backups
        </text>
    </g>
</svg>
