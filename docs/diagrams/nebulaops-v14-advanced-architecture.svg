        <path d="M1520 0 V950" stroke="#93c5fd" stroke-width="1"/>
    </g>
    <text x="70" y="72" class="title">NebulaOps v16 · Runtime architecture</text>
    <text x="70" y="104" class="sub">Docker Compose runtime and optional Kubernetes control plane, with clear
        interaction paths.
    </text>

    <rect x="62" y="150" width="1476" height="680" rx="36" class="lane"/>
    <text x="92" y="188" class="tiny">RUNTIME ARCHITECTURE · DOCKER COMPOSE HOST + OPTIONAL KUBERNETES CONTROL</text>
