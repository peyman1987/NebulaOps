    </g>
    <text x="70" y="72" class="title">NebulaOps v16 · Frontend to API control map</text>
    <text x="70" y="104" class="sub">Every UI tab maps to a backend endpoint or real local dashboard/control panel.
    </text>

    <rect x="60" y="155" width="1480" height="675" rx="36" class="lane"/>
    <text x="90" y="194" class="tiny">FRONTEND CONTROL MAP · EACH TAB MAPS TO A REAL BACKEND OR DASHBOARD</text>
