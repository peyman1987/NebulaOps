<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img"
     aria-label="NebulaOps frontend operations dashboard architecture">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#071225"/>
            <stop offset="1" stop-color="#05070d"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1">
            <stop offset="0" stop-color="#172554"/>
            <stop offset="1" stop-color="#0f172a"/>
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
        </filter>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/>
        </marker>
        <style>
            .title{font:700 34px Inter,Arial,sans-serif;fill:#eef3ff}.subtitle{font:400 16px
            Inter,Arial,sans-serif;fill:#9fb1d6}.h{font:700 18px Inter,Arial,sans-serif;fill:#f8fbff}.t{font:500 13px
            Inter,Arial,sans-serif;fill:#cbd5e1}.s{font:600 12px
            Inter,Arial,sans-serif;fill:#7dd3fc}.box{fill:url(#card);stroke:#334155;stroke-width:1.4;rx:22;filter:url(#shadow)}.mini{fill:#0b1220;stroke:#1e40af;stroke-width:1;rx:12}.line{stroke:#7dd3fc;stroke-width:3;fill:none;marker-end:url(#arrow);stroke-dasharray:10
            8;animation:flow 1.8s linear infinite}.pulse{animation:pulse 2.4s ease-in-out
            infinite}.blink{animation:blink 1.8s ease-in-out infinite}@keyframes
            flow{to{stroke-dashoffset:-36}}@keyframes pulse{0%,100%{opacity:.72}50%{opacity:1}}@keyframes
            blink{0%,100%{fill:#22c55e}50%{fill:#7dd3fc}}
        </style>
    </defs>
    <rect width="1280" height="720" fill="url(#bg)"/>
    <text x="56" y="70" class="title">NebulaOps Frontend Operations Dashboard</text>
    <text x="56" y="100" class="subtitle">Persistent task workflow, Kubernetes inventory and microservice log visibility
        without Kafka/Zookeeper.
    </text>

    <rect x="55" y="150" width="315" height="460" class="box"/>
    <text x="85" y="195" class="h">Angular Control Center</text>
    <text x="85" y="222" class="t">Single operations workspace</text>
    <rect x="85" y="260" width="240" height="54" class="mini"/>
    <circle cx="110" cy="287" r="7" class="blink"/>
    <text x="128" y="292" class="t">Kubernetes metrics</text>
    <rect x="85" y="330" width="240" height="54" class="mini"/>
    <circle cx="110" cy="357" r="7" fill="#a78bfa" class="pulse"/>
    <text x="128" y="362" class="t">Pods / Services / Namespaces</text>
    <rect x="85" y="400" width="240" height="54" class="mini"/>
    <circle cx="110" cy="427" r="7" fill="#f59e0b" class="pulse"/>
    <text x="128" y="432" class="t">Microservice logs</text>
    <rect x="85" y="470" width="240" height="54" class="mini"/>
    <circle cx="110" cy="497" r="7" fill="#22c55e" class="pulse"/>
    <text x="128" y="502" class="t">Persistent Kanban board</text>

    <rect x="500" y="130" width="265" height="125" class="box"/>
    <text x="530" y="174" class="h">Spring Cloud Gateway</text>
    <text x="530" y="202" class="t">/api/tasks reverse proxy</text>
    <text x="530" y="226" class="s">Nginx → Gateway → Services</text>

    <rect x="900" y="95" width="290" height="125" class="box"/>
    <text x="930" y="138" class="h">Task Service</text>
    <text x="930" y="166" class="t">PATCH status updates</text>
    <text x="930" y="190" class="s">MongoDB persistence</text>

    <rect x="900" y="270" width="290" height="125" class="box"/>
    <text x="930" y="313" class="h">RabbitMQ Events</text>
    <text x="930" y="341" class="t">TaskStatusChanged</text>
    <text x="930" y="365" class="s">Notifications / workers</text>

    <rect x="500" y="385" width="265" height="125" class="box"/>
    <text x="530" y="428" class="h">K8s Snapshot Source</text>
    <text x="530" y="456" class="t">Namespaces, pods, services</text>
    <text x="530" y="480" class="s">Demo JSON or live API</text>

    <rect x="900" y="480" width="290" height="125" class="box"/>
    <text x="930" y="523" class="h">Observability Layer</text>
    <text x="930" y="551" class="t">Actuator, Prometheus, Grafana</text>
    <text x="930" y="575" class="s">Health and metric views</text>

    <path d="M370 285 C430 285 438 192 500 192" class="line"/>
    <path d="M765 192 C820 192 835 157 900 157" class="line"/>
    <path d="M1045 220 L1045 270" class="line"/>
    <path d="M370 430 C430 430 440 448 500 448" class="line"/>
    <path d="M765 448 C830 448 835 542 900 542" class="line"/>

    <text x="56" y="665" class="subtitle">Design note: frontend persists board movement locally for demos and
        synchronizes to MongoDB through the task-service when API tasks are loaded.
    </text>
</svg>
