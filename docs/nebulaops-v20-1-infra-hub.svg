<svg height="760" viewBox="0 0 1400 760" width="1400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" x2="1">
            <stop stop-color="#020617"/>
            <stop offset="1" stop-color="#172554"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur result="b" stdDeviation="5"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <rect fill="url(#bg)" height="760" width="1400"/>
    <circle cx="210" cy="175" fill="#0ea5e9" opacity=".12" r="170"/>
