        <text fill="#bbf7d0" font-size="16" x="755" y="275">localhost:8088</text>
        <rect fill="#111827" height="130" rx="28" stroke="#a78bfa" width="285" x="1045" y="180"/>
        <text fill="#fff" font-size="28" font-weight="800" x="1080" y="235">RabbitMQ</text>
        <text fill="#ddd6fe" font-size="16" x="1080" y="275">localhost:15672</text>
        <rect fill="#111827" height="130" rx="28" stroke="#facc15" width="285" x="230" y="355"/>
