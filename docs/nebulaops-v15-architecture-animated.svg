<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img"
     aria-label="NebulaOps v15 animated architecture">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop stop-color="#06111f"/>
            <stop offset="1" stop-color="#101827"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" x2="1">
            <stop stop-color="#38bdf8"/>
            <stop offset="1" stop-color="#a78bfa"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <style>
            text{font-family:Inter,Segoe
            UI,Arial,sans-serif;fill:#e5f0ff}.muted{fill:#94a3b8}.box{fill:#0f1b2e;stroke:#334155;stroke-width:2;rx:22}.hot{stroke:url(#accent);filter:url(#glow)}.line{stroke:#38bdf8;stroke-width:3;stroke-dasharray:10
            12;fill:none;opacity:.85}.pulse{animation:pulse 2.8s ease-in-out infinite}.flow{animation:dash 7s linear
            infinite}.spin{transform-origin:center;animation:spin 18s linear infinite}@keyframes
            dash{to{stroke-dashoffset:-220}}@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}@keyframes
            spin{to{transform:rotate(360deg)}}
        </style>
    </defs>
    <rect width="1400" height="900" fill="url(#bg)"/>
    <circle cx="1180" cy="130" r="90" fill="#1e3a8a" opacity=".25" class="pulse"/>
    <circle cx="220" cy="760" r="120" fill="#7c3aed" opacity=".18" class="pulse"/>
    <text x="70" y="72" font-size="42" font-weight="800">NebulaOps v15</text>
    <text x="70" y="112" font-size="20" class="muted">Single-machine DevOps control plane: native Docker Engine,
        Kubernetes, Helm, Grafana
    </text>

    <rect x="70" y="170" width="260" height="135" class="box hot"/>
    <text x="100" y="215" font-size="25" font-weight="700">Angular FE</text>
    <text x="100" y="250" font-size="16" class="muted">Docker · Kubernetes · Helm</text>
    <text x="100" y="276" font-size="16" class="muted">Grafana · Logs · Tasks</text>

    <rect x="565" y="160" width="270" height="155" class="box hot"/>
    <text x="600" y="210" font-size="25" font-weight="700">Spring Gateway</text>
    <text x="600" y="245" font-size="16" class="muted">Runtime adapters</text>
    <text x="600" y="271" font-size="16" class="muted">REST proxy + safety gates</text>

    <rect x="1010" y="145" width="300" height="185" class="box hot"/>
    <text x="1045" y="195" font-size="25" font-weight="700">Local Runtimes</text>
    <text x="1045" y="230" font-size="16" class="muted">Docker socket</text>
    <text x="1045" y="256" font-size="16" class="muted">kubectl kubeconfig</text>
    <text x="1045" y="282" font-size="16" class="muted">Helm + Grafana API</text>

    <path d="M330 235 C420 235 470 235 565 235" class="line flow"/>
    <path d="M835 235 C910 235 940 235 1010 235" class="line flow"/>

    <rect x="115" y="430" width="220" height="115" class="box"/>
    <text x="145" y="475" font-size="22" font-weight="700">Spring Services</text>
    <text x="145" y="505" font-size="15" class="muted">Auth · Task · File · Notify</text>
    <rect x="430" y="430" width="220" height="115" class="box"/>
    <text x="460" y="475" font-size="22" font-weight="700">Go Services</text>
    <text x="460" y="505" font-size="15" class="muted">Cache · Event Worker</text>
    <rect x="745" y="430" width="220" height="115" class="box"/>
    <text x="775" y="475" font-size="22" font-weight="700">Data Plane</text>
    <text x="775" y="505" font-size="15" class="muted">MongoDB · Redis · RabbitMQ</text>
    <rect x="1060" y="430" width="220" height="115" class="box"/>
    <text x="1090" y="475" font-size="22" font-weight="700">Observability</text>
    <text x="1090" y="505" font-size="15" class="muted">Prometheus · Grafana</text>

    <path d="M700 315 C610 370 500 400 225 430" class="line flow"/>
    <path d="M700 315 C650 365 590 395 540 430" class="line flow"/>
    <path d="M700 315 C730 365 790 395 855 430" class="line flow"/>
    <path d="M700 315 C860 370 1010 400 1170 430" class="line flow"/>

    <g class="spin">
        <circle cx="700" cy="710" r="72" fill="none" stroke="#38bdf8" stroke-width="4" stroke-dasharray="20 16"/>
        <circle cx="700" cy="710" r="35" fill="#0f1b2e" stroke="#a78bfa" stroke-width="3"/>
    </g>
    <text x="595" y="820" font-size="22" font-weight="700">kind Kubernetes cluster</text>
    <text x="530" y="850" font-size="16" class="muted">pods · services · ingress · deployments · configmaps · secrets ·
        jobs
    </text>
    <path d="M1160 330 C1050 630 880 705 772 710" class="line flow"/>
</svg>
