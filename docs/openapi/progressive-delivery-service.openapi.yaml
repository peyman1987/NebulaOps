openapi: 3.0.3
info:
  title: NebulaOps Progressive Delivery Service API
  version: 23.4.0
paths:
  /api/progressive-delivery/overview:
    get:
      summary: Live progressive delivery overview from Argo Rollouts, Argo CD and Kubernetes
      parameters:
        - in: query
          name: namespace
          schema: { type: string, default: all }
      responses:
        '200': { description: Runtime overview }
  /api/progressive-delivery/rollouts:
    get:
      summary: List Argo Rollouts from Kubernetes
      responses:
        '200': { description: Rollouts }
  /api/progressive-delivery/applications:
    get:
      summary: List Argo CD applications
      responses:
        '200': { description: Applications }
  /api/progressive-delivery/rollouts/{namespace}/{name}/promote:
    post:
      summary: Promote an Argo Rollouts rollout
      parameters:
        - in: path
          name: namespace
          required: true
          schema: { type: string }
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        '200': { description: Promotion result }
