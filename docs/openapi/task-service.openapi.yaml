openapi: 3.0.3
info:
  title: NebulaOps task-service API
  version: 20.6.7
  description: Live-only backend API. Responses are produced by services/adapters invoking real APIs, sockets, repositories, or CLI tools. No mock/statistical sample data is returned.
servers:
  - url: http://localhost:8082
paths:
  /api/tasks:
    get:
      summary: List persisted tasks
      tags:
        - task-service
      responses:
        '200':
          description: Live response from backend service.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request.
        '500':
          description: Runtime tool/API error.
  /api/tasks:
    post:
      summary: Create persisted task
      tags:
        - task-service
      responses:
        '200':
          description: Live response from backend service.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request.
        '500':
          description: Runtime tool/API error.
  /api/tasks/{id}:
    get:
      summary: Get task
      tags:
        - task-service
      responses:
        '200':
          description: Live response from backend service.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request.
        '500':
          description: Runtime tool/API error.
  /api/tasks/{id}:
    put:
      summary: Update task
      tags:
        - task-service
      responses:
        '200':
          description: Live response from backend service.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request.
        '500':
          description: Runtime tool/API error.
  /api/tasks/{id}:
    delete:
      summary: Delete task
      tags:
        - task-service
      responses:
        '200':
          description: Live response from backend service.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request.
        '500':
          description: Runtime tool/API error.
