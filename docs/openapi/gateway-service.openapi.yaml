openapi: 3.0.3
info:
  title: NebulaOps gateway-service API
  version: 22.4.0
  description: Live-only backend API. Responses are produced by services/adapters invoking real APIs, sockets, repositories, or CLI tools. No mock/statistical sample data is returned.
servers:
  - url: http://localhost:8080
paths:
  /api/platform/observability:
    get:
      summary: Read live observability stack from configured APIs
      tags:
        - gateway-service
      responses:
        '200':
          description: Live response from backend service.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request.
        '500':
          description: Runtime tool/API error.
  /api/platform/observability/prometheus:
    get:
      summary: Execute live Prometheus query
