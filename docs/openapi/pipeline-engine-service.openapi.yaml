openapi: 3.0.3
info:
  title: NebulaOps pipeline-engine-service API
  version: 21.1.0
  description: Live-only backend API. Responses are produced by services/adapters invoking real APIs, sockets, repositories, or CLI tools. No mock/statistical sample data is returned.
servers:
  - url: http://localhost:8087
paths:
  /api/pipeline:
    get:
      summary: Read pipeline config from repository
      tags:
        - pipeline-engine-service
      responses:
        '200':
          description: Live response from backend service.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request.
        '500':
          description: Runtime tool/API error.
  /api/pipeline/git-status:
    get:
      summary: Read Git status
      tags:
        - pipeline-engine-service
      responses:
        '200':
          description: Live response from backend service.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request.
        '500':
          description: Runtime tool/API error.
  /api/pipeline/argocd/{app}/sync:
    post:
      summary: Sync ArgoCD app
      tags:
        - pipeline-engine-service
      responses:
        '200':
          description: Live response from backend service.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request.
        '500':
          description: Runtime tool/API error.
