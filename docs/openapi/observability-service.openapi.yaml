openapi: 3.0.3
info:
  title: NebulaOps Observability & Audit Center API
  version: 23.2.0
  description: Live-only operational API. Responses are aggregated from runtime services and external observability tools; no seeded or mock records are generated.
servers:
  - url: /api/observability
paths:
  /:
    get:
      summary: Probe observability stack components
      responses:
        '200': { description: Runtime probe result }
  /overview:
    get:
      summary: Return a live overview of services, tasks, audit, notifications and RabbitMQ
      parameters:
        - in: query
          name: organizationId
          schema: { type: string, default: nebulaops }
      responses:
        '200': { description: Live overview }
  /services:
    get:
      summary: Probe registered NebulaOps backend health endpoints
      responses:
        '200': { description: Live service health list }
  /metrics/prometheus:
    get:
      summary: Execute a Prometheus instant query
      parameters:
        - in: query
          name: query
          schema: { type: string, default: up }
      responses:
        '200': { description: Prometheus query response }
  /logs/loki:
    get:
      summary: Execute a Loki query
      parameters:
        - in: query
          name: query
          schema: { type: string }
      responses:
        '200': { description: Loki query response }
  /traces/tempo:
    get:
      summary: Search Tempo traces
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: Tempo trace search response }
  /audit/events:
    get:
      summary: Read live audit events from audit-service
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
      responses:
        '200': { description: Audit event timeline }
  /events/tasks:
    get:
      summary: Read runtime task records from task-service
      parameters:
        - in: query
          name: organizationId
          schema: { type: string, default: nebulaops }
      responses:
        '200': { description: Task records }
  /events/notifications:
    get:
      summary: Read runtime notification records from notification-service
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
      responses:
        '200': { description: Notification records }
  /events/rabbitmq:
    get:
      summary: Read RabbitMQ management overview
      responses:
        '200': { description: RabbitMQ runtime overview }
