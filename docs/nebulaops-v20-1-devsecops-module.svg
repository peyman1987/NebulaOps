<svg aria-labelledby="title desc" height="820" role="img" viewBox="0 0 1400 820" width="1400"
     xmlns="http://www.w3.org/2000/svg">
    <title id="title">NebulaOps v20.1 DevSecOps Module</title>
    <desc id="desc">Animated DevSecOps architecture with radar, scans, compliance and CVE dashboard.</desc>
    <defs>
        <linearGradient id="bg" x1="0" x2="1">
            <stop stop-color="#020617"/>
            <stop offset="1" stop-color="#300a18"/>
        </linearGradient>
        <linearGradient id="hot" x1="0" x2="1">
            <stop stop-color="#ef4444"/>
            <stop offset=".55" stop-color="#f59e0b"/>
            <stop offset="1" stop-color="#22d3ee"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur result="b" stdDeviation="5"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <style>
            .t {
            font-family: Segoe UI, Arial, sans-serif;
            fill: #e5f6ff
            }

            .muted {
            fill: #93c5fd
            }

            .card {
            fill: rgba(15, 23, 42, .78);
            stroke: #38bdf8;
            stroke-opacity: .25;
            rx: 28
            }

            .danger {
            stroke: #ef4444;
            stroke-width: 3;
            filter: url(#glow)
            }

            .line {
            stroke: url(#hot);
            stroke-width: 4;
            stroke-dasharray: 14 12;
            animation: dash 3s linear infinite
            }

            .pulse {
            animation: pulse 1.5s ease-in-out infinite
            }

            .spin {
            transform-origin: 700px 410px;
            animation: spin 8s linear infinite
            }

            @keyframes dash {
            to {
            stroke-dashoffset: -80
            }
            }

            @keyframes spin {
            to {
            transform: rotate(360deg)
            }
            }

            @keyframes pulse {
            50% {
            opacity: .45;
            transform: scale(1.04)
            }
            }
        </style>
    </defs>
    <rect fill="url(#bg)" height="820" width="1400"/>
    <g opacity=".25" stroke="#38bdf8">
        <path d="M0 80h1400M0 160h1400M0 240h1400M0 320h1400M0 400h1400M0 480h1400M0 560h1400M0 640h1400M0 720h1400"/>
        <path d="M100 0v820M220 0v820M340 0v820M460 0v820M580 0v820M700 0v820M820 0v820M940 0v820M1060 0v820M1180 0v820M1300 0v820"/>
    </g>
    <text class="t" font-size="36" font-weight="900" x="64" y="70">NebulaOps v20.1 · DevSecOps Module</text>
    <text class="muted" font-size="18" x="64" y="108">SECURITY · COMPLIANCE · VULNERABILITIES · Trivy · Docker Image
        Scan · SAST · Secrets · CVE Dashboard
    </text>
    <circle cx="700" cy="410" fill="none" r="210" stroke="#ef4444" stroke-opacity=".35" stroke-width="2"/>
    <circle cx="700" cy="410" fill="none" r="150" stroke="#f59e0b" stroke-opacity=".35" stroke-width="2"/>
    <circle cx="700" cy="410" fill="none" r="90" stroke="#38bdf8" stroke-opacity=".35" stroke-width="2"/>
    <path class="line spin" d="M700 410 L910 410"/>
    <circle cx="700" cy="410" fill="#0f172a" filter="url(#glow)" r="52" stroke="#ef4444" stroke-width="3"/>
    <text class="t" font-size="28" font-weight="900" x="670" y="402">87</text>
    <text class="muted" font-size="15" x="646" y="432">RISK</text>
    <g class="pulse">
        <circle cx="562" cy="322" fill="#ef4444" filter="url(#glow)" r="14"/>
        <circle cx="846" cy="498" fill="#fb923c" filter="url(#glow)" r="12"/>
        <circle cx="930" cy="312" fill="#facc15" filter="url(#glow)" r="10"/>
    </g>
    <rect class="card danger" height="132" width="315" x="70" y="190"/>
    <text class="t" font-size="28" font-weight="900" x="100" y="242">Trivy Scans</text>
    <text class="muted" font-size="18" x="100" y="280">container image CVE + SBOM</text>
    <rect class="card" height="132" width="315" x="70" y="364"/>
    <text class="t" font-size="28" font-weight="900" x="100" y="416">SAST Simulation</text>
    <text class="muted" font-size="18" x="100" y="454">Java/Angular static analysis</text>
    <rect class="card danger" height="132" width="315" x="70" y="538"/>
    <text class="t" font-size="28" font-weight="900" x="100" y="590">Secrets Detection</text>
    <text class="muted" font-size="18" x="100" y="628">repo scan + critical alert</text>
    <rect class="card" height="132" width="315" x="1015" y="190"/>
    <text class="t" font-size="28" font-weight="900" x="1045" y="242">Compliance</text>
    <text class="muted" font-size="18" x="1045" y="280">CIS · NIST · SOC2 · ISO</text>
    <rect class="card danger" height="132" width="315" x="1015" y="364"/>
    <text class="t" font-size="28" font-weight="900" x="1045" y="416">CVE Dashboard</text>
    <text class="muted" font-size="18" x="1045" y="454">critical/high dependency risk</text>
    <rect class="card" height="132" width="315" x="1015" y="538"/>
    <text class="t" font-size="28" font-weight="900" x="1045" y="590">Threat Map</text>
    <text class="muted" font-size="18" x="1045" y="628">radar animations + blast radius</text>
    <path class="line" d="M385 256 C500 250 555 330 648 382" fill="none"/>
    <path class="line" d="M385 430 C505 430 555 410 648 410" fill="none"/>
    <path class="line" d="M385 604 C510 570 560 480 653 438" fill="none"/>
    <path class="line" d="M752 382 C850 330 915 250 1015 256" fill="none"/>
    <path class="line" d="M752 410 C860 410 920 430 1015 430" fill="none"/>
    <path class="line" d="M747 438 C850 500 910 570 1015 604" fill="none"/>
</svg>
