apiVersion: v1
kind: Namespace
metadata:
  name: nebulaops
  labels:
    app.kubernetes.io/name: nebulaops
    app.kubernetes.io/part-of: nebulaops
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apiforge-data
  namespace: nebulaops
  labels:
    app: apiforge
    app.kubernetes.io/name: apiforge
    app.kubernetes.io/part-of: nebulaops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiforge
  namespace: nebulaops
  labels:
    app: apiforge
    app.kubernetes.io/name: apiforge
    app.kubernetes.io/component: api-workspace
    app.kubernetes.io/part-of: nebulaops
    app.kubernetes.io/version: "23.4.0"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: apiforge
  template:
    metadata:
      labels:
        app: apiforge
        app.kubernetes.io/name: apiforge
        app.kubernetes.io/component: api-workspace
        app.kubernetes.io/part-of: nebulaops
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /apiforge/actuator/health
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: apiforge
          image: nebulaops-v23-4-apiforge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APIFORGE_DATA_DIR
              value: /data
            - name: SERVER_PORT
              value: "8080"
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: /apiforge
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: health,info
          volumeMounts:
            - name: apiforge-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /apiforge/actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /apiforge/actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: apiforge-data
          persistentVolumeClaim:
            claimName: apiforge-data
---
apiVersion: v1
kind: Service
metadata:
  name: apiforge
  namespace: nebulaops
  labels:
    app: apiforge
    app.kubernetes.io/name: apiforge
    app.kubernetes.io/part-of: nebulaops
spec:
  type: NodePort
  selector:
    app: apiforge
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 31110
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apiforge
  namespace: nebulaops
  labels:
    app: apiforge
    app.kubernetes.io/name: apiforge
    app.kubernetes.io/part-of: nebulaops
spec:
  rules:
    - host: nebulaops.local
      http:
        paths:
          - path: /apiforge
            pathType: Prefix
            backend:
              service:
                name: apiforge
                port:
                  number: 8080
