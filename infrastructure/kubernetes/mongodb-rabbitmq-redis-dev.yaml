apiVersion: apps/v1
kind: Deployment
metadata: { name: mongodb }
spec:
  replicas: 1
  selector: { matchLabels: { app: mongodb } }
  template:
    metadata: { labels: { app: mongodb } }
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports: [ { containerPort: 27017 } ]
          env:
            - { name: MONGO_INITDB_ROOT_USERNAME, value: nebula }
            - { name: MONGO_INITDB_ROOT_PASSWORD, value: nebula }
---
apiVersion: v1
kind: Service
metadata: { name: mongodb }
spec:
  selector: { app: mongodb }
  ports: [ { port: 27017, targetPort: 27017 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: rabbitmq }
spec:
  replicas: 1
  selector: { matchLabels: { app: rabbitmq } }
  template:
    metadata: { labels: { app: rabbitmq } }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports: [ { containerPort: 5672 }, { containerPort: 15672 } ]
          env:
            - { name: RABBITMQ_DEFAULT_USER, value: guest }
            - { name: RABBITMQ_DEFAULT_PASS, value: guest }
---
apiVersion: v1
kind: Service
metadata: { name: rabbitmq }
spec:
  selector: { app: rabbitmq }
  ports:
    - { name: amqp, port: 5672, targetPort: 5672 }
    - { name: management, port: 15672, targetPort: 15672 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [ { containerPort: 6379 } ]
---
apiVersion: v1
kind: Service
metadata: { name: redis }
spec:
  selector: { app: redis }
  ports: [ { port: 6379, targetPort: 6379 } ]
