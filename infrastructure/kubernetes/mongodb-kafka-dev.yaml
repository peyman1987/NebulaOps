apiVersion: apps/v1
kind: Deployment
metadata: { name: mongodb }
spec:
  replicas: 1
  selector: { matchLabels: { app: mongodb } }
  template:
    metadata: { labels: { app: mongodb } }
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports: [ { containerPort: 27017 } ]
          env:
            - { name: MONGO_INITDB_ROOT_USERNAME, value: nebula }
            - { name: MONGO_INITDB_ROOT_PASSWORD, value: nebula }
---
apiVersion: v1
kind: Service
metadata: { name: mongodb }
spec:
  selector: { app: mongodb }
  ports: [ { port: 27017, targetPort: 27017 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: kafka }
spec:
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.7
          ports: [ { containerPort: 9092 } ]
          env:
            - { name: KAFKA_CFG_NODE_ID, value: "1" }
            - { name: KAFKA_CFG_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:9093" }
            - { name: KAFKA_CFG_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_CFG_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
---
apiVersion: v1
kind: Service
metadata: { name: kafka }
spec:
  selector: { app: kafka }
  ports: [ { port: 9092, targetPort: 9092 } ]
