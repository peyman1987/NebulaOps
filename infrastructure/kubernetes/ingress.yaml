apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nebulaops-ingress
  namespace: nebulaops
spec:
  rules:
    - host: nebulaops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8080
