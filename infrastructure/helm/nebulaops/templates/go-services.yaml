apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebulaops-go-cache
  namespace: { { .Values.global.namespace } }
spec:
  replicas: { { .Values.goServices.cache.replicas } }
  selector: { matchLabels: { app: nebulaops-go-cache } }
  template:
    metadata: { labels: { app: nebulaops-go-cache } }
    spec:
      containers:
        - name: go-cache-service
          image: { { .Values.goServices.cache.image } }
          imagePullPolicy: { { .Values.global.imagePullPolicy } }
          ports: [ { containerPort: { { .Values.goServices.cache.port } } } ]
          env:
            - { name: REDIS_ADDR, value: "nebulaops-redis:6379" }
            - { name: RABBITMQ_HTTP_URL, value: "http://nebulaops-rabbitmq:15672" }
            - { name: RABBITMQ_USER, value: { { .Values.rabbitmq.username | quote } } }
            - { name: RABBITMQ_PASSWORD, value: { { .Values.rabbitmq.password | quote } } }
            - { name: RABBITMQ_CACHE_QUEUE, value: "nebula.cache.events" }
          readinessProbe: { httpGet: { path: /health, port: { { .Values.goServices.cache.port } } }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata:
  name: nebulaops-go-cache
  namespace: { { .Values.global.namespace } }
spec:
  selector: { app: nebulaops-go-cache }
  ports: [ { port: { { .Values.goServices.cache.port } }, targetPort: { { .Values.goServices.cache.port } } } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebulaops-go-event-worker
  namespace: { { .Values.global.namespace } }
spec:
  replicas: { { .Values.goServices.eventWorker.replicas } }
  selector: { matchLabels: { app: nebulaops-go-event-worker } }
  template:
    metadata: { labels: { app: nebulaops-go-event-worker } }
    spec:
      containers:
        - name: go-event-worker
          image: { { .Values.goServices.eventWorker.image } }
          imagePullPolicy: { { .Values.global.imagePullPolicy } }
          env:
            - { name: RABBITMQ_HTTP_URL, value: "http://nebulaops-rabbitmq:15672" }
            - { name: RABBITMQ_USER, value: { { .Values.rabbitmq.username | quote } } }
            - { name: RABBITMQ_PASSWORD, value: { { .Values.rabbitmq.password | quote } } }
            - { name: RABBITMQ_CACHE_QUEUE, value: "nebula.cache.events" }
