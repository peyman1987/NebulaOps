apiVersion: v1
kind: ConfigMap
metadata:
  name: nebulaops-config
  namespace: { { .Values.global.namespace } }
data:
  KAFKA_BOOTSTRAP_SERVERS: "nebulaops-kafka:9092"
  AUTH_SERVICE_URL: "http://nebulaops-auth:8081"
  TASK_SERVICE_URL: "http://nebulaops-task:8082"
  NOTIFICATION_SERVICE_URL: "http://nebulaops-notification:8083"
  FILE_SERVICE_URL: "http://nebulaops-file:8084"
