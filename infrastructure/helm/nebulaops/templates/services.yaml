{ { - $root := . - } }
  { { - range $name, $svc := .Values.services } }
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebulaops-{{ $name }}
  namespace: { { $root.Values.global.namespace } }
spec:
  replicas: { { $svc.replicas } }
  selector:
    matchLabels: { app: nebulaops-{ { $name } } }
  template:
    metadata:
      labels: { app: nebulaops-{ { $name } } }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "{{ $svc.port }}"
    spec:
      containers:
        - name: { { $name } }
          image: { { $svc.image } }
          imagePullPolicy: { { $root.Values.global.imagePullPolicy } }
          ports:
            - containerPort: { { $svc.port } }
          envFrom:
            - configMapRef: { name: nebulaops-config }
          env:
            - name: MONGO_URI
              value: "mongodb://{{ $root.Values.mongodb.username }}:{{ $root.Values.mongodb.password }}@nebulaops-mongodb:27017/{{ $svc.mongoDatabase | default "nebula" }}?authSource=admin"
            - name: RABBITMQ_HOST
              valueFrom: { configMapKeyRef: { name: nebulaops-config, key: RABBITMQ_HOST } }
            - name: RABBITMQ_PORT
              valueFrom: { configMapKeyRef: { name: nebulaops-config, key: RABBITMQ_PORT } }
            - name: RABBITMQ_USER
              valueFrom: { configMapKeyRef: { name: nebulaops-config, key: RABBITMQ_USER } }
            - name: RABBITMQ_PASSWORD
              valueFrom: { configMapKeyRef: { name: nebulaops-config, key: RABBITMQ_PASSWORD } }
          readinessProbe:
            httpGet: { path: /actuator/health, port: { { $svc.port } } }
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health, port: { { $svc.port } } }
            initialDelaySeconds: 45
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: nebulaops-{{ $name }}
  namespace: { { $root.Values.global.namespace } }
spec:
  selector: { app: nebulaops-{ { $name } } }
  ports:
    - port: { { $svc.port } }
      targetPort: { { $svc.port } }
---
{ { - end } }
