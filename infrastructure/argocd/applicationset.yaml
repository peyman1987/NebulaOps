apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nebulaops-environments
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            namespace: nebulaops-dev
            revision: develop
          - env: staging
            namespace: nebulaops-staging
            revision: main
          - env: prod
            namespace: nebulaops-prod
            revision: main
  template:
    metadata:
      name: 'nebulaops-{{env}}'
      labels:
        environment: '{{env}}'
    spec:
      project: nebulaops
      source:
        repoURL: https://gitlab.com/your-group/nebulaops.git
        targetRevision: '{{revision}}'
        path: infrastructure/helm/nebulaops
        helm:
          releaseName: 'nebulaops-{{env}}'
          valueFiles:
            - values.yaml
          parameters:
            - name: global.namespace
              value: '{{namespace}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
