services:
  mongodb:
    image: mongo:7
    healthcheck:
      test:
        - CMD
        - mongosh
        - --eval
        - db.adminCommand('ping')
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      MONGO_INITDB_ROOT_USERNAME: nebula
      MONGO_INITDB_ROOT_PASSWORD: nebula
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
    networks:
      - nebulaops-network
  auth-service:
    build:
      context: ..
      dockerfile: backend/auth-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_auth?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - 8081:8081
  task-service:
    build:
      context: ..
      dockerfile: backend/task-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_task?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - 8082:8082
  notification-service:
    build:
      context: ..
      dockerfile: backend/notification-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_notification?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - 8083:8083
  file-service:
    build:
      context: ..
      dockerfile: backend/file-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_file?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - 8084:8084
  ai-engine:
    build:
      context: ..
      dockerfile: ai-engine/Dockerfile
    ports:
      - 8095:8095
  ai-ops-service:
    build:
      context: ..
      dockerfile: backend/ai-ops-service/Dockerfile
    environment:
      AI_ENGINE_URL: http://ai-engine:8095
    depends_on:
      - ai-engine
    ports:
      - 8085:8085
  gateway-service:
    build:
      context: ..
      dockerfile: backend/gateway-service/Dockerfile
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      TASK_SERVICE_URL: http://task-service:8082
      FILE_SERVICE_URL: http://file-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
      AI_OPS_SERVICE_URL: http://ai-ops-service:8085
      KUBECONFIG: /kube/config
      DOCKER_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-nebulaops-v19-1}
    volumes:
      - ../.kube/config:/kube/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      auth-service:
        condition: service_started
      task-service:
        condition: service_started
      file-service:
        condition: service_started
      notification-service:
        condition: service_started
      ai-ops-service:
        condition: service_started
    ports:
      - 8080:8080
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      - gateway-service
    ports:
      - 4200:80
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090
    depends_on:
      - gateway-service
      - auth-service
      - task-service
      - notification-service
      - file-service
      - ai-ops-service
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - 3000:3000
    depends_on:
      - prometheus
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - 'yes'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
  go-cache-service:
    build:
      context: ..
      dockerfile: go/cache-service/Dockerfile
    environment:
      PORT: 8091
      REDIS_ADDR: redis:6379
      RABBITMQ_HTTP_URL: http://rabbitmq:15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_CACHE_QUEUE: nebula.cache.events
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - 8091:8091
  go-event-worker:
    build:
      context: ..
      dockerfile: go/event-worker/Dockerfile
    environment:
      RABBITMQ_HTTP_URL: http://rabbitmq:15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_CACHE_QUEUE: nebula.cache.events
    depends_on:
      rabbitmq:
        condition: service_healthy
volumes:
  mongo-data: null
  redis-data: null
  rabbitmq-data: null
  grafana-data: null
