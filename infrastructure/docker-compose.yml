name: nebulaops-v23-1
services:
  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
    - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U keycloak
      interval: 10s
      timeout: 5s
      retries: 10
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_URL: http://nebulaops.localhost/keycloak
      KC_HOSTNAME_ADMIN_URL: http://nebulaops.localhost/keycloak
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KC_HEALTH_ENABLED: 'true'
      KC_SPI_THEME_CACHE_THEMES: 'false'
      KC_SPI_THEME_CACHE_TEMPLATES: 'false'
      KC_SPI_THEME_STATIC_MAX_AGE: '-1'
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
    - ./infrastructure/keycloak/realm-nebulaops.json:/opt/keycloak/data/import/realm-nebulaops.json:ro
    - ./infrastructure/keycloak/themes/nebulaops:/opt/keycloak/themes/nebulaops:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
    - 8180:8080
    healthcheck:
      test:
      - CMD-SHELL
      - bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf "GET /health/ready HTTP/1.0\r\n\r\n"
        >&3; timeout 5 cat <&3 | grep -Eq "(HTTP/[0-9.]+ 200|\"status\"[[:space:]]*:[[:space:]]*\"UP\")"'
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
  mongodb:
    image: mongo:7
    healthcheck:
      test:
      - CMD
      - mongosh
      - --eval
      - db.adminCommand('ping')
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      MONGO_INITDB_ROOT_USERNAME: nebula
      MONGO_INITDB_ROOT_PASSWORD: nebula
    ports:
    - 27017:27017
    volumes:
    - mongo-data:/data/db
  mongo-express:
    image: mongo-express:1.0.2-20
    ports:
    - 8088:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: nebula
      ME_CONFIG_MONGODB_ADMINPASSWORD: nebula
      ME_CONFIG_MONGODB_URL: mongodb://nebula:nebula@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: &id001
      - CMD-SHELL
      - 'node -e "require(''http'').get(''http://127.0.0.1:8081'', r => process.exit(r.statusCode
        < 500 ? 0 : 1)).on(''error'', () => process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
    - 8089:8081
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: *id001
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
  auth-service:
    image: nebulaops-v23-1-auth-service:latest
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_auth?authSource=admin
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
    - 8081:8081
  task-service:
    image: nebulaops-v23-1-task-service:latest
    build:
      context: .
      dockerfile: backend/task-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_task?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
    - 8082:8082
  notification-service:
    image: nebulaops-v23-1-notification-service:latest
    build:
      context: .
      dockerfile: backend/notification-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_notification?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
    - 8083:8083
  file-service:
    image: nebulaops-v23-1-file-service:latest
    build:
      context: .
      dockerfile: backend/file-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_file?authSource=admin
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
    - 8084:8084
  ai-engine:
    image: nebulaops-v23-1-ai-engine:latest
    build:
      context: .
      dockerfile: ai-engine/Dockerfile
    ports:
    - 8095:8095
    environment:
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
    depends_on:
      keycloak:
        condition: service_started
  ai-ops-service:
    image: nebulaops-v23-1-ai-ops-service:latest
    build:
      context: .
      dockerfile: backend/ai-ops-service/Dockerfile
    environment:
      AI_ENGINE_URL: http://ai-engine:8095
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
      NEBULAOPS_GATEWAY_URL: http://gateway-service:8080
      NEBULAOPS_AUDIT_URL: http://audit-service:8101
      NEBULAOPS_NOTIFICATION_URL: http://notification-service:8083
      NEBULAOPS_LOKI_URL: http://loki:3100
      NEBULAOPS_PROMETHEUS_URL: http://prometheus:9090
      NEBULAOPS_DEVSECOPS_URL: http://devsecops-service:8086
      NEBULAOPS_COST_URL: http://cost-analytics-service:8097
      NEBULAOPS_POLICY_URL: http://policy-governance-service:8100
      NEBULAOPS_GITLAB_URL: http://gitlab:80
      NEBULAOPS_GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID:-}
      NEBULAOPS_GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      NEBULAOPS_ARGOCD_URL: ${ARGOCD_URL:-http://argocd-server.argocd.svc.cluster.local}
      NEBULAOPS_ARGOCD_TOKEN: ${ARGOCD_TOKEN:-}
    volumes:
    - ./.kube/config:/root/.kube/config:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - ./.runtime-tools:/opt/nebula-tools:ro
    depends_on:
      ai-engine:
        condition: service_started
      keycloak:
        condition: service_started
      audit-service:
        condition: service_started
      progressive-delivery-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
    - 8085:8085
  devsecops-service:
    image: nebulaops-v23-1-devsecops-service:latest
    build:
      context: .
      dockerfile: backend/devsecops-service/Dockerfile
    environment:
      REPO_PATH: /workspace
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
      NEBULAOPS_GATEWAY_URL: http://gateway-service:8080
      NEBULAOPS_AUDIT_URL: http://audit-service:8101
      NEBULAOPS_NOTIFICATION_URL: http://notification-service:8083
      NEBULAOPS_LOKI_URL: http://loki:3100
      NEBULAOPS_PROMETHEUS_URL: http://prometheus:9090
      NEBULAOPS_DEVSECOPS_URL: http://devsecops-service:8086
      NEBULAOPS_COST_URL: http://cost-analytics-service:8097
      NEBULAOPS_POLICY_URL: http://policy-governance-service:8100
      NEBULAOPS_GITLAB_URL: http://gitlab:80
      NEBULAOPS_GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID:-}
      NEBULAOPS_GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      NEBULAOPS_ARGOCD_URL: ${ARGOCD_URL:-http://argocd-server.argocd.svc.cluster.local}
      NEBULAOPS_ARGOCD_TOKEN: ${ARGOCD_TOKEN:-}
    volumes:
    - ./:/workspace:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - ./.runtime-tools:/opt/nebula-tools:ro
    ports:
    - 8086:8086
    depends_on:
      keycloak:
        condition: service_started
      audit-service:
        condition: service_started
      notification-service:
        condition: service_started
  pipeline-engine-service:
    image: nebulaops-v23-1-pipeline-engine-service:latest
    build:
      context: .
      dockerfile: backend/pipeline-engine-service/Dockerfile
    environment:
      REPO_PATH: /workspace
      ARGOCD_APP: nebulaops
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
    - ./:/workspace
    - ./.kube/config:/root/.kube/config:ro
    - ./.runtime-tools:/opt/nebula-tools:ro
    ports:
    - 8087:8087
    depends_on:
      keycloak:
        condition: service_started
  observability-service:
    image: nebulaops-v23-1-observability-service:latest
    build:
      context: .
      dockerfile: backend/observability-service/Dockerfile
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      TEMPO_URL: http://tempo:3200
      GRAFANA_URL: http://grafana:3000
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
    ports:
    - 8092:8092
    depends_on:
      keycloak:
        condition: service_started
  gitops-control-service:
    image: nebulaops-v23-1-gitops-control-service:latest
    build:
      context: .
      dockerfile: backend/gitops-control-service/Dockerfile
    environment:
      ARGOCD_APP: nebulaops
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
    - ./:/workspace
    - ./.kube/config:/root/.kube/config:ro
    - ./.runtime-tools:/opt/nebula-tools:ro
    working_dir: /workspace
    ports:
    - 8093:8093
    depends_on:
      keycloak:
        condition: service_started
  environment-manager-service:
    image: nebulaops-v23-1-environment-manager-service:latest
    build:
      context: .
      dockerfile: backend/environment-manager-service/Dockerfile
    environment:
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
    - ./.kube/config:/root/.kube/config:ro
    - ./infrastructure:/workspace/infrastructure
    - ./.runtime-tools:/opt/nebula-tools:ro
    working_dir: /workspace/infrastructure/terraform
    ports:
    - 8094:8094
    depends_on:
      keycloak:
        condition: service_started
  terraform-studio-service:
    image: nebulaops-v23-1-terraform-studio-service:latest
    build:
      context: .
      dockerfile: backend/terraform-studio-service/Dockerfile
    environment:
      TERRAFORM_WORKDIR: /workspace/infrastructure/terraform
      COST_CURRENCY: EUR
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      KEYCLOAK_AUTH_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
    - ./infrastructure:/workspace/infrastructure
    - ./.runtime-tools:/opt/nebula-tools:ro
    ports:
    - 8096:8096
    depends_on:
      keycloak:
        condition: service_started
  gateway-service:
    image: nebulaops-v23-1-gateway-service:latest
    build:
      context: .
      dockerfile: backend/gateway-service/Dockerfile
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v23-1-dev-secret-key-min-32-chars!!}
      TASK_SERVICE_URL: http://task-service:8082
      FILE_SERVICE_URL: http://file-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
      AI_OPS_SERVICE_URL: http://ai-ops-service:8085
      DEVSECOPS_SERVICE_URL: http://devsecops-service:8086
      PIPELINE_ENGINE_SERVICE_URL: http://pipeline-engine-service:8087
      OBSERVABILITY_SERVICE_URL: http://observability-service:8092
      GITOPS_CONTROL_SERVICE_URL: http://gitops-control-service:8093
      ENVIRONMENT_MANAGER_SERVICE_URL: http://environment-manager-service:8094
      TERRAFORM_STUDIO_SERVICE_URL: http://terraform-studio-service:8096
      KUBECONFIG: /kube/config
      DOCKER_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-nebulaops-v23-1}
      TERRAFORM_WORKDIR: /app/infrastructure/terraform
      GRAFANA_URL: http://grafana:3000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: nebulaops
      KEYCLOAK_CLIENT_ID: nebulaops-gateway
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-nebulaops-secret-dev-only}
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      KEYCLOAK_AUTH_ENABLED: 'true'
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      COST_ANALYTICS_SERVICE_URL: http://cost-analytics-service:8097
      GITLAB_URL: ${GITLAB_URL:-}
      GITLAB_ENABLED: ${GITLAB_ENABLED:-false}
      RELEASE_ORCHESTRATOR_SERVICE_URL: http://release-orchestrator-service:8098
      POLICY_GOVERNANCE_SERVICE_URL: http://policy-governance-service:8100
      AUDIT_SERVICE_URL: http://audit-service:8101
      PROGRESSIVE_DELIVERY_SERVICE_URL: http://progressive-delivery-service:8102
      KUBECONFIG_MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_gateway?authSource=admin
    volumes:
    - ./.kube/config:/kube/config:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - ./infrastructure:/app/infrastructure
    - ./.runtime-tools:/opt/nebula-tools:ro
    depends_on:
      auth-service:
        condition: service_started
      task-service:
        condition: service_started
      file-service:
        condition: service_started
      notification-service:
        condition: service_started
      ai-ops-service:
        condition: service_started
      devsecops-service:
        condition: service_started
      pipeline-engine-service:
        condition: service_started
      observability-service:
        condition: service_started
      gitops-control-service:
        condition: service_started
      environment-manager-service:
        condition: service_started
      terraform-studio-service:
        condition: service_started
      keycloak:
        condition: service_started
      cost-analytics-service:
        condition: service_started
      release-orchestrator-service:
        condition: service_started
      policy-governance-service:
        condition: service_started
      audit-service:
        condition: service_started
      mongodb:
        condition: service_started
    ports:
    - 8080:8080
  mfe-docker-desktop:
    image: nebulaops-v23-1-mfe-docker-desktop:latest
    build:
      context: ./frontend/remotes/docker-desktop
      dockerfile: Dockerfile
    depends_on:
    - gateway-service
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:80/remoteEntry.js >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
  mfe-openlens-kubernetes:
    image: nebulaops-v23-1-mfe-openlens-kubernetes:latest
    build:
      context: ./frontend/remotes/openlens-kubernetes
      dockerfile: Dockerfile
    depends_on:
    - gateway-service
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:80/remoteEntry.js >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
  mfe-task-management:
    image: nebulaops-v23-1-mfe-task-management:latest
    build:
      context: ./frontend/remotes/task-management
      dockerfile: Dockerfile
    depends_on:
    - gateway-service
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:80/remoteEntry.js >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
  mfe-observability:
    image: nebulaops-v23-1-mfe-observability:latest
    build:
      context: ./frontend/remotes/observability
      dockerfile: Dockerfile
    depends_on:
    - gateway-service
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:80/remoteEntry.js >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
  mfe-cicd-gitops:
    image: nebulaops-v23-1-mfe-cicd-gitops:latest
    build:
      context: ./frontend/remotes/cicd-gitops
      dockerfile: Dockerfile
    depends_on:
    - gateway-service
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:80/remoteEntry.js >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
  mfe-terraform-studio:
    image: nebulaops-v23-1-mfe-terraform-studio:latest
    build:
      context: ./frontend/remotes/terraform-studio
      dockerfile: Dockerfile
    depends_on:
    - gateway-service
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:80/remoteEntry.js >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
  mfe-devsecops:
    image: nebulaops-v23-1-mfe-devsecops:latest
    build:
      context: ./frontend/remotes/devsecops
      dockerfile: Dockerfile
    depends_on:
    - gateway-service
    healthcheck:
      test:
