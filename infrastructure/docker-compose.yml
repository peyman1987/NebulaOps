      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-oauth2-proxy-secret-dev-only}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-0123456789abcdef0123456789abcdef}
      OAUTH2_PROXY_COOKIE_SECURE: 'false'
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_EMAIL_DOMAINS: '*'
      OAUTH2_PROXY_SCOPE: openid email profile
      OAUTH2_PROXY_REDIRECT_URL: http://localhost:${REDIS_COMMANDER_SSO_HOST_PORT:-18089}/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS: http://redis-commander-basic-proxy:8080/
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: 'true'
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: 'true'
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: 'true'
      OAUTH2_PROXY_SET_XAUTHREQUEST: 'true'
      OAUTH2_PROXY_REVERSE_PROXY: 'true'
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://nebulaops.localhost/keycloak/realms/nebulaops
      OAUTH2_PROXY_LOGIN_URL: http://nebulaops.localhost/keycloak/realms/nebulaops/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/token
      OAUTH2_PROXY_PROFILE_URL: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/userinfo
      OAUTH2_PROXY_VALIDATE_URL: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/userinfo
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/nebulaops/protocol/openid-connect/certs
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: 'true'
      OAUTH2_PROXY_PROVIDER_DISPLAY_NAME: Keycloak
      OAUTH2_PROXY_AUTH_LOGGING: 'true'
      OAUTH2_PROXY_REQUEST_LOGGING: 'false'
      OAUTH2_PROXY_STANDARD_LOGGING: 'true'
      OAUTH2_PROXY_WHITELIST_DOMAINS: localhost:*
      OAUTH2_PROXY_COOKIE_NAME: _nebulaops_sso
      OAUTH2_PROXY_COOKIE_REFRESH: 30m
      OAUTH2_PROXY_COOKIE_EXPIRE: 8h
      OAUTH2_PROXY_PROXY_PREFIX: /oauth2
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: 'true'
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: 'true'
      OAUTH2_PROXY_SHOW_DEBUG_ON_ERROR: 'true'
    ports:
    - ${REDIS_COMMANDER_SSO_HOST_PORT:-18089}:4180
    depends_on:
      keycloak:
        condition: service_started
      redis-commander-basic-proxy:
        condition: service_healthy
    profiles:
    - sso-proxy
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:4180/ping >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
