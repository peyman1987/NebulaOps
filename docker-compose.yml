name: nebulaops-v21-3

services:
  mongodb:
    image: mongo:7
    healthcheck:
      test:
        - CMD
        - mongosh
        - --eval
        - db.adminCommand('ping')
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      MONGO_INITDB_ROOT_USERNAME: nebula
      MONGO_INITDB_ROOT_PASSWORD: nebula
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
  mongo-express:
    image: mongo-express:1.0.2-20
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: nebula
      ME_CONFIG_MONGODB_ADMINPASSWORD: nebula
      ME_CONFIG_MONGODB_URL: mongodb://nebula:nebula@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - 8088:8081
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - 8089:8081
  auth-service:
    image: nebulaops-v21-3-auth-service:latest
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_auth?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - 8081:8081
  task-service:
    image: nebulaops-v21-3-task-service:latest
    build:
      context: .
      dockerfile: backend/task-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_task?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - 8082:8082
  notification-service:
    image: nebulaops-v21-3-notification-service:latest
    build:
      context: .
      dockerfile: backend/notification-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_notification?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - 8083:8083
  file-service:
    image: nebulaops-v21-3-file-service:latest
    build:
      context: .
      dockerfile: backend/file-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_file?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - 8084:8084
  ai-engine:
    image: nebulaops-v21-3-ai-engine:latest
    build:
      context: .
      dockerfile: ai-engine/Dockerfile
    ports:
      - 8095:8095
  ai-ops-service:
    image: nebulaops-v21-3-ai-ops-service:latest
    build:
      context: .
      dockerfile: backend/ai-ops-service/Dockerfile
    environment:
      AI_ENGINE_URL: http://ai-engine:8095
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./.kube/config:/root/.kube/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.runtime-tools:/opt/nebula-tools:ro
    depends_on:
      - ai-engine
    ports:
      - 8085:8085
  devsecops-service:
    image: nebulaops-v21-3-devsecops-service:latest
    build:
      context: .
      dockerfile: backend/devsecops-service/Dockerfile
    environment:
      REPO_PATH: /workspace
    volumes:
      - ./:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.runtime-tools:/opt/nebula-tools:ro
    ports:
      - 8086:8086
  pipeline-engine-service:
    image: nebulaops-v21-3-pipeline-engine-service:latest
    build:
      context: .
      dockerfile: backend/pipeline-engine-service/Dockerfile
    environment:
      REPO_PATH: /workspace
      ARGOCD_APP: nebulaops
    volumes:
      - ./:/workspace
      - ./.kube/config:/root/.kube/config:ro
      - ./.runtime-tools:/opt/nebula-tools:ro
    ports:
      - 8087:8087

  observability-service:
    image: nebulaops-v21-3-observability-service:latest
    build:
      context: .
      dockerfile: backend/observability-service/Dockerfile
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      TEMPO_URL: http://tempo:3200
      GRAFANA_URL: http://grafana:3000
    ports:
      - 8092:8092

  gitops-control-service:
    image: nebulaops-v21-3-gitops-control-service:latest
    build:
      context: .
      dockerfile: backend/gitops-control-service/Dockerfile
    environment:
      ARGOCD_APP: nebulaops
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./:/workspace
      - ./.kube/config:/root/.kube/config:ro
      - ./.runtime-tools:/opt/nebula-tools:ro
    working_dir: /workspace
    ports:
      - 8093:8093

  environment-manager-service:
    image: nebulaops-v21-3-environment-manager-service:latest
    build:
      context: .
      dockerfile: backend/environment-manager-service/Dockerfile
    environment:
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./.kube/config:/root/.kube/config:ro
      - ./infrastructure:/workspace/infrastructure
      - ./.runtime-tools:/opt/nebula-tools:ro
    working_dir: /workspace/infrastructure/terraform
    ports:
      - 8094:8094

  terraform-studio-service:
    image: nebulaops-v21-3-terraform-studio-service:latest
    build:
      context: .
      dockerfile: backend/terraform-studio-service/Dockerfile
    environment:
      TERRAFORM_WORKDIR: /workspace/infrastructure/terraform
      COST_CURRENCY: EUR
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./infrastructure:/workspace/infrastructure
      - ./.runtime-tools:/opt/nebula-tools:ro
    ports:
      - 8096:8096

  gateway-service:
    image: nebulaops-v21-3-gateway-service:latest
    build:
      context: .
      dockerfile: backend/gateway-service/Dockerfile
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      JWT_SECRET: ${JWT_SECRET:-nebulaops-v21-3-dev-secret-key-min-32-chars!!}
      TASK_SERVICE_URL: http://task-service:8082
      FILE_SERVICE_URL: http://file-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
      AI_OPS_SERVICE_URL: http://ai-ops-service:8085
      DEVSECOPS_SERVICE_URL: http://devsecops-service:8086
      PIPELINE_ENGINE_SERVICE_URL: http://pipeline-engine-service:8087
      OBSERVABILITY_SERVICE_URL: http://observability-service:8092
      GITOPS_CONTROL_SERVICE_URL: http://gitops-control-service:8093
      ENVIRONMENT_MANAGER_SERVICE_URL: http://environment-manager-service:8094
      TERRAFORM_STUDIO_SERVICE_URL: http://terraform-studio-service:8096
      KUBECONFIG: /kube/config
      DOCKER_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-nebulaops-v21-2-1}
      TERRAFORM_WORKDIR: /app/infrastructure/terraform
      GRAFANA_URL: http://grafana:3000
      GRAFANA_AUTH: admin:admin
      PATH: /opt/java/openjdk/bin:/opt/nebula-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./.kube/config:/kube/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infrastructure:/app/infrastructure
      - ./.runtime-tools:/opt/nebula-tools:ro
    depends_on:
      auth-service:
        condition: service_started
      task-service:
        condition: service_started
      file-service:
        condition: service_started
      notification-service:
        condition: service_started
      ai-ops-service:
        condition: service_started
      devsecops-service:
        condition: service_started
      pipeline-engine-service:
        condition: service_started
      observability-service:
        condition: service_started
      gitops-control-service:
        condition: service_started
      environment-manager-service:
        condition: service_started
      terraform-studio-service:
        condition: service_started
    ports:
      - 8080:8080
  frontend:
    image: nebulaops-v21-3-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - gateway-service
    ports:
      - 4200:80
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./infrastructure/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090
    depends_on:
      - gateway-service
      - auth-service
      - task-service
      - notification-service
      - file-service
      - ai-ops-service
      - devsecops-service
  loki:
    image: grafana/loki:2.9.10
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - 3100:3100
  tempo:
    image: grafana/tempo:2.5.0
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infrastructure/observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - 3200:3200
      - 4317:4317
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./infrastructure/observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - 4318:4318
    depends_on:
      - tempo
      - loki
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/observability/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - 3000:3000
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - 'yes'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
  go-cache-service:
    image: nebulaops-v21-3-go-cache-service:latest
    build:
      context: .
      dockerfile: go/cache-service/Dockerfile
    environment:
      PORT: 8091
      REDIS_ADDR: redis:6379
      RABBITMQ_HTTP_URL: http://rabbitmq:15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_CACHE_QUEUE: nebula.cache.events
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - 8091:8091
  go-event-worker:
    image: nebulaops-v21-3-go-event-worker:latest
    build:
      context: .
      dockerfile: go/event-worker/Dockerfile
    environment:
      RABBITMQ_HTTP_URL: http://rabbitmq:15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_CACHE_QUEUE: nebula.cache.events
    depends_on:
      rabbitmq:
        condition: service_healthy
volumes:
  mongo-data: null
  redis-data: null
  rabbitmq-data: null
  grafana-data: null

networks:
  default:
    name: nebulaops-network
