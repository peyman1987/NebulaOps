services:
  mongodb:
    image: mongo:7
    healthcheck:
      test:
        - CMD
        - mongosh
        - --eval
        - db.adminCommand('ping')
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      MONGO_INITDB_ROOT_USERNAME: nebula
      MONGO_INITDB_ROOT_PASSWORD: nebula
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
  mongo-express:
    image: mongo-express:1.0.2-20
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: nebula
      ME_CONFIG_MONGODB_ADMINPASSWORD: nebula
      ME_CONFIG_MONGODB_URL: mongodb://nebula:nebula@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - 8088:8081
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - 8089:8081
  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_auth?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - 8081:8081
  task-service:
    build:
      context: .
      dockerfile: backend/task-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_task?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - 8082:8082
  notification-service:
    build:
      context: .
      dockerfile: backend/notification-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_notification?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - 8083:8083
  file-service:
    build:
      context: .
      dockerfile: backend/file-service/Dockerfile
    environment:
      MONGO_URI: mongodb://nebula:nebula@mongodb:27017/nebula_file?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - 8084:8084
  gateway-service:
    build:
      context: .
      dockerfile: backend/gateway-service/Dockerfile
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      TASK_SERVICE_URL: http://task-service:8082
      FILE_SERVICE_URL: http://file-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
      KUBECONFIG: /kube/config
      DOCKER_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-nebulaops-v16}
      GRAFANA_URL: http://grafana:3000
      GRAFANA_AUTH: admin:admin
    volumes:
      - ./.kube/config:/kube/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      auth-service:
        condition: service_started
      task-service:
        condition: service_started
      file-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - 8080:8080
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - gateway-service
    ports:
      - 4200:80
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./infrastructure/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090
    depends_on:
      - gateway-service
      - auth-service
      - task-service
      - notification-service
      - file-service
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/observability/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - 3000:3000
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - 'yes'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
  go-cache-service:
    build:
      context: .
      dockerfile: go/cache-service/Dockerfile
    environment:
      PORT: 8091
      REDIS_ADDR: redis:6379
      RABBITMQ_HTTP_URL: http://rabbitmq:15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_CACHE_QUEUE: nebula.cache.events
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - 8091:8091
  go-event-worker:
    build:
      context: .
      dockerfile: go/event-worker/Dockerfile
    environment:
      RABBITMQ_HTTP_URL: http://rabbitmq:15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_CACHE_QUEUE: nebula.cache.events
    depends_on:
      rabbitmq:
        condition: service_healthy
volumes:
  mongo-data: null
  redis-data: null
  rabbitmq-data: null
  grafana-data: null

networks:
  default:
    name: nebulaops-network
