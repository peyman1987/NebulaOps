server:
  port: 8101
spring:
  application:
    name: audit-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://nebula:nebula@mongodb:27017/nebula_audit?authSource=admin}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/nebulaops/protocol/openid-connect/certs}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
jwt:
  secret: ${JWT_SECRET:nebulaops-v22-4-dev-secret-key-min-32-chars!!}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: audit-service
nebulaops:
  security:
    enabled: ${KEYCLOAK_AUTH_ENABLED:false}
  audit:
    task-events-queue: ${NEBULAOPS_AUDIT_TASK_EVENTS_QUEUE:nebula.audit.task.events}
    task-exchange: ${NEBULAOPS_TASK_EXCHANGE:nebula.task.exchange}
    task-routing-key: ${NEBULAOPS_TASK_ROUTING_KEY:task.event}
