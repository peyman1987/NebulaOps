<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${app.displayName()}">NebulaOps Spring MVC Service</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
    <section class="hero">
        <div>
            <p class="eyebrow">NebulaOps v22.2 add-on</p>
            <h1 th:text="${app.displayName()}">NebulaOps Spring MVC Service</h1>
            <p class="subtitle">Applicazione Spring Boot MVC con pagine Thymeleaf, API REST, actuator e metriche Prometheus.</p>
        </div>
        <div class="hero-card">
            <span>Ambiente</span>
            <strong th:text="${app.environment()}">local</strong>
            <small>Gateway: <span th:text="${app.gatewayUrl()}">http://localhost:8080</span></small>
        </div>
    </section>

    <div th:if="${message}" class="alert" th:text="${message}"></div>

    <section class="grid">
        <article class="panel">
            <h2>Nuovo work item</h2>
            <form th:action="@{/work-items}" th:object="${form}" method="post" class="form">
                <label>
                    Titolo
                    <input th:field="*{title}" placeholder="Es. Preparare deploy" required>
                    <small class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
                </label>
                <label>
                    Owner
                    <input th:field="*{owner}" placeholder="team o persona" required>
                    <small class="error" th:if="${#fields.hasErrors('owner')}" th:errors="*{owner}"></small>
                </label>
                <label>
                    Descrizione
                    <textarea th:field="*{description}" rows="5" placeholder="Note operative"></textarea>
                    <small class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
                </label>
                <button type="submit">Crea elemento</button>
            </form>
        </article>

        <article class="panel wide">
            <div class="section-title">
                <h2>Work items</h2>
                <a href="/swagger-ui.html">OpenAPI</a>
            </div>
            <div class="items">
                <a class="item" th:each="item : ${items}" th:href="@{/work-items/{id}(id=${item.id()})}">
                    <span class="badge" th:text="${item.status()}">TODO</span>
                    <strong th:text="${item.title()}">Titolo</strong>
                    <small>Owner: <span th:text="${item.owner()}">owner</span></small>
                </a>
                <p th:if="${#lists.isEmpty(items)}" class="empty">Nessun elemento disponibile.</p>
            </div>
        </article>
    </section>
</main>
</body>
</html>
