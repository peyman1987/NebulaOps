server:
  port: 8097
spring:
  application:
    name: cost-analytics-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb:27017/nebulaops}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/nebulaops/protocol/openid-connect/certs}
jwt:
  secret: ${JWT_SECRET:nebulaops-v23-4-dev-secret-key-min-32-chars!!}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: cost-analytics-service
nebulaops:
  security:
    enabled: ${KEYCLOAK_AUTH_ENABLED:false}


# NebulaOps v23.4 SECURITY WARNING:
# - JWT_SECRET default is development-only. Set a strong external secret in production.
# - KEYCLOAK_AUTH_ENABLED=false disables resource-server protection and is only acceptable for local troubleshooting.
