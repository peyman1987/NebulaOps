server:
  port: 8100
spring:
  application:
    name: policy-governance-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://nebula:nebula@mongodb:27017/nebula_policy?authSource=admin}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/nebulaops/protocol/openid-connect/certs}
jwt:
  secret: ${JWT_SECRET:nebulaops-v23-3-dev-secret-key-min-32-chars!!}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: policy-governance-service
nebulaops:
  security:
    enabled: ${KEYCLOAK_AUTH_ENABLED:false}

  opa:
    url: ${OPA_URL:http://opa:8181}
  governance:
    enforcement-mode: ${GOVERNANCE_ENFORCEMENT_MODE:monitor}


# NebulaOps v23.3 SECURITY WARNING:
# - JWT_SECRET default is development-only. Set a strong external secret in production.
# - KEYCLOAK_AUTH_ENABLED=false disables resource-server protection and is only acceptable for local troubleshooting.
