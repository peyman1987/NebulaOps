server:
  port: 8085
spring:
  application:
    name: ai-ops-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/nebulaops/protocol/openid-connect/certs}
jwt:
  secret: ${JWT_SECRET:nebulaops-v22-4-dev-secret-key-min-32-chars!!}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ai-ops-service
aiops:
  engine-url: ${AI_ENGINE_URL:http://ai-engine:8095}
nebulaops:
  security:
    enabled: ${KEYCLOAK_AUTH_ENABLED:false}
