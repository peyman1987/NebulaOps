server:
  port: 8081

spring:
  application:
    name: auth-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://nebula:nebula@localhost:27017/nebula_auth?authSource=admin}

# JWT config — override JWT_SECRET in production with a 32+ char random string
jwt:
  secret: ${JWT_SECRET:nebulaops-v21-3-dev-secret-key-min-32-chars!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: auth-service
