server:
  port: 8081
spring:
  application:
    name: auth-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://nebula:nebula@localhost:27017/nebula_auth?authSource=admin}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/nebulaops/protocol/openid-connect/certs}
jwt:
  secret: ${JWT_SECRET:nebulaops-v24-1-dev-secret-key-min-32-chars!!}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: auth-service
nebulaops:
  security:
    enabled: ${KEYCLOAK_AUTH_ENABLED:false}
  auth:
    local-admin:
      enabled: ${NEBULAOPS_LOCAL_ADMIN_ENABLED:false}
      email: ${NEBULAOPS_LOCAL_ADMIN_EMAIL:}
      password: ${NEBULAOPS_LOCAL_ADMIN_PASSWORD:}
  audit:
    url: ${NEBULAOPS_AUDIT_URL:http://audit-service:8101}
keycloak:
  admin:
    base-url: ${KEYCLOAK_URL:http://localhost:8180}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}


# NebulaOps v24.1 SECURITY WARNING:
# - JWT_SECRET default is development-only. Set a strong external secret in production.
# - KEYCLOAK_AUTH_ENABLED=false disables resource-server protection and is only acceptable for local troubleshooting.
