server:
  port: 8083
spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://nebula:nebula@localhost:27017/nebula_notification?authSource=admin}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/nebulaops/protocol/openid-connect/certs}
jwt:
  secret: ${JWT_SECRET:nebulaops-v23-3-dev-secret-key-min-32-chars!!}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: notification-service
nebulaops:
  security:
    enabled: ${KEYCLOAK_AUTH_ENABLED:false}


# NebulaOps v23.3 SECURITY WARNING:
# - JWT_SECRET default is development-only. Set a strong external secret in production.
# - KEYCLOAK_AUTH_ENABLED=false disables resource-server protection and is only acceptable for local troubleshooting.
