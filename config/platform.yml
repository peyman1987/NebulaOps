version: 22.3.0
release: v22.3
services:
  auth:
    host: auth-service
    port: 8081
  task:
    host: task-service
    port: 8082
  notification:
    host: notification-service
    port: 8083
  file:
    host: file-service
    port: 8084
  ai-ops:
    host: ai-ops-service
    port: 8085
  devsecops:
    host: devsecops-service
    port: 8086
  pipeline:
    host: pipeline-engine-service
    port: 8087
  observability:
    host: observability-service
    port: 8092
  gitops:
    host: gitops-control-service
    port: 8093
  environment:
    host: environment-manager-service
    port: 8094
  terraform:
    host: terraform-studio-service
    port: 8096
  ai-engine:
    host: ai-engine
    port: 8095
  go-cache:
    host: go-cache-service
    port: 8091
  gateway:
    host: gateway-service
    port: 8080
  cost:
    host: cost-analytics-service
    port: 8097
  notify-ws:
    host: notification-ws-service
    port: 8098
  release:
    host: release-orchestrator-service
    port: 8098
  policy:
    host: policy-governance-service
    port: 8100
  audit:
    host: audit-service
    port: 8101
infra:
  mongodb:
    host: mongodb
    port: 27017
  rabbitmq:
    host: rabbitmq
    port: 5672
  redis:
    host: redis
    port: 6379
  prometheus:
    host: prometheus
    port: 9090
  loki:
    host: loki
    port: 3100
  tempo:
    host: tempo
    port: 3200
  grafana:
    host: grafana
    port: 3000
  keycloak:
    host: keycloak
    port: 8080
  gitlab:
    host: gitlab
    port: 8929
api:
  base: /api
  routes:
    health: /health
    auth: /auth
    tasks: /tasks
    kubernetes-snapshot: /kubernetes/snapshot
    kubernetes-logs: /kubernetes/logs
    docker-containers: /runtime/docker/containers
    docker-images: /runtime/docker/images
    docker-volumes: /runtime/docker/volumes
    helm-releases: /runtime/helm/releases
    platform-observability: /platform/observability
    platform-gitops: /platform/gitops
    platform-devsecops: /platform/devsecops
    platform-environments: /platform/environments
    ai-ops-analyze: /ai-ops/analyze
    ai-ops-autofix: /ai-ops/autofix
    cost-summary: /cost/summary
    notifications-live: /notifications/live
    pipeline-runs: /pipeline/runs
    audit-events: /audit/events
    secrets-list: /secrets/list
    registry-images: /registry/images
    releases: /releases
    release-timeline: /releases/{id}/timeline
    release-health-impact: /releases/{id}/health-impact
    policies: /policies
    policy-evaluate: /policies/evaluate
    events: /events
    cost-services: /cost/services
    cost-forecast: /cost/forecast
    cost-anomalies: /cost/anomalies
    kubernetes-events: /kubernetes/events
    kubernetes-graph: /kubernetes/namespaces/{ns}/graph
    devsecops-image-scan: /devsecops/scan/image
    devsecops-sbom: /devsecops/sbom/{image}
    ai-ops-incidents: /ai-ops/incidents
    notifications-stream: /notifications/stream
    notifications-preferences: /notifications/preferences
    release-promote-live: /releases/{id}/promote
    release-rollback-live: /releases/{id}/rollback
    policy-evaluate-live: /policies/evaluate
    ai-ops-incident-live: /ai-ops/incidents/analyze
    notifications-stream-live: /notifications/stream
    audit-events-live: /events
    devsecops-scan-live: /devsecops/scan/image
    kubernetes-events-live: /kubernetes/events
    cost-forecast-live: /cost/forecast
microFrontends:
  shell: http://nebulaops.localhost
  dockerDesktop: http://nebulaops.localhost/remotes/docker-desktop/
  openLensKubernetes: http://nebulaops.localhost/remotes/openlens-kubernetes/
  taskManagement: http://nebulaops.localhost/remotes/task-management/
  observability: http://nebulaops.localhost/remotes/observability/
  cicdGitops: http://nebulaops.localhost/remotes/cicd-gitops/
  terraformStudio: http://nebulaops.localhost/remotes/terraform-studio/
  devsecops: http://nebulaops.localhost/remotes/devsecops/
  aiOps: http://nebulaops.localhost/remotes/ai-ops/
  finopsCost: http://nebulaops.localhost/remotes/finops-cost/
  infraHub: http://nebulaops.localhost/remotes/infra-hub/
  releaseCenter: http://nebulaops.localhost/remotes/release-center/
  policyCenter: http://nebulaops.localhost/remotes/policy-center/
  notificationCenter: http://nebulaops.localhost/remotes/notification-center/
liveIntegrations:
  gitlab:
    url: ${GITLAB_URL}
    projectId: ${GITLAB_PROJECT_ID}
    token: ${GITLAB_TOKEN}
  argocd:
    url: ${ARGOCD_URL}
    token: ${ARGOCD_TOKEN}
  loki:
    url: http://localhost:3100
  prometheus:
    url: http://localhost:9090
  kubernetes:
    source: gateway-service / kubectl adapter
  audit:
    source: audit-service /api/events
  notification:
    source: notification-service SSE
