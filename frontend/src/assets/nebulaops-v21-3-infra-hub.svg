<svg aria-label="NebulaOps v22.1 INFRA Hub" role="img" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#06142f"/>
            <stop offset=".45" stop-color="#0b1028"/>
            <stop offset="1" stop-color="#111827"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#0f3552" stop-opacity=".96"/>
            <stop offset="1" stop-color="#111a3d" stop-opacity=".92"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0" stop-color="#38bdf8"/>
            <stop offset=".5" stop-color="#8b5cf6"/>
            <stop offset="1" stop-color="#22d3ee"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur result="b" stdDeviation="3"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <style>
            .bg {
                fill: url(#bg)
            }

            .panel {
                fill: #071126;
                stroke: #38bdf8;
                stroke-opacity: .26;
                stroke-width: 1.5
            }

            .node rect {
                fill: url(#card);
                stroke: #67e8f9;
                stroke-opacity: .42;
                stroke-width: 1.4;
                filter: url(#glow)
            }

            .link {
                fill: none;
                stroke: url(#accent);
                stroke-width: 4;
                stroke-linecap: round;
                stroke-dasharray: 9 9;
                opacity: .8
            }

            .title {
                font: 900 34px Inter, Arial, sans-serif;
                fill: #e0f2fe;
                letter-spacing: .02em
            }

            .sub {
                font: 600 15px Inter, Arial, sans-serif;
                fill: #a5f3fc
            }

            .flow {
                font: 700 14px Inter, Arial, sans-serif;
                fill: #c4b5fd
            }

            .h {
                font: 900 15px Inter, Arial, sans-serif;
                fill: #fff
            }

            .b {
                font: 700 12px Inter, Arial, sans-serif;
                fill: #bfdbfe
            }

            .chip {
                fill: #0c2440;
                stroke: #60a5fa;
                stroke-opacity: .5
            }

            .chipText {
                font: 800 12px Inter, Arial, sans-serif;
                fill: #e0f2fe
            }

            .pulse {
                fill: #0ea5e9;
                fill-opacity: .14;
                stroke: #67e8f9;
                stroke-opacity: .5
            }

            .small {
                font: 800 10px Inter, Arial, sans-serif;
                fill: #f8fafc
            }

            .badge {
                fill: #111c44;
                stroke: #a78bfa;
                stroke-width: 1.2
            }

            .badgeText {
                font: 900 12px Inter, Arial, sans-serif;
                fill: #ddd6fe;
                letter-spacing: .12em
            }
        </style>
    </defs>
    <rect class="bg" height="600" rx="34" width="960"/>
    <rect class="panel" height="556" rx="30" width="916" x="22" y="22"/>
    <rect class="badge" height="34" rx="17" width="190" x="706" y="44"/>
    <text class="badgeText" text-anchor="middle" x="801" y="66">NEBULAOPS v22.1</text>
    <text class="title" x="48" y="72">INFRA Hub</text>
    <text class="sub" x="50" y="104">External tools launcher: Grafana, ArgoCD, Prometheus, Loki, Tempo, RabbitMQ</text>
    <text class="flow" x="50" y="134">Dashboard/Sidebar → tool links → service health</text>
    <g class="node" transform="translate(40,180)">
        <rect height="118" rx="22" width="125"/>
        <text class="h" text-anchor="middle" x="62" y="34">Dashboard</text>
        <text class="b" dy="0" text-anchor="middle" x="62" y="64">Home KPIs</text>
        <text class="b" dy="18" text-anchor="middle" x="62" y="64">feature launcher</text>
    </g>
    <path class="link" d="M165 239 C 185 239 170 239 190 239"/>
    <g class="node" transform="translate(190,180)">
        <rect height="118" rx="22" width="125"/>
        <text class="h" text-anchor="middle" x="62" y="34">Sidebar</text>
        <text class="b" dy="0" text-anchor="middle" x="62" y="64">Pages</text>
        <text class="b" dy="18" text-anchor="middle" x="62" y="64">per module</text>
    </g>
    <path class="link" d="M315 239 C 335 239 320 239 340 239"/>
    <g class="node" transform="translate(340,180)">
        <rect height="118" rx="22" width="125"/>
        <text class="h" text-anchor="middle" x="62" y="34">Gateway</text>
        <text class="b" dy="0" text-anchor="middle" x="62" y="64">REST + WS</text>
        <text class="b" dy="18" text-anchor="middle" x="62" y="64">auth/routing</text>
    </g>
    <path class="link" d="M465 239 C 485 239 470 239 490 239"/>
    <g class="node" transform="translate(490,180)">
        <rect height="118" rx="22" width="125"/>
        <text class="h" text-anchor="middle" x="62" y="34">Services</text>
        <text class="b" dy="0" text-anchor="middle" x="62" y="64">Java BE</text>
        <text class="b" dy="18" text-anchor="middle" x="62" y="64">Go workers</text>
        <text class="b" dy="36" text-anchor="middle" x="62" y="64">Python AI</text>
    </g>
    <path class="link" d="M615 239 C 635 239 620 239 640 239"/>
    <g class="node" transform="translate(640,180)">
        <rect height="118" rx="22" width="125"/>
        <text class="h" text-anchor="middle" x="62" y="34">Runtime</text>
        <text class="b" dy="0" text-anchor="middle" x="62" y="64">Docker</text>
        <text class="b" dy="18" text-anchor="middle" x="62" y="64">Kubernetes</text>
        <text class="b" dy="36" text-anchor="middle" x="62" y="64">GitOps</text>
    </g>
    <path class="link" d="M765 239 C 785 239 770 239 790 239"/>
    <g class="node" transform="translate(790,180)">
        <rect height="118" rx="22" width="125"/>
        <text class="h" text-anchor="middle" x="62" y="34">Telemetry</text>
        <text class="b" dy="0" text-anchor="middle" x="62" y="64">Prometheus</text>
        <text class="b" dy="18" text-anchor="middle" x="62" y="64">Loki</text>
        <text class="b" dy="36" text-anchor="middle" x="62" y="64">Tempo</text>
    </g>
    <rect class="chip" height="30" rx="15" width="118" x="52" y="360"/>
    <text class="chipText" dy="0" text-anchor="middle" x="111" y="380">Grafana</text>
    <rect class="chip" height="30" rx="15" width="118" x="197" y="360"/>
    <text class="chipText" dy="0" text-anchor="middle" x="256" y="380">ArgoCD</text>
    <rect class="chip" height="30" rx="15" width="118" x="342" y="360"/>
    <text class="chipText" dy="0" text-anchor="middle" x="401" y="380">Prometheus</text>
    <rect class="chip" height="30" rx="15" width="118" x="487" y="360"/>
    <text class="chipText" dy="0" text-anchor="middle" x="546" y="380">Loki</text>
    <rect class="chip" height="30" rx="15" width="118" x="632" y="360"/>
    <text class="chipText" dy="0" text-anchor="middle" x="691" y="380">Tempo</text>
    <rect class="chip" height="30" rx="15" width="118" x="777" y="360"/>
    <text class="chipText" dy="0" text-anchor="middle" x="836" y="380">Helm</text>
    <rect class="chip" height="30" rx="15" width="118" x="52" y="406"/>
    <text class="chipText" dy="46" text-anchor="middle" x="111" y="380">Terraform</text>
    <rect class="chip" height="30" rx="15" width="118" x="197" y="406"/>
    <text class="chipText" dy="46" text-anchor="middle" x="256" y="380">Trivy</text>
    <rect class="chip" height="30" rx="15" width="118" x="342" y="406"/>
    <text class="chipText" dy="46" text-anchor="middle" x="401" y="380">Docker</text>
    <rect class="chip" height="30" rx="15" width="118" x="487" y="406"/>
    <text class="chipText" dy="46" text-anchor="middle" x="546" y="380">OpenLens</text>
    <rect class="chip" height="30" rx="15" width="118" x="632" y="406"/>
    <text class="chipText" dy="46" text-anchor="middle" x="691" y="380">RabbitMQ</text>
    <rect class="chip" height="30" rx="15" width="118" x="777" y="406"/>
    <text class="chipText" dy="46" text-anchor="middle" x="836" y="380">Redis</text>
    <circle class="pulse" cx="120" cy="510" r="30"/>
    <text class="small" text-anchor="middle" x="120" y="516">Real APIs</text>
    <circle class="pulse" cx="280" cy="510" r="30"/>
    <text class="small" text-anchor="middle" x="280" y="516">Live health</text>
    <circle class="pulse" cx="440" cy="510" r="30"/>
    <text class="small" text-anchor="middle" x="440" y="516">No static placeholders</text>
    <circle class="pulse" cx="600" cy="510" r="30"/>
    <text class="small" text-anchor="middle" x="600" y="516">Page routing</text>
    <circle class="pulse" cx="760" cy="510" r="30"/>
    <text class="small" text-anchor="middle" x="760" y="516">Action controls</text>
</svg>