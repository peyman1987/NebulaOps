<svg height="920" viewBox="0 0 1600 920" width="1600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .bg {
                fill: #06111f
            }

            .panel {
                fill: #0b1930;
                stroke: #38bdf8;
                stroke-width: 2
            }

            .node {
                fill: #102342;
                stroke: #7dd3fc;
                stroke-width: 2
            }

            .node2 {
                fill: #13213c;
                stroke: #a78bfa;
                stroke-width: 2
            }

            .node3 {
                fill: #162339;
                stroke: #34d399;
                stroke-width: 2
            }

            .txt {
                font-family: Inter, Segoe UI, Arial, sans-serif;
                fill: #e6f3ff
            }

            .small {
                font-size: 22px
            }

            .tiny {
                font-size: 16px;
                fill: #b8d6f2
            }

            .title {
                font-size: 42px;
                font-weight: 800
            }

            .label {
                font-size: 24px;
                font-weight: 700
            }

            .flow {
                fill: none;
                stroke: #22d3ee;
                stroke-width: 5;
                stroke-linecap: round;
                stroke-dasharray: 14 14;
                marker-end: url(#arrow)
            }

            .event {
                fill: none;
                stroke: #f59e0b;
                stroke-width: 5;
                stroke-linecap: round;
                stroke-dasharray: 10 16;
                marker-end: url(#arrow2)
            }

            .metric {
                fill: none;
                stroke: #34d399;
                stroke-width: 5;
                stroke-linecap: round;
                stroke-dasharray: 4 12;
                marker-end: url(#arrow3)
            }

            .shadow {
                filter: url(#shadow)
            }

            .badge {
                fill: #0ea5e9
            }

            .badge2 {
                fill: #f59e0b
            }

            .badge3 {
                fill: #10b981
            }

            @keyframes dash {
                to {
                    stroke-dashoffset: -120
                }
            }

            @keyframes pulse {
                0%, 100% {
                    opacity: .35;
                    r: 8
                }
                50% {
                    opacity: 1;
                    r: 15
                }
            }

            @keyframes float {
                0%, 100% {
                    transform: translateY(0)
                }
                50% {
                    transform: translateY(-9px)
                }
            }

            .flow, .event, .metric {
                animation: dash 4s linear infinite
            }

            .pulse {
                animation: pulse 1.8s ease-in-out infinite
            }

            .float {
                animation: float 5s ease-in-out infinite
            }

            .isoTop {
                fill: #193b62
            }

            .isoLeft {
                fill: #0f284a
            }

            .isoRight {
                fill: #0a1c36
            }</style>
        <filter id="shadow">
            <feDropShadow dx="0" dy="14" flood-color="#000" flood-opacity=".45" stdDeviation="14"/>
        </filter>
        <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="9" refY="5" viewBox="0 0 10 10">
            <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/>
        </marker>
        <marker id="arrow2" markerHeight="8" markerWidth="8" orient="auto" refX="9" refY="5" viewBox="0 0 10 10">
            <path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/>
        </marker>
        <marker id="arrow3" markerHeight="8" markerWidth="8" orient="auto" refX="9" refY="5" viewBox="0 0 10 10">
            <path d="M0,0 L10,5 L0,10 Z" fill="#34d399"/>
        </marker>
    </defs>
    <rect class="bg" height="920" width="1600"/>
    <circle cx="130" cy="90" fill="#0ea5e9" opacity=".10" r="220"/>
    <circle cx="1420" cy="760" fill="#8b5cf6" opacity=".10" r="300"/>
    <text class="txt title" x="60" y="70">NebulaOps v16 — Docker ⇄ Kubernetes ⇄ Helm Control Plane</text>
    <text class="txt small" x="60" y="110">Dal FE: stato, log, restart, scale, deploy, upgrade e rollback.</text>
    <rect class="panel shadow" height="675" rx="28" width="1480" x="60" y="155"/>
    <g transform="translate(130 230)">
        <polygon class="isoTop" points="140,0 280,70 140,140 0,70"/>
        <polygon class="isoLeft" points="0,70 140,140 140,260 0,190"/>
        <polygon class="isoRight" points="280,70 140,140 140,260 280,190"/>
        <text class="txt label" x="55" y="310">Docker Engine</text>
        <text class="txt tiny" x="30" y="340">containers • images • volumes • networks</text>
    </g>
    <g transform="translate(620 230)">
        <polygon class="isoTop" points="160,0 320,80 160,160 0,80"/>
        <polygon class="isoLeft" points="0,80 160,160 160,300 0,220"/>
        <polygon class="isoRight" points="320,80 160,160 160,300 320,220"/>
        <text class="txt label" x="68" y="350">Kubernetes</text>
        <text class="txt tiny" x="35" y="380">pods • svc • ingress • deploy • config</text>
    </g>
    <g transform="translate(1130 230)">
        <polygon class="isoTop" points="140,0 280,70 140,140 0,70"/>
        <polygon class="isoLeft" points="0,70 140,140 140,260 0,190"/>
        <polygon class="isoRight" points="280,70 140,140 140,260 280,190"/>
        <text class="txt label" x="85" y="310">Helm</text>
        <text class="txt tiny" x="40" y="340">charts • releases • upgrade • rollback</text>
    </g>
    <path class="flow" d="M430 350 C520 310 560 310 620 350"/>
    <circle class="badge" cx="530" cy="315" r="18"/>
    <text class="txt tiny" text-anchor="middle" x="530" y="321">1</text>
    <path class="flow" d="M940 350 C1030 310 1070 310 1130 350"/>
    <circle class="badge" cx="1045" cy="315" r="18"/>
    <text class="txt tiny" text-anchor="middle" x="1045" y="321">2</text>
    <path class="event" d="M1270 500 C1090 650 420 650 270 500"/>
    <circle class="badge2" cx="790" cy="650" r="18"/>
    <text class="txt tiny" text-anchor="middle" x="790" y="656">3</text>
    <rect fill="#07182c" height="76" rx="18" stroke="#29486d" width="1320" x="120" y="710"/>
    <text class="txt tiny" x="150" y="742">FE → Gateway → Docker socket per container locali; FE → Gateway → kubectl per
        cluster; FE → Gateway → helm per release.
    </text>

</svg>