<svg aria-label="CI/CD and GitOps Delivery Flow" role="img" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#110829"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#11233a" stop-opacity=".92"/>
            <stop offset="1" stop-color="#1a1235" stop-opacity=".92"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur result="b" stdDeviation="4"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6">
            <path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/>
        </marker>
        <style><
        !
        [CDATA[
        .title {
            font: 800 34px Inter, Segoe UI, Arial;
            fill: #f5fbff
        }

        .sub {
            font: 500 16px Inter, Segoe UI, Arial;
            fill: #a9bdd8
        }

        .label {
            font: 800 18px Inter, Segoe UI, Arial;
            fill: #fff
        }

        .small {
            font: 500 13px Inter, Segoe UI, Arial;
            fill: #b8c8dd
        }

        .chip {
            font: 700 12px Inter, Segoe UI, Arial;
            fill: #07111f
        }

        .panel {
            fill: url(#card);
            stroke: #294b73;
            stroke-width: 1.4;
            rx: 24
        }

        .core {
            fill: #0c2037;
            stroke: #58e7ff;
            stroke-width: 2.2;
            filter: url(#glow)
        }

        .api {
            stroke: #58e7ff
        }

        .event {
            stroke: #b476ff;
            stroke-dasharray: 10 8
        }

        .metric {
            stroke: #63ffb3;
            stroke-dasharray: 4 7
        }

        .flow {
            fill: none;
            stroke-width: 3;
            marker-end: url(#arrow);
            filter: url(#glow);
            opacity: .95
        }

        .pulse {
            animation: pulse 2.8s ease-in-out infinite
        }

        .dash {
            animation: dash 7s linear infinite
        }

        @keyframes pulse {
            0%, 100% {
                opacity: .55
            }
            50% {
                opacity: 1
            }
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -160
            }
        }

        ]
        ]
        ></style>
    </defs>
    <rect fill="url(#bg)" height="820" width="1400"/>
    <path d="M60 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M140 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M220 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M300 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M380 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M460 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M540 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M620 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M700 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M780 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M860 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M940 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1020 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1100 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1180 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1260 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1340 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M40 140 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 210 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 280 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 350 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 420 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 490 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 560 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 630 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 700 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 770 H1360" stroke="#163150" stroke-opacity=".22"/>
    <text class="title" x="70" y="72">CI/CD and GitOps Delivery Flow</text>
    <text class="sub" x="72" y="102">Source changes move through GitLab CI and Argo CD into Kubernetes runtime state.
    </text>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="45.0" y="204.0"/>
        <circle cx="79.0" cy="242" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="103.0" y="242">Developer</text>
        <text class="small" x="73.0" y="274">Commit code</text>
        <text class="small" x="73.0" y="294">Open merge request</text>
        <text class="small" x="73.0" y="314">Review pipeline</text>
    </g>
    <g class="pulse">
        <rect class="core" height="140" rx="24" width="300" x="320.0" y="190.0"/>
        <circle cx="354.0" cy="242" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="378.0" y="242">GitLab CI</text>
        <text class="small" x="348.0" y="274">Build images</text>
        <text class="small" x="348.0" y="294">Run tests</text>
        <text class="small" x="348.0" y="314">Publish artifacts</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="635.0" y="204.0"/>
        <circle cx="669.0" cy="242" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="693.0" y="242">Registry</text>
        <text class="small" x="663.0" y="274">Versioned images</text>
        <text class="small" x="663.0" y="294">Immutable tags</text>
        <text class="small" x="663.0" y="314">Scan results</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="635.0" y="504.0"/>
        <circle cx="669.0" cy="542" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="693.0" y="542">GitOps Repo</text>
        <text class="small" x="663.0" y="574">Helm values</text>
        <text class="small" x="663.0" y="594">Environment manifests</text>
        <text class="small" x="663.0" y="614">Promotion history</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="915.0" y="354.0"/>
        <circle cx="949.0" cy="392" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="973.0" y="392">Argo CD</text>
        <text class="small" x="943.0" y="424">Diff desired/live</text>
        <text class="small" x="943.0" y="444">Sync application</text>
        <text class="small" x="943.0" y="464">Health status</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="1105.0" y="354.0"/>
        <circle cx="1139.0" cy="392" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="1163.0" y="392">Kubernetes</text>
        <text class="small" x="1133.0" y="424">Deploy workloads</text>
        <text class="small" x="1133.0" y="444">Expose services</text>
        <text class="small" x="1133.0" y="464">Report status</text>
    </g>
    <path class="flow dash api" d="M170 260 C 320.0 260, 320.0 260, 470 260"/>
    <text class="small" x="270.0" y="252.0">push</text>
    <path class="flow dash api" d="M470 260 C 615.0 260, 615.0 260, 760 260"/>
    <text class="small" x="565.0" y="252.0">image</text>
    <path class="flow dash api" d="M470 260 C 615.0 260, 615.0 560, 760 560"/>
    <text class="small" x="565.0" y="402.0">update manifests</text>
    <path class="flow dash api" d="M760 560 C 900.0 560, 900.0 410, 1040 410"/>
    <text class="small" x="850.0" y="477.0">watch</text>
    <path class="flow dash api" d="M1040 410 C 1135.0 410, 1135.0 410, 1230 410"/>
    <text class="small" x="1085.0" y="402.0">sync</text>
    <path class="flow dash metric" d="M1230 410 C 1135.0 410, 1135.0 410, 1040 410"/>
    <text class="small" x="1085.0" y="402.0">health</text>
    <rect fill="#58e7ff" height="26" opacity=".9" rx="13" width="112" x="980" y="58"/>
    <text class="chip" x="994" y="76">API/request</text>
    <rect fill="#b476ff" height="26" opacity=".9" rx="13" width="112" x="1110" y="58"/>
    <text class="chip" x="1124" y="76">Async event</text>
    <rect fill="#63ffb3" height="26" opacity=".9" rx="13" width="112" x="1240" y="58"/>
    <text class="chip" x="1254" y="76">Metrics/logs</text>
</svg>