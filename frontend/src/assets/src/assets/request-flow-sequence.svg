<svg aria-label="Task Request Lifecycle" role="img" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#110829"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#11233a" stop-opacity=".92"/>
            <stop offset="1" stop-color="#1a1235" stop-opacity=".92"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur result="b" stdDeviation="4"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6">
            <path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/>
        </marker>
        <style><
        !
        [CDATA[
        .title {
            font: 800 34px Inter, Segoe UI, Arial;
            fill: #f5fbff
        }

        .sub {
            font: 500 16px Inter, Segoe UI, Arial;
            fill: #a9bdd8
        }

        .label {
            font: 800 18px Inter, Segoe UI, Arial;
            fill: #fff
        }

        .small {
            font: 500 13px Inter, Segoe UI, Arial;
            fill: #b8c8dd
        }

        .chip {
            font: 700 12px Inter, Segoe UI, Arial;
            fill: #07111f
        }

        .panel {
            fill: url(#card);
            stroke: #294b73;
            stroke-width: 1.4;
            rx: 24
        }

        .core {
            fill: #0c2037;
            stroke: #58e7ff;
            stroke-width: 2.2;
            filter: url(#glow)
        }

        .api {
            stroke: #58e7ff
        }

        .event {
            stroke: #b476ff;
            stroke-dasharray: 10 8
        }

        .metric {
            stroke: #63ffb3;
            stroke-dasharray: 4 7
        }

        .flow {
            fill: none;
            stroke-width: 3;
            marker-end: url(#arrow);
            filter: url(#glow);
            opacity: .95
        }

        .pulse {
            animation: pulse 2.8s ease-in-out infinite
        }

        .dash {
            animation: dash 7s linear infinite
        }

        @keyframes pulse {
            0%, 100% {
                opacity: .55
            }
            50% {
                opacity: 1
            }
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -160
            }
        }

        ]
        ]
        ></style>
    </defs>
    <rect fill="url(#bg)" height="820" width="1400"/>
    <path d="M60 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M140 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M220 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M300 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M380 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M460 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M540 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M620 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M700 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M780 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M860 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M940 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1020 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1100 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1180 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1260 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1340 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M40 140 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 210 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 280 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 350 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 420 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 490 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 560 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 630 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 700 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 770 H1360" stroke="#163150" stroke-opacity=".22"/>
    <text class="title" x="70" y="72">Task Request Lifecycle</text>
    <text class="sub" x="72" y="102">End-to-end path from user action to persisted task, event delivery and dashboard
        metrics.
    </text>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="5.0" y="154.0"/>
        <circle cx="39.0" cy="192" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="63.0" y="192">User</text>
        <text class="small" x="33.0" y="224">Create task</text>
        <text class="small" x="33.0" y="244">View status</text>
        <text class="small" x="33.0" y="264">Refresh UI</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="205.0" y="154.0"/>
        <circle cx="239.0" cy="192" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="263.0" y="192">Angular</text>
        <text class="small" x="233.0" y="224">Form validation</text>
        <text class="small" x="233.0" y="244">REST client</text>
        <text class="small" x="233.0" y="264">State update</text>
    </g>
    <g class="pulse">
        <rect class="core" height="140" rx="24" width="300" x="390.0" y="140.0"/>
        <circle cx="424.0" cy="192" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="448.0" y="192">Gateway</text>
        <text class="small" x="418.0" y="224">Route request</text>
        <text class="small" x="418.0" y="244">Apply edge policy</text>
        <text class="small" x="418.0" y="264">Return response</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="645.0" y="154.0"/>
        <circle cx="679.0" cy="192" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="703.0" y="192">Task Service</text>
        <text class="small" x="673.0" y="224">Validate command</text>
        <text class="small" x="673.0" y="244">Persist task</text>
        <text class="small" x="673.0" y="264">Publish event</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="885.0" y="154.0"/>
        <circle cx="919.0" cy="192" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="943.0" y="192">MongoDB</text>
        <text class="small" x="913.0" y="224">Task document</text>
        <text class="small" x="913.0" y="244">Query model</text>
        <text class="small" x="913.0" y="264">Local storage</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="645.0" y="464.0"/>
        <circle cx="679.0" cy="502" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="703.0" y="502">RabbitMQ</text>
        <text class="small" x="673.0" y="534">task.created</text>
        <text class="small" x="673.0" y="554">Queue delivery</text>
        <text class="small" x="673.0" y="574">Retry capable</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="885.0" y="464.0"/>
        <circle cx="919.0" cy="502" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="943.0" y="502">Notification</text>
        <text class="small" x="913.0" y="534">Consume event</text>
        <text class="small" x="913.0" y="554">Process message</text>
        <text class="small" x="913.0" y="574">Expose metrics</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="1105.0" y="309.0"/>
        <circle cx="1139.0" cy="347" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="1163.0" y="347">Grafana</text>
        <text class="small" x="1133.0" y="379">Operational view</text>
        <text class="small" x="1133.0" y="399">Latency/errors</text>
        <text class="small" x="1133.0" y="419">Service health</text>
    </g>
    <path class="flow dash api" d="M130 210 C 230.0 210, 230.0 210, 330 210"/>
    <text class="small" x="180.0" y="202.0">click</text>
    <path class="flow dash api" d="M330 210 C 435.0 210, 435.0 210, 540 210"/>
    <text class="small" x="385.0" y="202.0">POST /tasks</text>
    <path class="flow dash api" d="M540 210 C 655.0 210, 655.0 210, 770 210"/>
    <text class="small" x="605.0" y="202.0">route</text>
    <path class="flow dash api" d="M770 210 C 890.0 210, 890.0 210, 1010 210"/>
    <text class="small" x="840.0" y="202.0">save</text>
    <path class="flow dash event" d="M770 210 C 770.0 210, 770.0 520, 770 520"/>
    <text class="small" x="720.0" y="357.0">publish</text>
    <path class="flow dash event" d="M770 520 C 890.0 520, 890.0 520, 1010 520"/>
    <text class="small" x="840.0" y="512.0">consume</text>
    <path class="flow dash metric" d="M770 210 C 1000.0 210, 1000.0 365, 1230 365"/>
    <text class="small" x="950.0" y="279.5">metrics</text>
    <path class="flow dash metric" d="M1010 520 C 1120.0 520, 1120.0 365, 1230 365"/>
    <text class="small" x="1070.0" y="434.5">metrics</text>
    <rect fill="#58e7ff" height="26" opacity=".9" rx="13" width="112" x="980" y="58"/>
    <text class="chip" x="994" y="76">API/request</text>
    <rect fill="#b476ff" height="26" opacity=".9" rx="13" width="112" x="1110" y="58"/>
    <text class="chip" x="1124" y="76">Async event</text>
    <rect fill="#63ffb3" height="26" opacity=".9" rx="13" width="112" x="1240" y="58"/>
    <text class="chip" x="1254" y="76">Metrics/logs</text>
</svg>