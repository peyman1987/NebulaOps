<svg aria-label="Observability Pipeline" role="img" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#110829"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#11233a" stop-opacity=".92"/>
            <stop offset="1" stop-color="#1a1235" stop-opacity=".92"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur result="b" stdDeviation="4"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6">
            <path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/>
        </marker>
        <style><
        !
        [CDATA[
        .title {
            font: 800 34px Inter, Segoe UI, Arial;
            fill: #f5fbff
        }

        .sub {
            font: 500 16px Inter, Segoe UI, Arial;
            fill: #a9bdd8
        }

        .label {
            font: 800 18px Inter, Segoe UI, Arial;
            fill: #fff
        }

        .small {
            font: 500 13px Inter, Segoe UI, Arial;
            fill: #b8c8dd
        }

        .chip {
            font: 700 12px Inter, Segoe UI, Arial;
            fill: #07111f
        }

        .panel {
            fill: url(#card);
            stroke: #294b73;
            stroke-width: 1.4;
            rx: 24
        }

        .core {
            fill: #0c2037;
            stroke: #58e7ff;
            stroke-width: 2.2;
            filter: url(#glow)
        }

        .api {
            stroke: #58e7ff
        }

        .event {
            stroke: #b476ff;
            stroke-dasharray: 10 8
        }

        .metric {
            stroke: #63ffb3;
            stroke-dasharray: 4 7
        }

        .flow {
            fill: none;
            stroke-width: 3;
            marker-end: url(#arrow);
            filter: url(#glow);
            opacity: .95
        }

        .pulse {
            animation: pulse 2.8s ease-in-out infinite
        }

        .dash {
            animation: dash 7s linear infinite
        }

        @keyframes pulse {
            0%, 100% {
                opacity: .55
            }
            50% {
                opacity: 1
            }
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -160
            }
        }

        ]
        ]
        ></style>
    </defs>
    <rect fill="url(#bg)" height="820" width="1400"/>
    <path d="M60 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M140 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M220 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M300 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M380 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M460 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M540 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M620 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M700 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M780 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M860 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M940 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1020 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1100 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1180 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1260 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1340 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M40 140 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 210 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 280 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 350 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 420 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 490 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 560 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 630 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 700 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 770 H1360" stroke="#163150" stroke-opacity=".22"/>
    <text class="title" x="70" y="72">Observability Pipeline</text>
    <text class="sub" x="72" y="102">Prometheus scrapes service metrics and Grafana presents operational dashboards.
    </text>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="95.0" y="204.0"/>
        <circle cx="129.0" cy="242" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="153.0" y="242">Services</text>
        <text class="small" x="123.0" y="274">Spring Boot Actuator</text>
        <text class="small" x="123.0" y="294">Go metrics endpoints</text>
        <text class="small" x="123.0" y="314">Health probes</text>
    </g>
    <g class="pulse">
        <rect class="core" height="140" rx="24" width="300" x="410.0" y="190.0"/>
        <circle cx="444.0" cy="242" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="468.0" y="242">Prometheus</text>
        <text class="small" x="438.0" y="274">Scrape targets</text>
        <text class="small" x="438.0" y="294">Store time series</text>
        <text class="small" x="438.0" y="314">Evaluate queries</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="775.0" y="204.0"/>
        <circle cx="809.0" cy="242" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="833.0" y="242">Grafana</text>
        <text class="small" x="803.0" y="274">Dashboards</text>
        <text class="small" x="803.0" y="294">Panels and alerts</text>
        <text class="small" x="803.0" y="314">Prometheus datasource</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="1055.0" y="204.0"/>
        <circle cx="1089.0" cy="242" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="1113.0" y="242">Operator</text>
        <text class="small" x="1083.0" y="274">Inspect health</text>
        <text class="small" x="1083.0" y="294">Review latency</text>
        <text class="small" x="1083.0" y="314">Debug failures</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="435.0" y="504.0"/>
        <circle cx="469.0" cy="542" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="493.0" y="542">Logs</text>
        <text class="small" x="463.0" y="574">Container logs</text>
        <text class="small" x="463.0" y="594">Gateway diagnostics</text>
        <text class="small" x="463.0" y="614">Auto-refresh UI</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="775.0" y="504.0"/>
        <circle cx="809.0" cy="542" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="833.0" y="542">SLO View</text>
        <text class="small" x="803.0" y="574">Availability</text>
        <text class="small" x="803.0" y="594">Error rate</text>
        <text class="small" x="803.0" y="614">Latency trend</text>
    </g>
    <path class="flow dash metric" d="M220 260 C 390.0 260, 390.0 260, 560 260"/>
    <text class="small" x="340.0" y="252.0">scrape</text>
    <path class="flow dash metric" d="M560 260 C 730.0 260, 730.0 260, 900 260"/>
    <text class="small" x="680.0" y="252.0">query</text>
    <path class="flow dash api" d="M900 260 C 1040.0 260, 1040.0 260, 1180 260"/>
    <text class="small" x="990.0" y="252.0">visualize</text>
    <path class="flow dash metric" d="M220 260 C 390.0 260, 390.0 560, 560 560"/>
    <text class="small" x="340.0" y="402.0">logs</text>
    <path class="flow dash metric" d="M560 260 C 730.0 260, 730.0 560, 900 560"/>
    <text class="small" x="680.0" y="402.0">SLO</text>
    <path class="flow dash api" d="M900 560 C 1040.0 560, 1040.0 260, 1180 260"/>
    <text class="small" x="990.0" y="402.0">review</text>
    <rect fill="#58e7ff" height="26" opacity=".9" rx="13" width="112" x="980" y="58"/>
    <text class="chip" x="994" y="76">API/request</text>
    <rect fill="#b476ff" height="26" opacity=".9" rx="13" width="112" x="1110" y="58"/>
    <text class="chip" x="1124" y="76">Async event</text>
    <rect fill="#63ffb3" height="26" opacity=".9" rx="13" width="112" x="1240" y="58"/>
    <text class="chip" x="1254" y="76">Metrics/logs</text>
</svg>