<svg aria-label="Runtime Operations Console" role="img" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#110829"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#11233a" stop-opacity=".92"/>
            <stop offset="1" stop-color="#1a1235" stop-opacity=".92"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur result="b" stdDeviation="4"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6">
            <path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/>
        </marker>
        <style><
        !
        [CDATA[
        .title {
            font: 800 34px Inter, Segoe UI, Arial;
            fill: #f5fbff
        }

        .sub {
            font: 500 16px Inter, Segoe UI, Arial;
            fill: #a9bdd8
        }

        .label {
            font: 800 18px Inter, Segoe UI, Arial;
            fill: #fff
        }

        .small {
            font: 500 13px Inter, Segoe UI, Arial;
            fill: #b8c8dd
        }

        .chip {
            font: 700 12px Inter, Segoe UI, Arial;
            fill: #07111f
        }

        .panel {
            fill: url(#card);
            stroke: #294b73;
            stroke-width: 1.4;
            rx: 24
        }

        .core {
            fill: #0c2037;
            stroke: #58e7ff;
            stroke-width: 2.2;
            filter: url(#glow)
        }

        .api {
            stroke: #58e7ff
        }

        .event {
            stroke: #b476ff;
            stroke-dasharray: 10 8
        }

        .metric {
            stroke: #63ffb3;
            stroke-dasharray: 4 7
        }

        .flow {
            fill: none;
            stroke-width: 3;
            marker-end: url(#arrow);
            filter: url(#glow);
            opacity: .95
        }

        .pulse {
            animation: pulse 2.8s ease-in-out infinite
        }

        .dash {
            animation: dash 7s linear infinite
        }

        @keyframes pulse {
            0%, 100% {
                opacity: .55
            }
            50% {
                opacity: 1
            }
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -160
            }
        }

        ]
        ]
        ></style>
    </defs>
    <rect fill="url(#bg)" height="820" width="1400"/>
    <path d="M60 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M140 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M220 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M300 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M380 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M460 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M540 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M620 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M700 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M780 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M860 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M940 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1020 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1100 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1180 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1260 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1340 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M40 140 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 210 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 280 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 350 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 420 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 490 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 560 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 630 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 700 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 770 H1360" stroke="#163150" stroke-opacity=".22"/>
    <text class="title" x="70" y="72">Runtime Operations Console</text>
    <text class="sub" x="72" y="102">Local workstation controls Docker, Kubernetes, Helm and Grafana through a
        professional UI.
    </text>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="55.0" y="364.0"/>
        <circle cx="89.0" cy="402" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="113.0" y="402">Workstation</text>
        <text class="small" x="83.0" y="434">WSL/Linux host</text>
        <text class="small" x="83.0" y="454">Native Docker Engine</text>
        <text class="small" x="83.0" y="474">Local kubeconfig</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="325.0" y="194.0"/>
        <circle cx="359.0" cy="232" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="383.0" y="232">Docker Runtime</text>
        <text class="small" x="353.0" y="264">Containers/images</text>
        <text class="small" x="353.0" y="284">Stats and lifecycle</text>
        <text class="small" x="353.0" y="304">Compose services</text>
    </g>
    <g class="pulse">
        <rect class="core" height="140" rx="24" width="300" x="610.0" y="180.0"/>
        <circle cx="644.0" cy="232" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="668.0" y="232">Kubernetes</text>
        <text class="small" x="638.0" y="264">Workloads and pods</text>
        <text class="small" x="638.0" y="284">Services/namespaces</text>
        <text class="small" x="638.0" y="304">Logs and YAML</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="915.0" y="194.0"/>
        <circle cx="949.0" cy="232" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="973.0" y="232">Helm Releases</text>
        <text class="small" x="943.0" y="264">Charts and values</text>
        <text class="small" x="943.0" y="284">Release inventory</text>
        <text class="small" x="943.0" y="304">Uninstall workflow</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="915.0" y="514.0"/>
        <circle cx="949.0" cy="552" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="973.0" y="552">Grafana</text>
        <text class="small" x="943.0" y="584">Dashboards</text>
        <text class="small" x="943.0" y="604">Prometheus datasource</text>
        <text class="small" x="943.0" y="624">SLO visibility</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="395.0" y="514.0"/>
        <circle cx="429.0" cy="552" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="453.0" y="552">Angular Console</text>
        <text class="small" x="423.0" y="584">Runtime actions</text>
        <text class="small" x="423.0" y="604">Auto-refresh logs</text>
        <text class="small" x="423.0" y="624">Professional UI</text>
    </g>
    <path class="flow dash api" d="M180 420 C 315.0 420, 315.0 250, 450 250"/>
    <text class="small" x="265.0" y="327.0">docker socket</text>
    <path class="flow dash api" d="M450 250 C 605.0 250, 605.0 250, 760 250"/>
    <text class="small" x="555.0" y="242.0">cluster</text>
    <path class="flow dash api" d="M760 250 C 900.0 250, 900.0 250, 1040 250"/>
    <text class="small" x="850.0" y="242.0">deploy</text>
    <path class="flow dash metric" d="M760 250 C 900.0 250, 900.0 570, 1040 570"/>
    <text class="small" x="850.0" y="402.0">metrics</text>
    <path class="flow dash api" d="M520 570 C 485.0 570, 485.0 250, 450 250"/>
    <text class="small" x="435.0" y="402.0">actions</text>
    <path class="flow dash api" d="M520 570 C 640.0 570, 640.0 250, 760 250"/>
    <text class="small" x="590.0" y="402.0">kubectl</text>
    <rect fill="#58e7ff" height="26" opacity=".9" rx="13" width="112" x="980" y="58"/>
    <text class="chip" x="994" y="76">API/request</text>
    <rect fill="#b476ff" height="26" opacity=".9" rx="13" width="112" x="1110" y="58"/>
    <text class="chip" x="1124" y="76">Async event</text>
    <rect fill="#63ffb3" height="26" opacity=".9" rx="13" width="112" x="1240" y="58"/>
    <text class="chip" x="1254" y="76">Metrics/logs</text>
</svg>