<svg aria-label="NebulaOps v17 SaaS Flow" role="img" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#07111f"/>
            <stop offset="1" stop-color="#110829"/>
        </linearGradient>
        <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#11233a" stop-opacity=".92"/>
            <stop offset="1" stop-color="#1a1235" stop-opacity=".92"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur result="b" stdDeviation="4"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6">
            <path d="M2,2 L10,6 L2,10 Z" fill="#58e7ff"/>
        </marker>
        <style><
        !
        [CDATA[
        .title {
            font: 800 34px Inter, Segoe UI, Arial;
            fill: #f5fbff
        }

        .sub {
            font: 500 16px Inter, Segoe UI, Arial;
            fill: #a9bdd8
        }

        .label {
            font: 800 18px Inter, Segoe UI, Arial;
            fill: #fff
        }

        .small {
            font: 500 13px Inter, Segoe UI, Arial;
            fill: #b8c8dd
        }

        .chip {
            font: 700 12px Inter, Segoe UI, Arial;
            fill: #07111f
        }

        .panel {
            fill: url(#card);
            stroke: #294b73;
            stroke-width: 1.4;
            rx: 24
        }

        .core {
            fill: #0c2037;
            stroke: #58e7ff;
            stroke-width: 2.2;
            filter: url(#glow)
        }

        .api {
            stroke: #58e7ff
        }

        .event {
            stroke: #b476ff;
            stroke-dasharray: 10 8
        }

        .metric {
            stroke: #63ffb3;
            stroke-dasharray: 4 7
        }

        .flow {
            fill: none;
            stroke-width: 3;
            marker-end: url(#arrow);
            filter: url(#glow);
            opacity: .95
        }

        .pulse {
            animation: pulse 2.8s ease-in-out infinite
        }

        .dash {
            animation: dash 7s linear infinite
        }

        @keyframes pulse {
            0%, 100% {
                opacity: .55
            }
            50% {
                opacity: 1
            }
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -160
            }
        }

        ]
        ]
        ></style>
    </defs>
    <rect fill="url(#bg)" height="820" width="1400"/>
    <path d="M60 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M140 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M220 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M300 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M380 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M460 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M540 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M620 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M700 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M780 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M860 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M940 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1020 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1100 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1180 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1260 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M1340 120 V780" stroke="#163150" stroke-opacity=".25"/>
    <path d="M40 140 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 210 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 280 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 350 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 420 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 490 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 560 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 630 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 700 H1360" stroke="#163150" stroke-opacity=".22"/>
    <path d="M40 770 H1360" stroke="#163150" stroke-opacity=".22"/>
    <text class="title" x="70" y="72">NebulaOps v17 SaaS Flow</text>
    <text class="sub" x="72" y="102">Browser, Angular, Gateway, services, data stores and observability in one local
        platform.
    </text>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="35.0" y="174.0"/>
        <circle cx="69.0" cy="212" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="93.0" y="212">Browser</text>
        <text class="small" x="63.0" y="244">Operator session</text>
        <text class="small" x="63.0" y="264">Demo login</text>
        <text class="small" x="63.0" y="284">Task actions</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="305.0" y="174.0"/>
        <circle cx="339.0" cy="212" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="363.0" y="212">Angular UI</text>
        <text class="small" x="333.0" y="244">Operations dashboard</text>
        <text class="small" x="333.0" y="264">Docker/Kubernetes tabs</text>
        <text class="small" x="333.0" y="284">Live YAML editor</text>
    </g>
    <g class="pulse">
        <rect class="core" height="140" rx="24" width="300" x="550.0" y="160.0"/>
        <circle cx="584.0" cy="212" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="608.0" y="212">Gateway API</text>
        <text class="small" x="578.0" y="244">Spring Cloud Gateway</text>
        <text class="small" x="578.0" y="264">Routing and edge API</text>
        <text class="small" x="578.0" y="284">Runtime command bridge</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="855.0" y="174.0"/>
        <circle cx="889.0" cy="212" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="913.0" y="212">Services</text>
        <text class="small" x="883.0" y="244">Auth, Task, File</text>
        <text class="small" x="883.0" y="264">Notification</text>
        <text class="small" x="883.0" y="284">Go APIs</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="1005.0" y="444.0"/>
        <circle cx="1039.0" cy="482" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="1063.0" y="482">Data Layer</text>
        <text class="small" x="1033.0" y="514">MongoDB state</text>
        <text class="small" x="1033.0" y="534">Redis cache</text>
        <text class="small" x="1033.0" y="554">RabbitMQ events</text>
    </g>
    <g class="pulse">
        <rect class="panel" height="112" rx="24" width="250" x="575.0" y="514.0"/>
        <circle cx="609.0" cy="552" fill="#58e7ff" opacity=".9" r="11"/>
        <text class="label" x="633.0" y="552">Observability</text>
        <text class="small" x="603.0" y="584">Prometheus scrape</text>
        <text class="small" x="603.0" y="604">Grafana dashboards</text>
        <text class="small" x="603.0" y="624">Health and logs</text>
    </g>
    <path class="flow dash api" d="M160 230 C 295.0 230, 295.0 230, 430 230"/>
    <text class="small" x="245.0" y="222.0">HTTPS</text>
    <path class="flow dash api" d="M430 230 C 565.0 230, 565.0 230, 700 230"/>
    <text class="small" x="515.0" y="222.0">REST</text>
    <path class="flow dash api" d="M700 230 C 840.0 230, 840.0 230, 980 230"/>
    <text class="small" x="790.0" y="222.0">route</text>
    <path class="flow dash event" d="M980 230 C 1055.0 230, 1055.0 500, 1130 500"/>
    <text class="small" x="1005.0" y="357.0">events/cache</text>
    <path class="flow dash metric" d="M980 230 C 840.0 230, 840.0 570, 700 570"/>
    <text class="small" x="790.0" y="392.0">metrics</text>
    <path class="flow dash metric" d="M700 230 C 700.0 230, 700.0 570, 700 570"/>
    <text class="small" x="650.0" y="392.0">health</text>
    <rect fill="#58e7ff" height="26" opacity=".9" rx="13" width="112" x="980" y="58"/>
    <text class="chip" x="994" y="76">API/request</text>
    <rect fill="#b476ff" height="26" opacity=".9" rx="13" width="112" x="1110" y="58"/>
    <text class="chip" x="1124" y="76">Async event</text>
    <rect fill="#63ffb3" height="26" opacity=".9" rx="13" width="112" x="1240" y="58"/>
    <text class="chip" x="1254" y="76">Metrics/logs</text>
</svg>