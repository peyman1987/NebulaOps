<svg aria-label="NebulaOps v18 Terraform Control Plane" height="980" role="img" viewBox="0 0 1600 980" width="1600"
     xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#070A16"/>
            <stop offset=".45" stop-color="#111A38"/>
            <stop offset="1" stop-color="#160B2E"/>
        </linearGradient>
        <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#6EE7FF"/>
            <stop offset="1" stop-color="#7C3AED"/>
        </linearGradient>
        <linearGradient id="pink" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#FF4FD8"/>
            <stop offset="1" stop-color="#22D3EE"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur result="b" stdDeviation="7"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="shadow">
            <feDropShadow dx="0" dy="18" flood-color="#000" flood-opacity=".55" stdDeviation="18"/>
        </filter>
        <style>
            .title {
                font: 800 54px Inter, Segoe UI, sans-serif;
                fill: white
            }

            .sub {
                font: 500 22px Inter, Segoe UI, sans-serif;
                fill: #AFC7FF
            }

            .txt {
                font: 700 24px Inter, Segoe UI, sans-serif;
                fill: white
            }

            .small {
                font: 500 16px Inter, Segoe UI, sans-serif;
                fill: #B8C5E8
            }

            .box {
                fill: #101A36;
                stroke: #57E5FF;
                stroke-width: 2;
                rx: 28;
                filter: url(#shadow)
            }

            .box2 {
                fill: #161033;
                stroke: #FF5CDA;
                stroke-width: 2;
                rx: 28;
                filter: url(#shadow)
            }

            .pill {
                fill: #0B1024;
                stroke: #7DD3FC;
                stroke-width: 1.4;
                rx: 18
            }

            .line {
                stroke: url(#cyan);
                stroke-width: 5;
                fill: none;
                filter: url(#glow);
                stroke-linecap: round
            }

            .dash {
                stroke-dasharray: 14 16;
                animation: flow 2.2s linear infinite
            }

            .pulse {
                animation: pulse 2.7s ease-in-out infinite
            }

            .float {
                animation: float 5s ease-in-out infinite
            }

            .spin {
                transform-origin: center;
                animation: spin 22s linear infinite
            }

            @keyframes flow {
                to {
                    stroke-dashoffset: -120
                }
            }

            @keyframes pulse {
                50% {
                    opacity: .45
                }
            }

            @keyframes float {
                50% {
                    transform: translateY(-12px)
                }
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg)
                }
            }
        </style>
    </defs>
    <rect fill="url(#bg)" height="980" width="1600"/>
    <circle cx="1370" cy="140" fill="#193866" filter="url(#glow)" opacity=".32" r="210"/>
    <circle cx="230" cy="850" fill="#4C1D95" filter="url(#glow)" opacity=".28" r="260"/>
    <text class="title" x="80" y="90">NebulaOps v18</text>
    <text class="sub" x="82" y="128">Terraform Control Plane · Angular Cockpit · Kubernetes · Helm · Observability ·
        GitOps
    </text>

    <g class="spin" opacity=".32">
        <ellipse cx="800" cy="510" fill="none" rx="560" ry="245" stroke="#58E5FF" stroke-dasharray="10 14"
                 stroke-width="2"/>
        <ellipse cx="800" cy="510" fill="none" rx="680" ry="315" stroke="#FF4FD8" stroke-dasharray="8 18"
                 stroke-width="2"/>
    </g>

    <path class="line dash" d="M290 275 C445 210, 560 240, 690 320"/>
    <path class="line dash" d="M910 320 C1045 235, 1160 225, 1315 280"/>
    <path class="line dash" d="M1320 410 C1240 570, 1120 650, 965 675"/>
    <path class="line dash" d="M635 675 C500 640, 380 565, 285 430"/>
    <path class="line dash" d="M800 410 L800 620"/>

    <g class="float" transform="translate(610 320)">
        <rect class="box" height="210" width="380"/>
        <text class="txt" x="54" y="64">Angular FE Cockpit</text>
        <text class="small" x="54" y="100">Tabs: Terraform · K8s · Logs · FinOps</text>
        <rect class="pill" height="34" width="92" x="54" y="128"/>
        <text class="small" x="76" y="151">Login</text>
        <rect class="pill" height="34" width="92" x="158" y="128"/>
        <text class="small" x="179" y="151">CRUD</text>
        <rect class="pill" height="34" width="70" x="262" y="128"/>
        <text class="small" x="284" y="151">YAML</text>
    </g>

    <g transform="translate(90 240)">
        <rect class="box2" height="180" width="340"/>
        <text class="txt" x="42" y="58">Terraform</text>
        <text class="small" x="42" y="94">root /terraform</text>
        <text class="small" x="42" y="124">modules: kind, apps, security</text>
        <text class="small" x="42" y="154">plan/apply scripts</text>
    </g>

    <g transform="translate(1170 245)">
        <rect class="box" height="180" width="340"/>
        <text class="txt" x="42" y="58">Kubernetes + Helm</text>
        <text class="small" x="42" y="94">namespace, services, ingress</text>
        <text class="small" x="42" y="124">values generated by Terraform</text>
        <text class="small" x="42" y="154">local-first deployment</text>
    </g>

    <g transform="translate(1040 640)">
        <rect class="box2" height="185" width="360"/>
        <text class="txt" x="42" y="58">Observability</text>
        <text class="small" x="42" y="94">Grafana · Prometheus · logs</text>
        <text class="small" x="42" y="124">auto-refresh in FE</text>
        <text class="small" x="42" y="154">health and pipeline gates</text>
    </g>

    <g transform="translate(185 640)">
        <rect class="box" height="185" width="360"/>
        <text class="txt" x="42" y="58">GitOps + Security</text>
        <text class="small" x="42" y="94">ArgoCD notes generated</text>
        <text class="small" x="42" y="124">security baseline configmap</text>
        <text class="small" x="42" y="154">no real secrets committed</text>
    </g>

    <g class="pulse">
        <circle cx="800" cy="510" fill="url(#pink)" filter="url(#glow)" opacity=".84" r="78"/>
        <text class="txt" x="748" y="501">v18</text>
        <text class="small" fill="white" x="712" y="533">Control Plane</text>
    </g>

    <g transform="translate(80 890)">
        <rect fill="#081124" height="48" opacity=".84" rx="24" stroke="#2DD4BF" width="1440" x="0" y="0"/>
        <text class="small" x="30" y="31">Flow: terraform plan/apply → generated local manifests → Helm/Kubernetes
            deployment → FE cockpit → observability/security/finops feedback loop
        </text>
    </g>
</svg>
