server {
  listen 80;
  server_name nebulaops.localhost localhost _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 50m;
  gzip on;
  gzip_types text/plain application/javascript text/css application/json image/svg+xml;

  # Static shell assets — no browser cache during local platform iteration.
  location = /nebulaops-auth-bridge.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files /nebulaops-auth-bridge.js =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files /index.html =404;
  }

  # MFE remote bundles are copied into the frontend image and served by the
  # same Nginx instance. Do not proxy /remotes/* to MFE containers here.
  location ~ ^/remotes/([^/]+)$ {
    return 301 /remotes/$1/;
  }

  location ^~ /remotes/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ =404;
  }

  # Gateway API and actuator endpoints through the same origin.
  # No URI suffix on proxy_pass: the original /api/** or /actuator/** path is preserved.
  location ^~ /api/ {
    proxy_pass http://gateway-service:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location ^~ /actuator/ {
    proxy_pass http://gateway-service:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Keycloak is exposed publicly as /keycloak/ while its container serves /
  # internally. The trailing slash intentionally strips the public prefix.
  location ^~ /keycloak/ {
    proxy_pass http://keycloak:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /keycloak;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  # Observability UI shortcuts. Grafana and Prometheus are configured with
  # their /grafana and /prometheus subpaths, so the URI is preserved.
  location ^~ /grafana/ {
    proxy_pass http://grafana:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /prometheus/ {
    proxy_pass http://prometheus:9090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(js|css|woff2?|png|svg|ico)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri $uri/ /index.html;
  }
}
